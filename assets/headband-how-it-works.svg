<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">头环工作原理示意图</title>
  <desc id="desc">头环戴在前额附近，发射近红外光，检测血氧变化，并在电脑中生成脑激活图，暖色表示激活较高，冷色表示激活较低。</desc>
  <defs>
    <linearGradient id="cardBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="warmCool" x1="0" x2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset=".48" stop-color="#facc15"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1e3a8a" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect x="10" y="10" width="880" height="340" rx="26" fill="url(#cardBg)" stroke="#bfdbfe" stroke-width="2"/>
  <path d="M52 70 H848" stroke="#dbeafe" stroke-width="2" stroke-dasharray="5 10"/>
  <text x="450" y="48" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="25" font-weight="800" fill="#1e3a8a">头环工作原理</text>

  <g font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif">
    <g transform="translate(44 94)" filter="url(#softShadow)">
      <rect width="144" height="218" rx="18" fill="#fff" stroke="#dbeafe"/>
      <circle cx="72" cy="74" r="42" fill="#fee2d5" stroke="#f3b48e" stroke-width="2"/>
      <path d="M35 72 C45 34 99 34 109 72" fill="none" stroke="#172554" stroke-width="10" stroke-linecap="round"/>
      <path d="M33 62 C58 45 88 45 111 62" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
      <rect x="47" y="48" width="10" height="20" rx="5" fill="#0ea5e9"/>
      <rect x="87" y="48" width="10" height="20" rx="5" fill="#0ea5e9"/>
      <path d="M46 125 C61 140 84 140 99 125" fill="none" stroke="#1e3a8a" stroke-width="4" stroke-linecap="round"/>
      <text x="72" y="170" text-anchor="middle" font-size="17" font-weight="800" fill="#1e3a8a">1. 佩戴头环</text>
      <text x="72" y="196" text-anchor="middle" font-size="12" fill="#475569">戴在前额附近</text>
    </g>

    <path d="M206 192 H260" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

    <g transform="translate(272 94)" filter="url(#softShadow)">
      <rect width="144" height="218" rx="18" fill="#fff" stroke="#dbeafe"/>
      <path d="M42 68 C54 34 93 34 105 68 C113 92 99 119 72 124 C45 119 31 92 42 68Z" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
      <path d="M57 61 C72 73 85 76 102 72" fill="none" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
      <path d="M52 85 C70 76 88 93 103 86" fill="none" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
      <path d="M29 48 L68 78" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
      <path d="M22 72 L67 91" stroke="#fb923c" stroke-width="5" stroke-linecap="round"/>
      <path d="M113 46 L78 78" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
      <text x="72" y="170" text-anchor="middle" font-size="17" font-weight="800" fill="#1e3a8a">2. 发射近红外光</text>
      <text x="72" y="196" text-anchor="middle" font-size="12" fill="#475569">光进入脑组织</text>
    </g>

    <path d="M434 192 H488" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

    <g transform="translate(500 94)" filter="url(#softShadow)">
      <rect width="144" height="218" rx="18" fill="#fff" stroke="#dbeafe"/>
      <path d="M33 83 C60 50 84 122 111 74" fill="none" stroke="#ef4444" stroke-width="9" stroke-linecap="round"/>
      <path d="M35 122 C62 89 87 154 111 111" fill="none" stroke="#2563eb" stroke-width="9" stroke-linecap="round"/>
      <circle cx="49" cy="75" r="8" fill="#ef4444"/>
      <circle cx="85" cy="105" r="8" fill="#f97316"/>
      <circle cx="60" cy="132" r="8" fill="#2563eb"/>
      <circle cx="106" cy="116" r="8" fill="#3b82f6"/>
      <text x="72" y="170" text-anchor="middle" font-size="17" font-weight="800" fill="#1e3a8a">3. 检测血氧变化</text>
      <text x="72" y="196" text-anchor="middle" font-size="12" fill="#475569">吸收和反射会变化</text>
    </g>

    <path d="M662 192 H716" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

    <g transform="translate(728 94)" filter="url(#softShadow)">
      <rect width="144" height="218" rx="18" fill="#fff" stroke="#dbeafe"/>
      <rect x="28" y="38" width="88" height="70" rx="8" fill="#0f172a"/>
      <path d="M53 72 C58 47 91 49 94 72 C96 94 77 101 61 95 C50 90 48 81 53 72Z" fill="#1d4ed8"/>
      <circle cx="61" cy="72" r="13" fill="#ef4444" opacity=".88"/>
      <circle cx="82" cy="72" r="12" fill="#facc15" opacity=".9"/>
      <circle cx="73" cy="87" r="15" fill="#38bdf8" opacity=".78"/>
      <rect x="55" y="110" width="34" height="8" rx="3" fill="#64748b"/>
      <rect x="43" y="121" width="58" height="7" rx="3" fill="#94a3b8"/>
      <rect x="31" y="137" width="82" height="12" rx="6" fill="url(#warmCool)"/>
      <text x="72" y="170" text-anchor="middle" font-size="17" font-weight="800" fill="#1e3a8a">4. 生成脑激活图</text>
      <text x="72" y="196" text-anchor="middle" font-size="12" fill="#475569">电脑转化数据</text>
    </g>

    <g transform="translate(110 318)">
      <rect x="0" y="-16" width="680" height="26" rx="13" fill="#ffffff" stroke="#dbeafe"/>
      <text x="340" y="-44" text-anchor="middle" font-size="17" font-weight="800" fill="#1e3a8a">5. 颜色表示激活程度</text>
      <rect x="18" y="-8" width="180" height="10" rx="5" fill="#2563eb"/>
      <rect x="250" y="-8" width="180" height="10" rx="5" fill="#facc15"/>
      <rect x="482" y="-8" width="180" height="10" rx="5" fill="#ef4444"/>
      <text x="108" y="-23" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">冷色：激活较低</text>
      <text x="340" y="-23" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">黄色：中等变化</text>
      <text x="572" y="-23" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">暖色：激活较高</text>
    </g>
  </g>
</svg>
