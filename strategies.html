    .field { margin-bottom: 18px; }
    label { display: block; margin-bottom: 7px; color: #344054; font-size: 14px; font-weight: 700; }
    input, textarea, select { width: 100%; border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 8px; padding: 11px 12px; outline: none; }
    textarea { min-height: 112px; resize: vertical; }

          totalCount: KNOWLEDGE_QUIZ.items.length,

      }
      merged.history = history;

    function mergeState(base, incoming) {
      const merged = structuredClone(base);
      const incomingRecords = Array.isArray(incoming.records) ? incoming.records : [];
      const removedCodeRecords = incomingRecords.some(isCodeMaterialRecord);
      Object.assign(merged, incoming);
      merged.fields = Object.assign({}, base.fields, incoming.fields || {});
      migrateTeamResultFields(merged.fields);
      if (merged.fields.strategy1 === "简单复述") merged.fields.strategy1 = "主动回忆";
      merged.fields.stage1Strategy = "简单复述";
      [1, 2].forEach((round) => {
        const field = `round${round}MaterialType`;
        if (merged.fields[field] === "code") merged.fields[field] = "word";
      });
      merged.fields.strategyMatchSelections = Object.assign({}, base.fields.strategyMatchSelections, incoming.fields?.strategyMatchSelections || {});
      ["material1", "material2", "material3", "material4"].forEach((key) => {
        if (!Array.isArray(merged.fields.strategyMatchSelections[key])) merged.fields.strategyMatchSelections[key] = [];
      });
      merged.records = migrateExperimentRecords(incomingRecords);
      const incomingHistory = Array.isArray(incoming.attemptHistory) ? incoming.attemptHistory : incomingRecords;
      merged.attemptHistory = dedupeAttemptHistory(incomingHistory.filter((record) => !isCodeMaterialRecord(record)));
      merged.strategyScores = Array.isArray(incoming.strategyScores) ? incoming.strategyScores : [];
      merged.surveys = mergeSurveys(incoming.surveys);
      merged.knowledgeQuiz = mergeKnowledgeQuiz(incoming.knowledgeQuiz);
      if (!incoming.surveys) merged.currentStep = 0;
      if (incoming.flowVersion !== FLOW_VERSION) {
        merged.currentStep = migrateLegacyStepIndex(merged.currentStep);
        merged.maxUnlockedStep = migrateLegacyStepIndex(merged.maxUnlockedStep);
      }
      if (removedCodeRecords) {
        merged.currentStep = Math.min(Number(merged.currentStep) || 0, 3);
        merged.maxUnlockedStep = Math.min(Number(merged.maxUnlockedStep) || 0, 3);
      }
      merged.flowVersion = FLOW_VERSION;
      return merged;
    }
    function isCodeMaterialRecord(record) {
      if (record?.materialType === "code") return true;
      return getRecordMaterialDetails(record).some((item) => item?.type === "code");
    }
    function getAttemptHistoryKey(record, index = 0) {
      return record?.runId || `${getRecordCombinationKey(record) || "legacy"}|${record?.createdAt || ""}|${record?.items || ""}|${index}`;
    }
    function dedupeAttemptHistory(records) {
      const byKey = new Map();

    function migrateExperimentRecords(records) {
      const source = Array.isArray(records) ? records : [];
      const withoutCodeMaterials = source.filter((record) => !isCodeMaterialRecord(record));

      withoutCodeMaterials.forEach((record, index) => {
        const key = getRecordCombinationKey(record);
        if (key) lastIndexByCombination.set(key, index);

      return withoutCodeMaterials.filter((record, index) => {
        const key = getRecordCombinationKey(record);
        return !key || lastIndexByCombination.get(key) === index;
      });

          if (correct) fields[correctField] = correct[1];

          if (accuracy) fields[accuracyField] = accuracy[1];
        }
      });
    }

        renderKnowledgeQuizHistory(summary) +
      '</section>';
    }

    function formatQuizRecord(record) {
      if (!record) return '暂无';
      const time = record.submittedAt ? new Date(record.submittedAt).toLocaleString() : '';
      return record.score + ' / 100（' + record.correctCount + ' / ' + record.totalCount + '，' + record.accuracy + '%）' + (time ? ' · ' + time : '');
    }

    function renderKnowledgeQuizHistory(summary) {
      if (!summary.history.length) {
        return '<section class="quiz-history"><h4>提交记录</h4><div class="quiz-result"><div>暂无提交记录</div></div></section>';
      }
      return '<section class="quiz-history"><h4>提交记录</h4>' +
        '<div class="survey-summary quiz-history-summary">' +
          '<div><strong>' + formatQuizRecord(summary.first) + '</strong><span>首次提交成绩</span></div>' +
          '<div><strong>' + formatQuizRecord(summary.highest) + '</strong><span>最高成绩</span></div>' +
          '<div><strong>' + formatQuizRecord(summary.last) + '</strong><span>最后一次成绩</span></div>' +
          '<div><strong>' + summary.submitCount + '</strong><span>提交次数</span></div>' +
        '</div>' +
        '<div class="quiz-history-table"><table><thead><tr><th>次数</th><th>提交时间</th><th>得分</th><th>正确题数</th><th>总题数</th><th>正确率</th></tr></thead><tbody>' +
          summary.history.map((record) => '<tr><td>' + record.attemptNumber + '</td><td>' + escapeHtml(record.submittedAt ? new Date(record.submittedAt).toLocaleString() : '') + '</td><td>' + record.score + ' / 100</td><td>' + record.correctCount + '</td><td>' + record.totalCount + '</td><td>' + record.accuracy + '%</td></tr>').join('') +
        '</tbody></table></div></section>';
    }

    function renderKnowledgeQuizMessage(score) {
      if (score === 100) return '<div class="quiz-message">🎉 恭喜你成功破解本案件！</div>';
      if (score < 60) return '<div class="quiz-message is-warning">💡 建议再次回顾本次探究过程，寻找更多证据。</div>';
      return '<div class="quiz-message">继续保持，用证据完善你的判断。</div>';
    }

    function bindKnowledgeQuizInputs() {
      main.querySelectorAll('[data-quiz-question]').forEach((input) => {
        input.addEventListener('change', () => {
          state.knowledgeQuiz = mergeKnowledgeQuiz(state.knowledgeQuiz);
          state.knowledgeQuiz.answers[input.dataset.quizQuestion] = input.value;
          saveState();
          renderApp();
        });
      });
      const submit = document.getElementById('submitKnowledgeQuizBtn');
      if (submit) submit.addEventListener('click', submitKnowledgeQuiz);
    }

    function submitKnowledgeQuiz() {
      state.knowledgeQuiz = mergeKnowledgeQuiz(state.knowledgeQuiz);
      const unanswered = KNOWLEDGE_QUIZ.items.some((_, index) => !state.knowledgeQuiz.answers['q' + (index + 1)]);
      if (unanswered) {
        alert('请先完成全部案件知识验证题目。');
        return;
      }
      let correctCount = 0;
      const wrongQuestions = [];
      KNOWLEDGE_QUIZ.items.forEach((item, index) => {
        const itemKey = 'q' + (index + 1);
        if (state.knowledgeQuiz.answers[itemKey] === item.answer) correctCount += 1;
        else wrongQuestions.push(index + 1);
      });
      const totalCount = KNOWLEDGE_QUIZ.items.length;
      const score = totalCount ? Math.round((correctCount / totalCount) * 100) : 0;
      const submittedAt = new Date().toISOString();
      const record = normalizeKnowledgeQuizRecord({
        attemptNumber: state.knowledgeQuiz.history.length + 1,
        submittedAt,
        score,
        correctCount,
        totalCount,
        accuracy: score,
        answers: state.knowledgeQuiz.answers,
        wrongQuestions
      }, state.knowledgeQuiz.history.length);
      state.knowledgeQuiz.history.push(record);
      state.knowledgeQuiz.correctCount = record.correctCount;
      state.knowledgeQuiz.score = record.score;
      state.knowledgeQuiz.submitted = true;
      state.knowledgeQuiz.submittedAt = record.submittedAt;
      state.knowledgeQuiz.wrongQuestions = record.wrongQuestions;
      saveState();
      renderApp();
    }

    function bindSurveyInputs() {
      main.querySelectorAll("[data-survey]").forEach((input) => {
        input.addEventListener("change", () => {
          const surveyKey = input.dataset.survey;
          const questionKey = input.dataset.question;
          state.surveys = mergeSurveys(state.surveys);
          state.surveys[surveyKey][questionKey] = Number(input.value);
          saveState();

    function summarizeSurvey(surveyKey, defKey) {
      const def = SURVEY_DEFS[defKey];
      const answers = state.surveys?.[surveyKey] || {};
      const values = def.items.map((_, index) => Number(answers['q' + (index + 1)] || 0)).filter(Boolean);
      const total = values.reduce((sum, value) => sum + value, 0);
      return { answered: values.length, total, average: values.length ? Number((total / values.length).toFixed(2)) : 0, complete: values.length === def.items.length };
    }

    function isSurveyStepComplete(stepId) {
      if (stepId === "posttest") return summarizeSurvey("postMeta", "meta").complete && summarizeSurvey("cognitiveLoad", "load").complete && summarizeSurvey("inquiryParticipation", "inquiry").complete;
      return true;
    }

    function getSurveySheets() {
      const makeSheet = (title, surveyKey, defKey) => {
        const def = SURVEY_DEFS[defKey];
        const answers = state.surveys?.[surveyKey] || {};
        const summary = summarizeSurvey(surveyKey, defKey);
        return [title, [
          ["题号", "题目", "得分"],
          ...def.items.map((item, index) => [String(index + 1), item, answers['q' + (index + 1)] || ""]),
          ["合计", "总分", summary.total],
          ["合计", "均分", summary.average]
        ]];
      };
      const post = summarizeSurvey("postMeta", "meta");
      const load = summarizeSurvey("cognitiveLoad", "load");
      const inquiry = summarizeSurvey("inquiryParticipation", "inquiry");
      return [
        makeSheet("学习收获调查", "postMeta", "meta"),
        makeSheet("侦探小结-认知负荷", "cognitiveLoad", "load"),
        makeSheet("侦探小结-探究参与", "inquiryParticipation", "inquiry"),
        ["问卷汇总", [
          ["问卷", "已答题数", "总分", "均分", "完成情况"],
          ["学习收获调查", post.answered, post.total, post.average, post.complete ? "已完成" : "未完成"],
          ["侦探小结认知负荷", load.answered, load.total, load.average, load.complete ? "已完成" : "未完成"],
          ["侦探小结科学探究参与", inquiry.answered, inquiry.total, inquiry.average, inquiry.complete ? "已完成" : "未完成"]
        ]],
        getKnowledgeQuizSheet()
      ];
    }

    function renderStrategyReadingMaterials() {
      return `
        <article class="reading-card"><h4>材料一</h4><p>大脑平均每天产生约70,000个想法，长时记忆的形成涉及突触可塑性的改变。当海马体（大脑边缘系统的组成部分）反复处理相同信息时，神经元之间的连接会增强。这个过程被称为长时程增强(LTP)，与短期记忆的电子信号传递不同。</p><p>——《记忆：从大脑到分子》</p></article>
        <article class="reading-card"><h4>材料二</h4><p>长时记忆可分为情景记忆（例如，记得去年生日派对）和语义记忆（例如，知道巴黎是法国首都）。有趣的是，调查显示90%的人能记住自己7岁时的某个情景。程序记忆（例如，骑自行车）则存储在小脑中，这种记忆往往通过身体练习形成。</p><p>——《情景记忆和语义记忆》</p></article>
        <article class="reading-card"><h4>材料三</h4><p>赫尔曼·艾宾浩斯通过无意义音节（如ZOF）实验发现，遗忘在学习后立即开始，20分钟后遗忘41.8%。现代研究证实，间隔复习可以打破这种曲线。此外，主动回忆比被动重读有效2-3倍，且将新知识与已有知识关联可提升记忆效率。</p><p>——《记忆：对实验心理学的贡献》</p></article>
        <article class="reading-card"><h4>材料四</h4><p>一个探索记忆策略有效性的研究在近1000项实验的基础上得出结论，提取线索（关键信息，例如单词首字母）效果值达0.93，而划重点只有0.22。分散学习比集中学习效率高50%，但需要精确安排间隔时间。值得注意的是，将信息可视化（例如，思维导图或图像）能同时激活视觉和语言皮层。</p><p>——《运用有效的学习技巧提升学生的学习效果》</p></article>
      `;
    }

    function renderPlanMaterials() {
      return `
        <details class="material-details" open><summary>材料五</summary><div class="material-details-body">
          <p>心理学家亨利·罗迪格（Henry Roediger）在2006年进行了一项关于主动提取如何影响长时记忆的重要实验。首先选取了40组斯瓦希里语-英语单词组作为记忆材料，比如"mashua-boat"这样的组合。将参与者随机分成两组，一组采用传统的重复学习方法，另一组则采用主动提取的方式。在第一阶段的学习中，所有参与者都会完整地学习一遍40组单词对，每组单词会呈现5秒钟，让参与者形成初步记忆。</p>
          <p>接下来的练习阶段体现出了关键差异：重复学习组的参与者会再次完整地阅读所有单词对4遍，每次阅读的顺序都随机打乱，模拟了"死记硬背"的学习方法；而主动提取组的参与者则只阅读单词对1遍，之后就要面对3轮回忆测试。在回忆阶段，研究人员会单独呈现斯瓦希里语单词，比如"mashua"，参与者需要通过主动提取来回忆对应的英语释义"boat"。</p>
          <p>随后，研究人员对所有参与者进行了突袭测试，要求他们根据斯瓦希里语单词回忆对应的英语释义，以此来评估长时记忆的保持效果。测试结果非常明显：主动提取组的平均正确率达到了80%左右，而重复学习组只有约30%的正确率。这个差距有力地证明了主动回忆比被动复习更能促进长时记忆的保持。</p>
        </div></details>
        <details class="material-details"><summary>材料六</summary><div class="material-details-body">
          <p>本次长时记忆探究活动中，头环将成为探索记忆奥秘的重要科学工具，它能帮助我们“看到”大脑在记忆时的活动情况。</p>
          <p>头环主要通过两种方式来监测大脑活动：一种是记录脑电波（EEG），就像给大脑的活动“录音”；另一种是检测血流变化（fNIRS），相当于观察大脑哪个区域在工作时会“充血”。在实验中，当你使用不同的记忆方法时，头环会实时记录下大脑的反应，并通过软件将这些数据转化成直观的图表和3D脑图。在证据搜集环节，头环可以帮助你获得更科学的实验数据（例如，当用分组记忆法背单词时，头环能显示大脑哪些区域被激活），这些数据会成为研究假设的有力证据。在信息处理阶段，可以将头环采集到的脑活动热力图与回忆率进行对比分析，看看哪种记忆方法能让大脑更活跃，记忆效果更好。在得出结论时，头环提供的数据会让结论更有说服力。例如，如果数据显示使用图像联想记忆法时，大脑的视觉区域特别活跃，同时回忆率也最高，那么就可得出相应的科学结论。</p>
          <p>使用头环时要注意：保持额头清洁，确保电极贴片贴紧；实验过程中保持专注；认真记录每个环节的数据变化。希望你能善用这个工具，在探究活动中获得更多发现！</p>

            </picture>
          </div>

    function getStrategyMatchMaterials() {
      return [
        { key: "material1", title: "材料一", text: "大脑平均每天产生约70,000个想法，长时记忆的形成涉及突触可塑性的改变。当海马体（大脑边缘系统的组成部分）反复处理相同信息时，神经元之间的连接会增强。这个过程被称为长时程增强(LTP)，与短期记忆的电子信号传递不同。", source: "——《记忆：从大脑到分子》" },
        { key: "material2", title: "材料二", text: "长时记忆可分为情景记忆（例如，记得去年生日派对）和语义记忆（例如，知道巴黎是法国首都）。有趣的是，调查显示90%的人能记住自己7岁时的某个情景。程序记忆（例如，骑自行车）则存储在小脑中，这种记忆往往通过身体练习形成。", source: "——《情景记忆和语义记忆》" },
        { key: "material3", title: "材料三", text: "赫尔曼·艾宾浩斯通过无意义音节（如ZOF）实验发现，遗忘在学习后立即开始，20分钟后遗忘41.8%。现代研究证实，间隔复习可以打破这种曲线。此外，主动回忆比被动重读有效2-3倍，且将新知识与已有知识关联可提升记忆效率。", source: "——《记忆：对实验心理学的贡献》" },

    function getRecordCombinationKey(record) {

    }
    function saveLatestCombinationRecord(records, record) {
      const key = getRecordCombinationKey(record);
      const existingIndex = key ? records.findIndex((item) => getRecordCombinationKey(item) === key) : -1;
      if (existingIndex >= 0) records.splice(existingIndex, 1, record);
      else records.push(record);
      return existingIndex >= 0;
    }
    function getCompletedCombinationKeys() {
      return new Set((state.records || []).map(getRecordCombinationKey).filter(Boolean));
    }
    function hasRequiredCombinationRecords() {
      const completed = getCompletedCombinationKeys();
      return ["1-1", "1-2", "2-1", "2-2"].every((key) => completed.has(key));

    function renderEvidenceStep() {

      </div></div>`;
    }
    function getPersonalStrategyResult(summary) {
      const result = getPersonalStrategyMetrics(summary);
      return result ? `平均正确数 ${result.avgCorrect}，平均回忆率 ${result.avgAccuracy}%` : "";
    }
    function getPersonalStrategyMetrics(summary) {
      const items = summary || summarizeRecords();
      if (!items.length) return null;
      return {
        avgCorrect: Number((items.reduce((sum, item) => sum + Number(item.avgCorrect || 0), 0) / items.length).toFixed(1)),
        avgAccuracy: Math.round(items.reduce((sum, item) => sum + Number(item.avgAccuracy || 0), 0) / items.length)
      };
    }
    function renderResultNumberInput(field, placeholder = "数字") {
      return `<input class="result-number-input" type="number" min="0" step="0.1" data-field="${field}" value="${escapeHtml(state.fields[field])}" placeholder="${placeholder}">`;

      (state.records || []).forEach((record) => {
        getRecordMaterialDetails(record).forEach((item) => {
          if (item.type === plan.materialType && item.id) allUsed.add(item.id);
          if (Number(record.round) === Number(round) && Number(record.stage) !== Number(stage) && item.type === plan.materialType && item.id) oppositeStageUsed.add(item.id);

      const selectedItems = [];
      ["low", "mid", "high"].forEach((difficulty) => {
        const count = plan.difficultyCounts[difficulty];

        const fresh = shuffle(pool.filter((item) => !allUsed.has(item.id)));
        const safeReuse = shuffle(pool.filter((item) => !oppositeStageUsed.has(item.id) && !fresh.some((freshItem) => freshItem.id === item.id)));
