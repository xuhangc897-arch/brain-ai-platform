    function createDefaultSurveys() {
      return { preMeta: {}, postMeta: {}, cognitiveLoad: {}, inquiryParticipation: {} };
    }

    function mergeSurveys(incoming = {}) {
      const merged = createDefaultSurveys();
      Object.keys(merged).forEach((key) => {
        merged[key] = Object.assign({}, merged[key], incoming[key] || {});
      });
      return merged;
    }

    const defaultState = {
      studentName: "",
      studentAge: "",
      studentId: "",
      groupId: "",
      currentStep: 0,
      maxUnlockedStep: 0,
      fields: {
        question: "",
        hypothesis1: "",
        hypothesis2: "",
        stage1Strategy: "简单复述",
        strategy1: "主动回忆",
        strategy2: "信息可视化",
        strategyMatchSelections: { material1: [], material2: [], material3: [], material4: [] },
        strategyMatchConfirmed: false,
        strategyMatchMessage: "",
        materialType: "word",
        lowCount: 2,
        midCount: 2,
        highCount: 2,
        memorySeconds: 60,
        puzzleSeconds: 45,
        testSeconds: 120,
        leader: "",
        recorder: "",
        memberA: "",
        memberB: "",
        headband: "",

        scoreUse: 3,

        surprise: "",
        applicability: "",

        teammate1Id: "",

        teammate2Id: "",
        teammate2Result: ""
      },
      records: [],

      surveys: createDefaultSurveys(),

    };
    let state = loadState();
    let session = null;
    let timerId = null;
    let tickId = null;
    let phaseStartedAt = 0;
    const progress = document.getElementById("progress");
    const main = document.getElementById("main");
    const identityPill = document.getElementById("identityPill");
    function loadState() {
      let saved = null;
      try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null"); } catch (event) { localStorage.removeItem(STORAGE_KEY); }
      const merged = mergeState(defaultState, saved || {});
      try {
        const context = JSON.parse(localStorage.getItem(CONTEXT_KEY) || "null");
        if (context) {
          merged.studentName = context.studentName || merged.studentName || "";
          merged.studentAge = context.studentAge || merged.studentAge || "";
          merged.studentId = context.studentId || merged.studentId;
          merged.groupId = context.groupId || merged.groupId;
        }
      } catch (event) { localStorage.removeItem(CONTEXT_KEY); }
      return merged;
    }
    function mergeState(base, incoming) {
      const merged = structuredClone(base);
      Object.assign(merged, incoming);
      merged.fields = Object.assign({}, base.fields, incoming.fields || {});
      if (merged.fields.strategy1 === "简单复述") merged.fields.strategy1 = "主动回忆";
      merged.fields.stage1Strategy = "简单复述";
      merged.fields.strategyMatchSelections = Object.assign({}, base.fields.strategyMatchSelections, incoming.fields?.strategyMatchSelections || {});
      ["material1", "material2", "material3", "material4"].forEach((key) => {
        if (!Array.isArray(merged.fields.strategyMatchSelections[key])) merged.fields.strategyMatchSelections[key] = [];
      });
      merged.records = Array.isArray(incoming.records) ? incoming.records : [];
      merged.strategyScores = Array.isArray(incoming.strategyScores) ? incoming.strategyScores : [];
      merged.surveys = mergeSurveys(incoming.surveys);
      if (!incoming.surveys) merged.currentStep = 0;
      return merged;
    }
    function normalizeCurrentStep() {
      normalizeStepAccess();
      if (!isDeveloperMode()) saveState();
    }

    function isDeveloperMode() {
      return sessionStorage.getItem(DEV_MODE_KEY) === "true";
    }

    function enableDeveloperMode() {
      const password = window.prompt("请输入开发者密码");
      if (password !== "memory") {
        alert("密码错误，无法开启开发者模式。");
        return;
      }
      sessionStorage.setItem(DEV_MODE_KEY, "true");
      alert("开发者模式已开启，可自由切换步骤。");
      renderApp();
    }

    function saveState() { state.savedAt = new Date().toISOString(); localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function escapeHtml(value) { return String(value ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
    function selected(field, value) { return state.fields[field] === value ? "selected" : ""; }
    function renderStrategySelect(field, value = state.fields[field], disabled = false) {
      return `<select data-field="${field}" ${disabled ? "disabled" : ""}>${MEMORY_STRATEGIES.map((strategy)=>`<option value="${strategy}" ${value === strategy ? "selected" : ""}>${strategy}</option>`).join("")}</select>`;
    }
    function formatMatchSelections() {
      const selections = state.fields.strategyMatchSelections || {};
      return ["material1", "material2", "material3", "material4"].map((key, index)=>`材料${index + 1}：${(selections[key] || []).join("、") || "未选择"}`).join("；");
    }
    function renderApp() {
      if (!state.studentId || !state.groupId) {
        main.innerHTML = `<section class="panel"><div class="panel-head"><h2>需要先填写学生编号和小组编号</h2><p>请返回实验选择页录入身份信息后再进入实验。</p></div><div class="panel-body"><button class="btn" type="button" onclick="location.href='index.html'">返回实验选择</button></div></section>`;

      normalizeCurrentStep();
      renderProgress();
      renderStep();
    }

    function clampStepIndex(value) {
      const index = Number(value);
      if (!Number.isInteger(index)) return 0;
      return Math.min(Math.max(index, 0), steps.length - 1);
    }

    function normalizeStepAccess() {
      const legacyCurrent = clampStepIndex(state.currentStep);
      if (!Number.isInteger(Number(state.maxUnlockedStep))) {
        state.maxUnlockedStep = legacyCurrent;
      } else {
        state.maxUnlockedStep = clampStepIndex(state.maxUnlockedStep);
      }
      state.currentStep = isDeveloperMode() ? legacyCurrent : Math.min(legacyCurrent, state.maxUnlockedStep);
    }

    function showStepMessage(message) {
      alert(message);
    }

    function goToStep(targetStep) {
      const target = clampStepIndex(targetStep);
      if (!isDeveloperMode() && target > state.maxUnlockedStep) {
        showStepMessage("请先完成前一步内容，再进入下一步。");
        return;
      }
      state.currentStep = target;
      if (!isDeveloperMode()) saveState();
      renderApp();
    }

    function goNextStep() {
      if (!validateStep(steps[state.currentStep].id)) {
        showStepMessage("请先完成本步骤内容。");
        return;
      }
      if (state.currentStep < steps.length - 1) {
        if (!isDeveloperMode()) state.maxUnlockedStep = Math.max(state.maxUnlockedStep || 0, state.currentStep + 1);
        state.currentStep += 1;
        if (!isDeveloperMode()) saveState();
        renderApp();
      }
    }

    function hasText(value) {
      return String(value ?? "").trim().length > 0;
    }

    function validateStep(stepId) {
      if (isDeveloperMode()) return true;
      if (!isSurveyStepComplete(stepId)) return false;
      const fields = state.fields || {};
      if (stepId === "question") return hasText(fields.question);
      if (stepId === "hypothesis") return fields.strategyMatchConfirmed === true && hasText(fields.hypothesis1) && hasText(fields.hypothesis2);
      if (stepId === "plan") return hasText(fields.strategy1) && hasText(fields.strategy2);
      if (stepId === "evidence") return Array.isArray(state.records) && state.records.length > 0;
      if (stepId === "analysis") return Array.isArray(state.records) && state.records.length > 0 && Array.isArray(state.strategyScores) && state.strategyScores.length > 0;
      if (stepId === "conclusion") return hasText(fields.conclusion);
      if (stepId === "reflection") return hasText(fields.designImprove) && hasText(fields.surprise) && hasText(fields.applicability);
      return true;
    }

    function renderProgress() {
      normalizeStepAccess();
      progress.innerHTML = steps.map((step, index) => {
        const isActive = index === state.currentStep;
        const isDone = index < state.maxUnlockedStep;
        const isLocked = !isDeveloperMode() && index > state.maxUnlockedStep;
        const cls = isActive ? "is-active" : isDone ? "is-done" : isLocked ? "is-locked" : "";
        const lockedAttrs = isLocked ? ' aria-disabled="true" title="请先完成前一步内容，再进入下一步。"' : '';
        return `<button class="progress-step ${cls}" type="button" data-step="${index}"${lockedAttrs}><strong>${index + 1}</strong><span>${step.title}</span></button>`;
      }).join("");
      progress.querySelectorAll("[data-step]").forEach((button) => {
        button.addEventListener("click", () => {
          goToStep(Number(button.dataset.step));
        });
      });
    }

    function renderStep() {
      const step = steps[state.currentStep];
      main.innerHTML = `<section class="panel"><div class="panel-head"><h2>${state.currentStep + 1}. ${step.title}</h2><p>建议时长：${step.minutes}</p></div><div class="panel-body">${getStepHtml(step.id)}${renderNavigation()}</div></section>`;
      bindInputs();
      bindStepEvents(step.id);
    }
    function renderNavigation() {
      const nextButton = state.currentStep === steps.length - 1 ? "" : '<button class="btn" type="button" id="nextStep">下一步</button>';
      return `<div class="actions"><button class="btn secondary" type="button" id="prevStep" ${state.currentStep === 0 ? "disabled" : ""}>上一步</button>${nextButton}</div>`;
    }
    function getStepHtml(stepId) {
      return {
        pretest: renderPretestStep,
        question: renderQuestionStep,
        hypothesis: renderHypothesisStep,
        plan: renderPlanStep,
        evidence: renderEvidenceStep,
        analysis: renderAnalysisStep,
        conclusion: renderConclusionStep,
        reflection: renderReflectionStep
      ,
        posttest: renderPosttestStep}[stepId]();
    }
    function renderPretestStep() { return renderSurveyPage("pretest"); }
    function renderPosttestStep() { return renderSurveyPage("posttest"); }

    function renderSurveyPage(kind) {
      if (kind === "pretest") {

          renderSurveyForm("preMeta", "meta") +

        renderSurveyForm("postMeta", "meta") +
        renderSurveyForm("cognitiveLoad", "load") +
        renderSurveyForm("inquiryParticipation", "inquiry") +
        renderSurveySummaryCards() +
        renderPosttestExportArea() +
      '</div>';

    function renderPosttestExportArea() {

    function renderSurveyForm(surveyKey, defKey) {
      const def = SURVEY_DEFS[defKey];

        '<div class="survey-card-head"><h4>' + def.title + '</h4><p class="survey-card-note">' + def.note + '</p></div>' +
        '<div class="survey-items">' +

            const itemKey = 'q' + (index + 1);
            return '<div class="survey-item"><p>' + (index + 1) + '. ' + escapeHtml(item) + '</p>' +
              '<div class="survey-scale" role="radiogroup" aria-label="' + escapeHtml(item) + '">' +
                def.scale.map((score) => {
                  const checked = Number(answers[itemKey]) === score;
                  const label = def.labels?.[score] || '';
                  return '<label class="survey-option ' + (checked ? 'is-selected' : '') + '">' +
                    '<input type="radio" name="' + surveyKey + '-' + itemKey + '" data-survey="' + surveyKey + '" data-question="' + itemKey + '" value="' + score + '" ' + (checked ? 'checked' : '') + '>' +

                }).join('') +
              '</div></div>';

        '</div></section>';

    function renderSurveySummaryCards() {
      const pre = summarizeSurvey("preMeta", "meta");
      const post = summarizeSurvey("postMeta", "meta");

      const inquiry = summarizeSurvey("inquiryParticipation", "inquiry");
      const delta = post.answered && pre.answered ? Number((post.total - pre.total).toFixed(1)) : "待完成";
      return '<div class="survey-summary">' +
        '<div><strong>' + (pre.total || '待完成') + '</strong><span>前测元认知总分</span></div>' +

          saveState();
          renderApp();
        });

    }

    function summarizeSurvey(surveyKey, defKey) {
      const def = SURVEY_DEFS[defKey];
      const answers = state.surveys?.[surveyKey] || {};
      const values = def.items.map((_, index) => Number(answers['q' + (index + 1)] || 0)).filter(Boolean);
      const total = values.reduce((sum, value) => sum + value, 0);
      return { answered: values.length, total, average: values.length ? Number((total / values.length).toFixed(2)) : 0, complete: values.length === def.items.length };
    }

    function isSurveyStepComplete(stepId) {
      if (stepId === "pretest") return summarizeSurvey("preMeta", "meta").complete;
      if (stepId === "posttest") return summarizeSurvey("postMeta", "meta").complete && summarizeSurvey("cognitiveLoad", "load").complete && summarizeSurvey("inquiryParticipation", "inquiry").complete;
      return true;
    }

    function getSurveySheets() {
      const makeSheet = (title, surveyKey, defKey) => {
        const def = SURVEY_DEFS[defKey];
        const answers = state.surveys?.[surveyKey] || {};
        const summary = summarizeSurvey(surveyKey, defKey);
        return [title, [
          ["题号", "题目", "得分"],
          ...def.items.map((item, index) => [String(index + 1), item, answers['q' + (index + 1)] || ""]),
          ["合计", "总分", summary.total],
          ["合计", "均分", summary.average]
        ]];
      };
      const pre = summarizeSurvey("preMeta", "meta");
      const post = summarizeSurvey("postMeta", "meta");
      const load = summarizeSurvey("cognitiveLoad", "load");
      const inquiry = summarizeSurvey("inquiryParticipation", "inquiry");
      return [
        makeSheet("前测-元认知", "preMeta", "meta"),
        makeSheet("后测-元认知", "postMeta", "meta"),
        makeSheet("后测-认知负荷", "cognitiveLoad", "load"),
        makeSheet("后测-探究参与", "inquiryParticipation", "inquiry"),
        ["问卷汇总", [
          ["问卷", "已答题数", "总分", "均分", "完成情况"],
          ["前测元认知", pre.answered, pre.total, pre.average, pre.complete ? "已完成" : "未完成"],
          ["后测元认知", post.answered, post.total, post.average, post.complete ? "已完成" : "未完成"],
          ["元认知前后测变化", "", Number((post.total - pre.total).toFixed(1)), "", pre.complete && post.complete ? "可比较" : "待补全"],
          ["后测认知负荷", load.answered, load.total, load.average, load.complete ? "已完成" : "未完成"],
          ["后测科学探究参与", inquiry.answered, inquiry.total, inquiry.average, inquiry.complete ? "已完成" : "未完成"]
        ]]
      ];
    }


    function renderInquiryScaffold(type) {
      if (type === "hypothesis") {
        return '<div class="inquiry-helper">' +
          '<div class="helper-card"><h4>\u7814\u7a76\u5047\u8bbe\u601d\u8003\u70b9</h4><ul><li>\u5b83\u662f\u5426\u56de\u5e94\u4e86\u4f60\u4eec\u7684\u7814\u7a76\u95ee\u9898\uff1f</li><li>\u5b83\u662f\u5426\u8bf4\u660e\u4e86\u4f60\u4eec\u5bf9\u7ed3\u679c\u7684\u9884\u6d4b\uff1f</li><li>\u5b83\u662f\u5426\u53ef\u4ee5\u88ab\u540e\u9762\u7684\u6570\u636e\u652f\u6301\u6216\u53cd\u9a73\uff1f</li></ul></div>' +
        '</div>';
      }
      return '<div class="inquiry-helper">' +
        '<div class="helper-card"><h4>\u7814\u7a76\u95ee\u9898\u601d\u8003\u70b9</h4><ul><li>\u4f60\u4eec\u60f3\u89c2\u5bdf\u6216\u6bd4\u8f83\u7684\u73b0\u8c61\u662f\u4ec0\u4e48\uff1f</li><li>\u95ee\u9898\u4e2d\u7684\u53d8\u91cf\u662f\u5426\u6bd4\u8f83\u6e05\u695a\uff1f</li><li>\u662f\u5426\u80fd\u901a\u8fc7\u5b9e\u9a8c\u8bb0\u5f55\u6216\u6570\u636e\u6765\u5bfb\u627e\u8bc1\u636e\uff1f</li></ul></div>' +
      '</div>';
    }

    function renderInquiryCases() {

        { title: "\u5de7\u514b\u529b\u4e0e\u8bb0\u5fc6", question: "\u6444\u5165\u5c11\u91cf\u5de7\u514b\u529b\u662f\u5426\u4f1a\u5f71\u54cd\u5b66\u751f\u5bf9\u8bcd\u8bed\u7684\u56de\u5fc6\u6570\u91cf\uff1f", hypothesis: "\u76f8\u6bd4\u4e8e\u672a\u6444\u5165\u5de7\u514b\u529b\uff0c\u6444\u5165\u5c11\u91cf\u5de7\u514b\u529b\u53ef\u80fd\u4f1a\u6539\u53d8\u8bcd\u8bed\u56de\u5fc6\u6570\u91cf\u3002" },
        { title: "\u7761\u7720\u4e0e\u5b66\u4e60\u6548\u679c", question: "\u4e0d\u540c\u7761\u7720\u65f6\u957f\u662f\u5426\u4f1a\u5f71\u54cd\u7b2c\u4e8c\u5929\u7684\u5355\u8bcd\u6d4b\u9a8c\u6210\u7ee9\uff1f", hypothesis: "\u76f8\u6bd4\u4e8e\u7761\u7720\u65f6\u95f4\u8f83\u77ed\uff0c\u7761\u7720\u65f6\u95f4\u8f83\u5145\u8db3\u53ef\u80fd\u4f1a\u5bfc\u81f4\u6d4b\u9a8c\u6210\u7ee9\u66f4\u9ad8\u3002" },

        { title: "\u7c73\u52d2\u8bb0\u5fc6\u5bb9\u91cf\u5b9e\u9a8c", question: "\u4fe1\u606f\u5355\u4f4d\u6570\u91cf\u662f\u5426\u4f1a\u5f71\u54cd\u53c2\u4e0e\u8005\u51c6\u786e\u590d\u8ff0\u7684\u8868\u73b0\uff1f", hypothesis: "\u76f8\u6bd4\u4e8e\u4fe1\u606f\u5355\u4f4d\u8f83\u5c11\u65f6\uff0c\u4fe1\u606f\u5355\u4f4d\u8f83\u591a\u53ef\u80fd\u4f1a\u5bfc\u81f4\u51c6\u786e\u590d\u8ff0\u7387\u4e0b\u964d\u3002" },
        { title: "\u65af\u7279\u9c81\u666e\u5b9e\u9a8c", question: "\u989c\u8272\u8bcd\u7684\u8bcd\u4e49\u4e0e\u58a8\u8272\u662f\u5426\u4e00\u81f4\u4f1a\u5f71\u54cd\u989c\u8272\u547d\u540d\u901f\u5ea6\uff1f", hypothesis: "\u76f8\u6bd4\u4e8e\u8bcd\u4e49\u4e0e\u58a8\u8272\u4e00\u81f4\u65f6\uff0c\u4e0d\u4e00\u81f4\u6761\u4ef6\u53ef\u80fd\u4f1a\u5bfc\u81f4\u547d\u540d\u65f6\u95f4\u53d8\u957f\u3002" }

      return '<div class="case-list"><div class="template-card"><h4>\u79d1\u5b66\u63a2\u7a76\u6848\u4f8b</h4><p>\u4ee5\u4e0b\u6848\u4f8b\u53ea\u4f5c\u4e3a\u7075\u611f\u53c2\u8003\uff0c\u53ef\u4ee5\u5b66\u4e60\u601d\u8003\u65b9\u5f0f\uff0c\u4e0d\u9700\u8981\u7167\u7740\u53e5\u5f0f\u5199\u3002</p></div>' +
        cases.map((item) => '<details class="case-card"><summary>' + item.title + '</summary><div class="case-body"><p><strong>\u7814\u7a76\u95ee\u9898\uff1a</strong>' + item.question + '</p><p><strong>\u7814\u7a76\u5047\u8bbe\uff1a</strong>' + item.hypothesis + '</p><div class="case-tags"><span class="case-tag">\u2713 \u6709\u660e\u786e\u53d8\u91cf</span><span class="case-tag">\u2713 \u53ef\u4ee5\u9a8c\u8bc1</span><span class="case-tag">\u2713 \u6709\u53ef\u6d4b\u91cf\u7ed3\u679c</span></div></div></details>').join('') +
      '</div>';
    }

    function renderStrategyReadingMaterials() {
      return `
        <article class="reading-card"><h4>材料一</h4><p>大脑平均每天产生约70,000个想法，长时记忆的形成涉及突触可塑性的改变。当海马体（大脑边缘系统的组成部分）反复处理相同信息时，神经元之间的连接会增强。这个过程被称为长时程增强(LTP)，与短期记忆的电子信号传递不同。</p><p>——《记忆：从大脑到分子》</p></article>
        <article class="reading-card"><h4>材料二</h4><p>长时记忆可分为情景记忆（例如，记得去年生日派对）和语义记忆（例如，知道巴黎是法国首都）。有趣的是，调查显示90%的人能记住自己7岁时的某个情景。程序记忆（例如，骑自行车）则存储在小脑中，这种记忆往往通过身体练习形成。</p><p>——《情景记忆和语义记忆》</p></article>
        <article class="reading-card"><h4>材料三</h4><p>赫尔曼·艾宾浩斯通过无意义音节（如ZOF）实验发现，遗忘在学习后立即开始，20分钟后遗忘41.8%。现代研究证实，间隔复习可以打破这种曲线。此外，主动回忆比被动重读有效2-3倍，且将新知识与已有知识关联可提升记忆效率。</p><p>——《记忆：对实验心理学的贡献》</p></article>
        <article class="reading-card"><h4>材料四</h4><p>一个探索记忆策略有效性的研究在近1000项实验的基础上得出结论，提取线索（关键信息，例如单词首字母）效果值达0.93，而划重点只有0.22。分散学习比集中学习效率高50%，但需要精确安排间隔时间。值得注意的是，将信息可视化（例如，思维导图或图像）能同时激活视觉和语言皮层。</p><p>——《运用有效的学习技巧提升学生的学习效果》</p></article>
      `;
    }

    function renderPlanMaterials() {
      return `
        <details class="material-details" open><summary>材料五</summary><div class="material-details-body">
          <p>心理学家亨利·罗迪格（Henry Roediger）在2006年进行了一项关于主动提取如何影响长时记忆的重要实验。首先选取了40组斯瓦希里语-英语单词组作为记忆材料，比如"mashua-boat"这样的组合。将参与者随机分成两组，一组采用传统的重复学习方法，另一组则采用主动提取的方式。在第一阶段的学习中，所有参与者都会完整地学习一遍40组单词对，每组单词会呈现5秒钟，让参与者形成初步记忆。</p>
          <p>接下来的练习阶段体现出了关键差异：重复学习组的参与者会再次完整地阅读所有单词对4遍，每次阅读的顺序都随机打乱，模拟了"死记硬背"的学习方法；而主动提取组的参与者则只阅读单词对1遍，之后就要面对3轮回忆测试。在回忆阶段，研究人员会单独呈现斯瓦希里语单词，比如"mashua"，参与者需要通过主动提取来回忆对应的英语释义"boat"。</p>
          <p>随后，研究人员对所有参与者进行了突袭测试，要求他们根据斯瓦希里语单词回忆对应的英语释义，以此来评估长时记忆的保持效果。测试结果非常明显：主动提取组的平均正确率达到了80%左右，而重复学习组只有约30%的正确率。这个差距有力地证明了主动回忆比被动复习更能促进长时记忆的保持。</p>
        </div></details>
        <details class="material-details"><summary>材料六</summary><div class="material-details-body">
          <p>本次长时记忆探究活动中，头环将成为探索记忆奥秘的重要科学工具，它能帮助我们“看到”大脑在记忆时的活动情况。</p>
          <p>头环主要通过两种方式来监测大脑活动：一种是记录脑电波（EEG），就像给大脑的活动“录音”；另一种是检测血流变化（fNIRS），相当于观察大脑哪个区域在工作时会“充血”。在实验中，当你使用不同的记忆方法时，头环会实时记录下大脑的反应，并通过软件将这些数据转化成直观的图表和3D脑图。在证据搜集环节，头环可以帮助你获得更科学的实验数据（例如，当用分组记忆法背单词时，头环能显示大脑哪些区域被激活），这些数据会成为研究假设的有力证据。在信息处理阶段，可以将头环采集到的脑活动热力图与回忆率进行对比分析，看看哪种记忆方法能让大脑更活跃，记忆效果更好。在得出结论时，头环提供的数据会让结论更有说服力。例如，如果数据显示使用图像联想记忆法时，大脑的视觉区域特别活跃，同时回忆率也最高，那么就可得出相应的科学结论。</p>
          <p>使用头环时要注意：保持额头清洁，确保电极贴片贴紧；实验过程中保持专注；认真记录每个环节的数据变化。希望你能善用这个工具，在探究活动中获得更多发现！</p>
          <div class="headband-image-container">
            <img src="assets/headband-guide.png" alt="头环工作原理示意图" class="headband-guide-image">
          </div>
        </div></details>
      `;
    }

    function renderEvidenceFlow() {
      return `<div class="flow-grid">
        <div class="flow-card"><h4>1. 实验操作</h4><p>说明：阶段1、2实验材料在难度和数量上保持一致，但内容不能重复。</p><p><strong>阶段1：不使用策略</strong></p><p>记忆阶段：请只使用简单复述的策略进行记忆</p><p>休息阶段：完成“找不同”小游戏</p><p>测试阶段：回忆并写下记忆的单词/古诗/公式，尽可能完整</p><p><strong>阶段2：使用策略</strong></p><p>记忆阶段：采用记忆策略</p><p>休息阶段：完成“找不同”小游戏</p><p>测试阶段：回忆并写下记忆的单词/古诗/公式，尽可能完整</p></div>
        <div class="flow-card"><h4>2. 记录数据</h4><p>将实验所得的数据记录在数据记录表中。</p></div>
        <div class="flow-card"><h4>3. 处理分析数据</h4><p>对数据进行处理分析。</p></div>
        <div class="flow-card"><h4>4. 得出结论</h4><p>根据实验处理分析的数据检验假设回答研究问题。</p></div>
        <div class="flow-card"><h4>补充说明</h4><p>记录不同策略的回忆出的数量与题目总数，计算不同策略的回忆率。同时进行头环材料的学习，结合头环的显示热力图，判断策略的大脑活跃程度。</p><p>总回忆率=（正确数/抽取的题目总数）×100%</p><p>每道题回答错误情况示例（答案+回答+错误情况）：</p><p>nudge+nugde+两个字母位置错误</p></div>
      </div>`;
    }

    function renderQuestionStep() {
      return `<div class="single-step-layout">
        <div class="question-prompt-strip"><p>思考：回忆最近学习的内容，为什么有些信息更容易长期记住？哪些方法可以帮助我们更好地记住学习内容？请基于以上内容提出研究问题。</p></div>
        <div class="panel"><div class="panel-head"><h3>提出研究问题</h3></div><div class="panel-body">${renderInquiryCases()}${renderInquiryScaffold("question")}<textarea data-field="question" placeholder="写下你们小组真正想探究的问题">${escapeHtml(state.fields.question)}</textarea></div></div>
      </div>`;
    }
    function renderHypothesisStep() {
      return `<div class="single-step-layout">
        <div class="panel"><div class="panel-head"><h3>材料—策略匹配</h3><p>请完成四则材料与六个策略的匹配。</p></div><div class="panel-body">${renderStrategyMatchTask()}</div></div>
        ${state.fields.strategyMatchConfirmed ? `<div class="panel"><div class="panel-head"><h3>研究假设</h3></div><div class="panel-body"><p class="hint">在提出问题之后，我们需要根据研究问题提出假设。请阅读材料一至四，提出你的假设（两种改善长时记忆的策略）。</p><div class="form-grid"><div class="field"><label>研究假设：策略1</label>${renderStrategySelect("strategy1")}</div><div class="field"><label>研究假设：策略2</label>${renderStrategySelect("strategy2")}</div></div><div class="field"><label>策略 1 假设</label><textarea data-field="hypothesis1">${escapeHtml(state.fields.hypothesis1)}</textarea></div><div class="field"><label>策略 2 假设</label><textarea data-field="hypothesis2">${escapeHtml(state.fields.hypothesis2)}</textarea></div>${renderInquiryScaffold("hypothesis")}</div></div>` : ""}
      </div>`;
    }

    function renderStrategyMatchTask() {
      const selections = state.fields.strategyMatchSelections || {};
      const message = state.fields.strategyMatchMessage ? `<div class="tip-box">${escapeHtml(state.fields.strategyMatchMessage)}</div>` : "";
      const cards = getStrategyMatchMaterials().map((item) => `<article class="reading-card strategy-match-card">
        <h4>${item.title}</h4>
        <p>${item.text}</p>
        <p>${item.source}</p>
        <div class="strategy-match-controls">
          ${renderStrategyMatchSelects(item.key, selections[item.key] || [])}
        </div>
      </article>`).join("");
      const strategyCards = SHUFFLED_STRATEGIES.map((strategy) => {
        const item = getStrategyExplanations().find((entry) => entry.name === strategy);
        return item ? `<article class="strategy-info-card"><h4>${item.name}</h4><p>${item.text}</p></article>` : "";
      }).join("");
      return `<div class="strategy-match-layout"><div class="strategy-match-column">${cards}</div><div class="strategy-match-column">${strategyCards}</div></div><div class="actions" style="justify-content:flex-start;"><button class="btn" type="button" id="confirmStrategyMatchBtn">确认</button></div>${message}`;
    }

    function renderStrategyMatchSelects(materialKey, selectedValues) {
      const count = (STRATEGY_MATCH_ANSWERS[materialKey] || []).length || 1;
      return Array.from({ length: count }, (_, index) => {
        const value = selectedValues[index] || "";
        return `<div class="strategy-match-field"><span>这个材料反映了${count > 1 ? `（${index + 1}）` : ""}</span><select aria-label="请选择策略" data-match-material="${materialKey}" data-match-index="${index}"><option value="" ${value ? "" : "selected"}>请选择策略</option>${SHUFFLED_STRATEGIES.map((strategy)=>`<option value="${strategy}" ${value === strategy ? "selected" : ""}>${strategy}</option>`).join("")}</select><span>策略。</span></div>`;
      }).join("");
    }

    function getStrategyExplanations() {
      return [
        { name: "简单复述", text: "通过机械性、重复性地多次呈现或回顾相同信息，依赖海马体的反复激活，以触发长时程增强（LTP）机制，从而强化神经元之间的突触连接，最终将短期记忆转化为长时记忆。" },
        { name: "情景关联", text: "通过将目标信息与个人经历、特定场景或情感体验主动建立联系，从而利用情景记忆系统（如海马体和内侧颞叶）增强记忆效果的策略。其核心是通过激活大脑对事件背景、空间位置或情绪状态的编码能力，将抽象信息转化为具象化的、可回溯的“心理情景”，以提升记忆的持久性和提取效率。" },

        { name: "新旧知识关联", text: "将新信息与既有知识网络（如概念、经验或认知框架）主动建立逻辑或语义联系的方法。其本质是借助大脑对结构化信息的偏好，降低新知识的记忆负荷。" },
        { name: "信息可视化", text: "将抽象或复杂的语言信息转化为视觉表征（如图像、图表、思维导图等），通过同时激活大脑的视觉处理皮层和语言中枢，增强记忆编码。" },
        { name: "线索提取", text: "通过设计或利用关键提示（如首字母、关联符号、情境特征），定向触发目标记忆内容的主动检索。其核心是优化记忆检索路径，降低提取难度。" }
      ];

    function getStrategyMatchMaterials() {
      return [
        { key: "material1", title: "材料一", text: "大脑平均每天产生约70,000个想法，长时记忆的形成涉及突触可塑性的改变。当海马体（大脑边缘系统的组成部分）反复处理相同信息时，神经元之间的连接会增强。这个过程被称为长时程增强(LTP)，与短期记忆的电子信号传递不同。", source: "——《记忆：从大脑到分子》" },
        { key: "material2", title: "材料二", text: "长时记忆可分为情景记忆（例如，记得去年生日派对）和语义记忆（例如，知道巴黎是法国首都）。有趣的是，调查显示90%的人能记住自己7岁时的某个情景。程序记忆（例如，骑自行车）则存储在小脑中，这种记忆往往通过身体练习形成。", source: "——《情景记忆和语义记忆》" },
        { key: "material3", title: "材料三", text: "赫尔曼·艾宾浩斯通过无意义音节（如ZOF）实验发现，遗忘在学习后立即开始，20分钟后遗忘41.8%。现代研究证实，间隔复习可以打破这种曲线。此外，主动回忆比被动重读有效2-3倍，且将新知识与已有知识关联可提升记忆效率。", source: "——《记忆：对实验心理学的贡献》" },
        { key: "material4", title: "材料四", text: "一个探索记忆策略有效性的研究在近1000项实验的基础上得出结论，提取线索（关键信息，例如单词首字母）效果值达0.93，而划重点只有0.22。分散学习比集中学习效率高50%，但需要精确安排间隔时间。值得注意的是，将信息可视化（例如，思维导图或图像）能同时激活视觉和语言皮层。", source: "——《运用有效的学习技巧提升学生的学习效果》" }
      ];
    }
    function renderPlanStep() {
      return `<div class="single-step-layout"><div class="panel"><div class="panel-head"><h3>实验设计参考材料</h3></div><div class="panel-body reading-list">${renderPlanMaterials()}</div></div><div class="panel"><div class="panel-head"><h3>实验计划</h3><p>请阅读材料五，学习实验设计的基本步骤，并根据提供的记忆实验材料设计一个可操作的实验。</p></div><div class="panel-body"><div class="strategy-mode-grid"><div class="strategy-mode-card"><h4>阶段一</h4><p>策略：简单复述。这是“不使用额外策略”的基线条件。</p></div><div class="strategy-mode-card"><h4>阶段二</h4><p>策略1 / 策略2 从六种策略中选择。建议选择简单复述以外的策略。</p></div></div><div class="form-grid">
        <div class="field"><label>阶段一策略</label>${renderStrategySelect("stage1Strategy", "简单复述", true)}</div>

        <div class="field"><label>材料类型</label><select data-field="materialType"><option value="word" ${selected("materialType","word")}>单词</option><option value="poem" ${selected("materialType","poem")}>古诗</option><option value="formula" ${selected("materialType","formula")}>公式</option></select></div>

        </div>

        <div class="field"><label>找不同时间（秒）</label><input type="number" min="10" max="180" data-field="puzzleSeconds" value="${escapeHtml(state.fields.puzzleSeconds)}"></div>
        <div class="field"><label>测试时间（秒）</label><input type="number" min="20" max="240" data-field="testSeconds" value="${escapeHtml(state.fields.testSeconds)}"></div>

    function renderEvidenceStep() {
      return `<div class="panel"><div class="panel-head"><h3>策略记忆网页实验</h3><p>阶段1不使用策略，阶段2使用选择的记忆策略。每阶段包含记忆、找不同和低干扰测试。</p></div><div class="panel-body">

        <aside class="game-side"><div class="stat-grid"><div class="mini-stat"><span>阶段</span><b id="phaseStat">--</b></div><div class="mini-stat"><span>剩余时间</span><b id="timeStat">--</b></div><div class="mini-stat"><span>正确数</span><b id="correctStat">0</b></div><div class="mini-stat"><span>回忆率</span><b id="accuracyStat">0%</b></div></div><div class="game-log"><table><thead><tr><th>阶段</th><th>策略</th><th>正确</th><th>回忆率</th></tr></thead><tbody id="gameLogBody"><tr><td colspan="4">暂无记录</td></tr></tbody></table></div></aside></div>
        <div id="focusPrep" class="focus-prep" role="dialog" aria-modal="true"><div class="focus-prep-card"><h3>准备开始策略记忆实验</h3><p>页面将切换到低干扰模式，并尝试进入浏览器全屏。记忆、找不同、测试阶段会按设定时间推进。</p><p>测试阶段请尽可能完整地回忆目标材料，完成后提交。</p><button class="btn" type="button" id="confirmStartRunBtn">进入实验</button><button class="btn secondary" type="button" id="cancelStartRunBtn">取消</button></div></div>
      </div></div>`;
    }
    function getPersonalStrategyResult(summary) {
      const items = summary || summarizeRecords();
      if (!items.length) return "";
      const avgCorrect = Number((items.reduce((sum, item) => sum + Number(item.avgCorrect || 0), 0) / items.length).toFixed(1));
      const avgAccuracy = Math.round(items.reduce((sum, item) => sum + Number(item.avgAccuracy || 0), 0) / items.length);
      return `平均正确数 ${avgCorrect}，平均回忆率 ${avgAccuracy}%`;
    }
    function renderTeamResultTable(summary) {
      const personalResult = getPersonalStrategyResult(summary);
      return `<div class="panel team-result-card"><div class="panel-head"><h3>其他组员实验结果记录</h3><p>仅用于留痕和对比，不参与统计计算。</p></div><div class="panel-body"><table><thead><tr><th>成员</th><th>组员编号</th><th>实验结果</th></tr></thead><tbody><tr><td>本人</td><td><input type="text" data-field="participantId" value="${escapeHtml(state.fields.participantId || state.studentId)}" placeholder="本人编号"></td><td><input type="text" value="${escapeHtml(personalResult)}" placeholder="自动带入本人结果" disabled></td></tr><tr><td>组员</td><td><input type="text" data-field="teammate1Id" value="${escapeHtml(state.fields.teammate1Id)}" placeholder="请输入编号"></td><td><input type="text" data-field="teammate1Result" value="${escapeHtml(state.fields.teammate1Result)}" placeholder="请输入该组员实验结果"></td></tr><tr><td>组员</td><td><input type="text" data-field="teammate2Id" value="${escapeHtml(state.fields.teammate2Id)}" placeholder="请输入编号"></td><td><input type="text" data-field="teammate2Result" value="${escapeHtml(state.fields.teammate2Result)}" placeholder="请输入该组员实验结果"></td></tr></tbody></table></div></div>`;
    }
    function getTeamResultSheet(summary) {
      return ["小组记录", [["本人编号","本人结果","组员1编号","组员1结果","组员2编号","组员2结果"], [state.fields.participantId || state.studentId, getPersonalStrategyResult(summary), state.fields.teammate1Id, state.fields.teammate1Result, state.fields.teammate2Id, state.fields.teammate2Result]]];
    }
    function getSystemInfoSheet(recordCount) {
      return ["系统信息", [["项目","内容"],["实验版本","science-inquiry-static-v1"],["localStorage key",STORAGE_KEY],["保存时间",state.savedAt || ""],["导出时间",new Date().toLocaleString()],["当前步骤",`${state.currentStep + 1}/${steps.length}`],["过程性实验记录数",recordCount],["AI聊天记录","不包含，AI 对话请在 AI 助手窗口单独导出"]]];
    }
    function getRawStorageSheet() {
      return ["localStorage原始数据", [["localStorage key","JSON"],[STORAGE_KEY, localStorage.getItem(STORAGE_KEY) || ""]]];
    }
    function getHeadbandSummarySheet() {
      return ["头环数据摘要", [["项目","内容"],["上传文件名",""],["头环观察记录",state.fields.headband || ""],["记录内头环观察",state.records.map((record)=>record.headband).filter(Boolean).join("；")],["数据摘要",state.fields.headband || ""],["统计结果",""]]];
    }
    function renderAnalysisStep() {
      const summary = summarizeRecords();
      const rows = summary.map((item)=>`<tr><td>${escapeHtml(item.strategy)}</td><td>${item.count}</td><td>${item.avgCorrect}</td><td>${item.avgAccuracy}%</td><td>${item.avgRt ? item.avgRt + "ms" : "--"}</td></tr>`).join("");
      const chart = summary.length ? summary.map((item)=>`<div class="bar-row"><div>${escapeHtml(item.strategy)}</div><div class="bar-track"><div class="bar-fill" style="width:${item.avgAccuracy}%"></div></div><div>${item.avgAccuracy}%</div></div>`).join("") : `<div class="empty-state">完成实验后会自动生成策略对比图。</div>`;
      return `<div class="analysis-layout"><div class="panel"><div class="panel-head"><h3>策略汇总</h3></div><div class="panel-body">${summary.length ? `<table><thead><tr><th>策略</th><th>次数</th><th>平均正确数</th><th>平均回忆率</th><th>平均反应时</th></tr></thead><tbody>${rows}</tbody></table>` : `<div class="empty-state">还没有实验数据。请先完成至少一个阶段。</div>`}<div class="chart">${chart}</div></div></div>${renderTeamResultTable(summary)}<div class="panel"><div class="panel-head"><h3>长时记忆策略评分表</h3><p>请回答者和提问者共同完成以下表格。</p></div><div class="panel-body">${renderStrategyScoreTable()}</div></div><div class="panel"><div class="panel-head"><h3>头环观察</h3></div><div class="panel-body"><textarea data-field="headband" placeholder="请记录不同记忆策略下的头环观察结果，例如：使用不同策略时头环颜色有什么变化？哪种策略下前额叶区域更活跃？颜色变化是否和记忆效果有关？">${escapeHtml(state.fields.headband)}</textarea></div></div></div>`;
    }
    function renderScoreField(field, label) {
      return `<div class="field"><label>${label}</label><select data-field="${field}">${[1,2,3,4,5].map((n)=>`<option value="${n}" ${Number(state.fields[field])===n ? "selected" : ""}>${n} 分</option>`).join("")}</select></div>`;
    }
    function renderStrategyScoreTable() {
      const currentTotal = getScoreTotal();
      const records = state.strategyScores || [];
      const selectedId = state.fields.scoreRecordViewId || "";
      const visibleRecords = selectedId ? records.filter((record)=>record.id === selectedId) : records;
      return `<div class="score-layout">
        <div>
          <div class="field"><label>策略名称</label>${renderStrategySelect("scoreStrategyName", state.fields.scoreStrategyName || state.fields.strategy1 || MEMORY_STRATEGIES[0])}</div>
          <div class="score-table-wrap"><table class="score-table"><thead><tr><th>评分维度</th><th>水平</th><th>得分</th></tr></thead><tbody>
            ${renderScoreRow("答案准确性", "scoreAccuracy", ["5分：全部答案完全准确，无任何错误", "4分：1-2处非关键性错误（如拼写/符号轻微偏差）", "3分：3-4处错误，但关键内容保留（如古诗半句正确）", "2分：仅能回忆零碎片段（如单词首字母、公式局部）", "1分：答案完全错误或空白"])}
            ${renderScoreRow("策略利用率", "scoreUse", ["5分：能高效运用记忆策略，准确回忆内容", "4分：策略使用恰当但略显常规", "3分：能通过策略回忆主要信息，但应用不够系统", "2分：回忆内容片段化，策略与信息关联性较弱", "1分：未能使用策略，与未使用策略相比差异较小"])}
            ${renderScoreRow("记忆信心度", "scoreConfidence", ["5分：确信完全掌握所有内容", "4分：对大部分内容有信心", "3分：对部分内容有信心", "2分：对回忆能力不确定", "1分：确信自己记不住"])}
            ${renderScoreRow("策略迁移性", "scoreTransfer", ["5分：能立即将策略应用到新材料上，无需指导", "4分：需简单思考后将策略应用于新场景", "3分：在特定条件下（如相似材料）可以迁移", "2分：需经过努力尝试，来探索能否进行迁移", "1分：策略完全绑定原始材料，无法进行迁移"])}
            <tr><td colspan="2"><strong>总分</strong></td><td><strong>${currentTotal}</strong></td></tr>
          </tbody></table></div>
          <div class="score-actions"><button class="btn" type="button" id="addStrategyScoreBtn">新增策略评分</button></div>
        </div>
        <div class="score-record-list">
          ${records.length ? `<div class="field"><label>切换查看不同策略的评分结果</label><select data-field="scoreRecordViewId"><option value="" ${selectedId ? "" : "selected"}>查看全部评分记录</option>${records.map((record)=>`<option value="${record.id}" ${selectedId === record.id ? "selected" : ""}>${escapeHtml(record.strategyName)}（${record.scoreTotal}分）</option>`).join("")}</select></div>` : ""}
          ${visibleRecords.length ? visibleRecords.map((record) => `<div class="score-record-card"><h4>${escapeHtml(record.strategyName)}</h4><p>答案准确性 ${record.scoreAccuracy}；策略利用率 ${record.scoreUse}；记忆信心度 ${record.scoreConfidence}；策略迁移性 ${record.scoreTransfer}</p><p><strong>总分：${record.scoreTotal}</strong></p><button class="btn danger" type="button" data-delete-score="${record.id}">删除</button></div>`).join("") : `<div class="empty-state">还没有策略评分记录。完成评分后点击“新增策略评分”。</div>`}
        </div>
      </div>`;
    }
    function renderScoreRow(label, field, levels) {
      return `<tr><td>${label}</td><td>${levels.map((item)=>`<p>${item}</p>`).join("")}</td><td><select data-field="${field}">${[1,2,3,4,5].map((n)=>`<option value="${n}" ${Number(state.fields[field])===n ? "selected" : ""}>${n} 分</option>`).join("")}</select></td></tr>`;
    }
    function addStrategyScoreRecord() {
      const strategyName = (state.fields.scoreStrategyName || state.fields.strategy1 || "未命名策略").trim();
      const record = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        strategyName,
        scoreAccuracy: Number(state.fields.scoreAccuracy) || 1,
        scoreUse: Number(state.fields.scoreUse) || 1,
        scoreConfidence: Number(state.fields.scoreConfidence) || 1,
        scoreTransfer: Number(state.fields.scoreTransfer) || 1,
        scoreTotal: getScoreTotal(),
        createdAt: new Date().toLocaleString()
      };
      state.strategyScores.push(record);
      saveState();
      renderApp();
    }
    function deleteStrategyScoreRecord(id) {
      state.strategyScores = (state.strategyScores || []).filter((record) => record.id !== id);

      renderApp();

      </div>`;
    }

    }

      return `<div class="step-layout"><div class="panel"><div class="panel-head"><h3>得出结论</h3></div><div class="panel-body"><textarea data-field="conclusion" placeholder="通过实验，我们发现改善长时记忆可以通过哪些策略？">${escapeHtml(state.fields.conclusion)}</textarea></div></div><div class="panel"><div class="panel-head"><h3>结论提示</h3></div><div class="panel-body"><div class="reading-card"><h4>提示</h4><p>结论应结合两个阶段的回忆率、策略评分和头环观察，说明哪种策略更有效。</p></div></div></div></div>`;
    }

      return `<div class="reflection-layout"><div class="panel"><div class="panel-head"><h3>反思交流</h3></div><div class="panel-body"><div class="field"><label>实验设计有什么可以改进？</label><textarea data-field="designImprove" placeholder="可以从实验对象、实验次数、变量控制、材料选择和操作流程等方面思考。">${escapeHtml(state.fields.designImprove)}</textarea></div><div class="field"><label>结果是否出乎意料？为什么？</label><textarea data-field="surprise" placeholder="可以从数据稳定性、个体差异、材料难度、策略执行和其他影响因素等方面思考。">${escapeHtml(state.fields.surprise)}</textarea></div><div class="field"><label>以上策略适用于所有学习内容吗？</label><textarea data-field="applicability" placeholder="可以从学习内容类型、任务难度、学习者差异、策略特点和使用条件等方面思考。">${escapeHtml(state.fields.applicability)}</textarea></div></div></div></div>`;
    }
    function bindInputs() {
      main.querySelectorAll("[data-field]").forEach((element)=>{ const field = element.dataset.field; element.addEventListener("change",()=>updateField(element, field)); element.addEventListener("input",()=>updateField(element, field)); });
    }
    function updateField(element, field) {
      const numericScoreFields = ["scoreAccuracy", "scoreUse", "scoreConfidence", "scoreTransfer"];
      state.fields[field] = element.type === "number" || element.type === "range" || numericScoreFields.includes(field) ? Number(element.value) : element.value;
      if (field === "stage1Strategy") state.fields.stage1Strategy = "简单复述";
      saveState();
      const stepId = steps[state.currentStep]?.id;
      if (["lowCount", "midCount", "highCount"].includes(field) && stepId === "plan") renderApp();
      if ((["scoreAccuracy", "scoreUse", "scoreConfidence", "scoreTransfer"].includes(field) || field === "scoreRecordViewId") && stepId === "analysis") renderApp();
    }
    function bindStepEvents(stepId) {
      bindSurveyInputs();
      const prev = document.getElementById("prevStep");
      const next = document.getElementById("nextStep");
      if (prev) prev.addEventListener("click", () => { if (state.currentStep > 0) goToStep(state.currentStep - 1); });
      if (next) next.addEventListener("click", goNextStep);
      if (stepId === "evidence") bindGameEvents();
      if (stepId === "hypothesis") bindStrategyMatchEvents();
      if (stepId === "analysis") bindScoreEvents();
      const finalExport = document.getElementById("finalExportBtn");
      if (finalExport) finalExport.addEventListener("click", exportExcel);
      const reviewReport = document.getElementById("reviewReportBtn");
      if (reviewReport) reviewReport.addEventListener("click", () => generateReviewReport("strategies"));
    }
    function generateReviewReport(activityType) {
      saveState();
      window.open(`review.html?activityType=${encodeURIComponent(activityType)}`, "_blank");
    }
    function bindScoreEvents() {
      const add = document.getElementById("addStrategyScoreBtn");
      if (add) add.addEventListener("click", addStrategyScoreRecord);
      main.querySelectorAll("[data-delete-score]").forEach((button)=>{
        button.addEventListener("click",()=>deleteStrategyScoreRecord(button.dataset.deleteScore));
      });
    }
    function bindStrategyMatchEvents() {
      main.querySelectorAll("[data-match-material][data-match-index]").forEach((select)=>{
        select.addEventListener("change",()=>{
          const material = select.dataset.matchMaterial;
          const index = Number(select.dataset.matchIndex) || 0;
          const wasConfirmed = Boolean(state.fields.strategyMatchConfirmed);
          const selections = state.fields.strategyMatchSelections || {};
          const current = Array.isArray(selections[material]) ? selections[material].slice() : [];
          current[index] = select.value;
          selections[material] = current.filter(Boolean);
          state.fields.strategyMatchSelections = selections;
          state.fields.strategyMatchConfirmed = false;
          state.fields.strategyMatchMessage = "";
          saveState();
          if (wasConfirmed) renderApp();
        });
      });
      const confirm = document.getElementById("confirmStrategyMatchBtn");
      if (confirm) confirm.addEventListener("click", confirmStrategyMatch);
    }
    function confirmStrategyMatch() {
      const selections = state.fields.strategyMatchSelections || {};
      const isCorrect = Object.keys(STRATEGY_MATCH_ANSWERS).every((key)=>{
        const expected = STRATEGY_MATCH_ANSWERS[key].slice().sort().join("|");
        const actual = (selections[key] || []).slice().sort().join("|");
        return expected === actual;
      });
      state.fields.strategyMatchConfirmed = isCorrect;
      state.fields.strategyMatchMessage = isCorrect ? "匹配成功，请继续填写研究假设。" : "还有材料和策略没有匹配正确，请再读一读材料和策略说明。";
      saveState();
      renderApp();
    }
    function bindGameEvents() {
      document.getElementById("startRunBtn").addEventListener("click", showFocusPrep);
      document.getElementById("confirmStartRunBtn").addEventListener("click", startRun);
      document.getElementById("cancelStartRunBtn").addEventListener("click", hideFocusPrep);
      document.getElementById("submitRecallBtn").addEventListener("click", submitRecall);
      updateGameUi();
    }
    function showFocusPrep() { document.getElementById("focusPrep").classList.add("is-visible"); }
    function hideFocusPrep() { document.getElementById("focusPrep").classList.remove("is-visible"); }
    function startRun() {
      hideFocusPrep();
      clearTimers();
      const stage = Number(document.getElementById("stageSelect").value);
      const selectedStrategy = document.getElementById("strategySelect")?.value || state.fields.strategy1 || state.fields.strategy2;
      const strategy = stage === 1 ? "简单复述" : selectedStrategy;
      const items = pickMaterials();
      session = { id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()), stage, strategy, items, phase: "memory", startedAt: new Date().toISOString(), recallStartedAt: 0, puzzleHits: 0, puzzleAttempts: 0, puzzleTarget: -1 };
      enterFocusMode();
      runPhase("memory");
    }
    function pickMaterials() {
      const type = state.fields.materialType;
      const bank = materialBank[type] || materialBank.word;
      const low = sample(bank.low, Number(state.fields.lowCount) || 0);
      const mid = sample(bank.mid, Number(state.fields.midCount) || 0);
      const high = sample(bank.high, Number(state.fields.highCount) || 0);
      const items = low.concat(mid, high);
      return items.length ? items : sample(bank.low.concat(bank.mid, bank.high), 6);
    }
    function sample(items, count) { return items.slice().sort(()=>Math.random()-.5).slice(0, count); }
    function runPhase(phase) {
      if (!session) return;
      clearTimers();
      session.phase = phase;
      const answerBox = document.getElementById("answerBox");
      answerBox.classList.remove("is-visible");
      const taskCard = document.getElementById("taskCard");
      taskCard.style.display = "block";
      let seconds = 0;
      if (phase === "memory") {
        seconds = clamp(Number(state.fields.memorySeconds), 10, 180, 60);
        const memoryInstruction = session.stage === 1 ? "请只使用简单复述的策略进行记忆" : `采用记忆策略：${escapeHtml(session.strategy)}`;
        taskCard.innerHTML = `<h3>记忆阶段</h3><p>${memoryInstruction}</p>${renderItems(session.items)}`;
      } else if (phase === "puzzle") {
        seconds = clamp(Number(state.fields.puzzleSeconds), 10, 180, 45);
        taskCard.innerHTML = `<h3>高强度找不同</h3><p>在限定时间内连续点击每一题中唯一不同的图形</p><div id="puzzleMount"></div>`;
        renderPuzzle();
      } else {
        showRecall();
        return;
      }
      phaseStartedAt = performance.now();
      updateGameUi(seconds);
      startCountdown(seconds, () => runPhase(phase === "memory" ? "puzzle" : "recall"));
    }
    function renderItems(items) { return `<div class="memory-items">${items.map((item)=>`<span class="memory-item">${escapeHtml(item)}</span>`).join("")}</div>`; }
    function renderPuzzle() {
      if (!session) return;
      const pairs = [
        ["O", "0"], ["B", "8"], ["S", "5"], ["Z", "2"], ["I", "1"],
        ["◆", "◇"], ["■", "□"], ["●", "○"], ["▲", "△"], ["✚", "✖"]
      ];
      const pair = pairs[Math.floor(Math.random() * pairs.length)];
      const swap = Math.random() > 0.5;
      const base = swap ? pair[1] : pair[0];
      const odd = swap ? pair[0] : pair[1];
      const total = 54;
      const oddIndex = Math.floor(Math.random() * total);
      session.puzzleTarget = oddIndex;
      const mount = document.getElementById("puzzleMount");
      if (!mount) return;
      mount.innerHTML = `
        <div class="puzzle-wrap">
          <div class="puzzle-target">已找出 ${session.puzzleHits} 个，请继续保持专注</div>
          <div class="puzzle-grid">
            ${Array.from({ length: total }, (_, index) => `<button class="puzzle-cell" type="button" data-puzzle-index="${index}">${index === oddIndex ? odd : base}</button>`).join("")}
          </div>
        </div>
      `;
      mount.querySelectorAll("[data-puzzle-index]").forEach((button) => {
        button.addEventListener("click", () => handlePuzzleClick(Number(button.dataset.puzzleIndex), button));
      });
    }
    function handlePuzzleClick(index, button) {
      if (!session || session.phase !== "puzzle") return;
      session.puzzleAttempts += 1;
      if (index === session.puzzleTarget) {
        session.puzzleHits += 1;
        button.classList.add("hit");
        window.setTimeout(renderPuzzle, 160);
      }
    }
    function showRecall() {
      clearTimers();
      if (!session) return;
      session.phase = "recall";
      session.recallStartedAt = performance.now();
      document.getElementById("taskCard").style.display = "none";
      document.getElementById("answerBox").classList.add("is-visible");
      const grid = document.getElementById("recallGrid");
      grid.innerHTML = session.items.map((item, index) => `<input class="recall-cell" data-recall-index="${index}" type="text" autocomplete="off" placeholder="第 ${index + 1} 个">`).join("");
      const firstInput = grid.querySelector("input");
      if (firstInput) firstInput.focus();
      phaseStartedAt = performance.now();
      const seconds = clamp(Number(state.fields.testSeconds), 20, 240, 120);
      updateGameUi(seconds);
      startCountdown(seconds, submitRecall);
    }
    function startCountdown(seconds, done) { tickId = window.setInterval(()=>updateCountdown(seconds),80); timerId = window.setTimeout(done, seconds*1000); updateCountdown(seconds); }
    function updateCountdown(seconds) {
      const elapsed = (performance.now() - phaseStartedAt) / 1000;
      const remaining = Math.max(0, seconds - elapsed);
      const fill = document.getElementById("timerFill");
      if (fill) fill.style.width = `${Math.round((remaining / seconds) * 100)}%`;
      const timeStat = document.getElementById("timeStat");
      if (timeStat) timeStat.textContent = `${Math.ceil(remaining)}s`;
    }
    function clearTimers() { if (timerId) window.clearTimeout(timerId); if (tickId) window.clearInterval(tickId); timerId = null; tickId = null; }
    function submitRecall() {
      if (!session || session.phase !== "recall") return;
      clearTimers();
      const recallValues = Array.from(document.querySelectorAll("[data-recall-index]")).map((input) => input.value.trim()).filter(Boolean);
      const recall = recallValues.join("；");
      const headband = "";
      const correct = scoreRecall(recallValues, session.items);
      const accuracy = session.items.length ? Math.round((correct.length / session.items.length) * 100) : 0;
      const reactionTime = Math.round(performance.now() - session.recallStartedAt);
      const record = { runId: session.id, studentName: state.studentName, studentAge: state.studentAge, studentId: state.studentId, groupId: state.groupId, stage: session.stage, strategy: session.strategy, materialType: state.fields.materialType, itemCount: session.items.length, memorySeconds: state.fields.memorySeconds, puzzleSeconds: state.fields.puzzleSeconds, testSeconds: state.fields.testSeconds, items: session.items.join("；"), recall, correctItems: correct.join("；"), correctCount: correct.length, accuracy, reactionTime, puzzleHits: session.puzzleHits, puzzleAttempts: session.puzzleAttempts, headband, scoreTotal: getScoreTotal(), createdAt: new Date().toLocaleString() };
      state.records.push(record);
      saveState();
      const finished = session;
      session = null;
      exitFocusMode();
      updateGameUi();
      alert(`${finished.strategy} 已保存，回忆率 ${accuracy}%。`);
    }
    function scoreRecall(responses, items) {
      const normalized = responses.join(" ").toLowerCase().replace(/\s+/g,"");
      return items.filter((item)=>{
        const key = item.toLowerCase().split(/[ /（(]/)[0].replace(/\s+/g,"");
        return key && normalized.includes(key);
      });
    }
    function updateGameUi(totalSeconds) {
      const status = document.getElementById("phaseStatus");
      if (!status) return;
      const log = document.getElementById("gameLogBody");
      if (!session) {
        status.textContent = "请选择阶段并开始";
        document.getElementById("phaseStat").textContent = "--";
        document.getElementById("timeStat").textContent = "--";
        const latest = state.records[state.records.length - 1];
        document.getElementById("correctStat").textContent = latest ? latest.correctCount : "0";
        document.getElementById("accuracyStat").textContent = latest ? `${latest.accuracy}%` : "0%";
      } else {
        const phaseNames = { memory: "记忆", puzzle: "找不同", recall: "测试" };
        status.textContent = `${phaseNames[session.phase]}阶段：${session.strategy}`;
        document.getElementById("phaseStat").textContent = phaseNames[session.phase];
        if (totalSeconds) document.getElementById("timeStat").textContent = `${totalSeconds}s`;
      }
      log.innerHTML = state.records.length ? state.records.slice().reverse().map((r)=>`<tr><td>${r.stage}</td><td>${escapeHtml(r.strategy)}</td><td>${r.correctCount}/${r.itemCount}</td><td><span class="tag">${r.accuracy}%</span></td></tr>`).join("") : `<tr><td colspan="4">暂无记录</td></tr>`;
    }
    async function enterFocusMode() { document.body.classList.add("is-focus-mode"); try { if (!document.fullscreenElement && document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch (event) {} }
    async function exitFocusMode() { document.body.classList.remove("is-focus-mode"); try { if (document.fullscreenElement && document.exitFullscreen) await document.exitFullscreen(); } catch (event) {} }
    function clamp(value, min, max, fallback) { const number = Number(value); if (!Number.isFinite(number)) return fallback; return Math.min(max, Math.max(min, number)); }
    function getScoreTotal() { return Number(state.fields.scoreAccuracy||0)+Number(state.fields.scoreUse||0)+Number(state.fields.scoreConfidence||0)+Number(state.fields.scoreTransfer||0); }
    function summarizeRecords() {
      const groups = new Map();
      state.records.forEach((r)=>{ if (!groups.has(r.strategy)) groups.set(r.strategy,{strategy:r.strategy,count:0,correct:0,accuracy:0,rt:0,headbands:[]}); const g=groups.get(r.strategy); g.count+=1; g.correct+=Number(r.correctCount)||0; g.accuracy+=Number(r.accuracy)||0; g.rt+=Number(r.reactionTime)||0; if (r.headband) g.headbands.push(r.headband); });
      return Array.from(groups.values()).map((g)=>({strategy:g.strategy,count:g.count,avgCorrect:g.count?Number((g.correct/g.count).toFixed(1)):0,avgAccuracy:g.count?Math.round(g.accuracy/g.count):0,avgRt:g.count?Math.round(g.rt/g.count):0,headbandSummary:g.headbands.join("；")}));
    }
    function getStrategySummaryText(strategy, summary) {
      const item = (summary || []).find((entry)=>entry.strategy === strategy);
      return item ? `${item.strategy}：平均正确数${item.avgCorrect}，平均回忆率${item.avgAccuracy}%` : "";
    }
    function exportExcel() {
      const summary = summarizeRecords();
      const noStrategyResult = getStrategySummaryText("简单复述", summary) || getStrategySummaryText("不使用策略（简单复述）", summary);
      const strategyResult = summary.filter((item)=>item.strategy !== "简单复述").map((item)=>`${item.strategy}：平均正确数${item.avgCorrect}，平均回忆率${item.avgAccuracy}%`).join("；");
      const sheets = [
        ["基本信息", [["项目","内容"],["实验","改善长时记忆的策略有哪些"],["学生姓名",state.studentName || ""],["学生年龄",state.studentAge || ""],["学生编号",state.studentId],["小组编号",state.groupId],["实验时间",state.savedAt || ""],["导出时间",new Date().toLocaleString()]]],
        ["实验过程", [["字段","内容"],["研究问题",state.fields.question],["材料策略匹配选择",formatMatchSelections()],["材料策略匹配是否成功",state.fields.strategyMatchConfirmed ? "是" : "否"],["策略1假设",state.fields.hypothesis1],["策略2假设",state.fields.hypothesis2],["阶段一策略",state.fields.stage1Strategy || "简单复述"],["阶段二策略1",state.fields.strategy1],["阶段二策略2",state.fields.strategy2],["阶段一：简单复述结果",noStrategyResult],["阶段二：使用策略结果",strategyResult],["材料类型",state.fields.materialType],["初级数量",state.fields.lowCount],["中级数量",state.fields.midCount],["高级数量",state.fields.highCount],["记忆时间s",state.fields.memorySeconds],["找不同时间s",state.fields.puzzleSeconds],["测试时间s",state.fields.testSeconds],["组长",state.fields.leader],["记录员",state.fields.recorder],["组员A",state.fields.memberA],["组员B",state.fields.memberB],["头环观察",state.fields.headband],["结论",state.fields.conclusion],["设计改进",state.fields.designImprove],["结果意外原因",state.fields.surprise],["适用性反思",state.fields.applicability]]],
        ["测试明细", [["学生姓名","学生年龄","学生编号","小组编号","阶段","策略","材料类型","题目总数","记忆时间s","找不同时间s","测试时间s","题目","学生回答","正确项目","正确数","回忆率","找不同命中","找不同点击","反应时ms","头环观察","评分总分","记录时间"], ...state.records.map((r)=>[r.studentName || "",r.studentAge || "",r.studentId,r.groupId,r.stage,r.strategy,r.materialType,r.itemCount,r.memorySeconds,r.puzzleSeconds,r.testSeconds,r.items,r.recall,r.correctItems,r.correctCount,`${r.accuracy}%`,r.puzzleHits || 0,r.puzzleAttempts || 0,r.reactionTime,r.headband,r.scoreTotal,r.createdAt])]],
        ["策略汇总", [["策略","次数","平均正确数","平均回忆率","平均反应时ms","头环观察结果"], ...summary.map((item)=>[item.strategy,item.count,item.avgCorrect,`${item.avgAccuracy}%`,item.avgRt,item.headbandSummary || ""])],
        ],
        getTeamResultSheet(summary),
        getHeadbandSummarySheet(),
        getSystemInfoSheet(state.records.length),
        getRawStorageSheet(),
        ["策略评分记录", [["策略名称","答案准确性得分","策略利用率得分","记忆信心度得分","策略迁移性得分","策略总分","记录时间"], ...(state.strategyScores || []).map((record)=>[record.strategyName, record.scoreAccuracy, record.scoreUse, record.scoreConfidence, record.scoreTransfer, record.scoreTotal, record.createdAt])]],
        ...getSurveySheets()
      ];
      const html = `<html><head><meta charset="utf-8"></head><body>${sheets.map(([title,rows])=>`<h2>${escapeHtml(title)}</h2><table border="1">${rows.map((row)=>`<tr>${row.map((cell)=>`<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}</table><br>`).join("")}</body></html>`;
      const blob = new Blob(["\ufeff", html], { type: "application/vnd.ms-excel;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `长时记忆策略_${state.groupId}_${state.studentId}.xls`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }
    document.getElementById("homeBtn").addEventListener("click",()=>{ location.href = "index.html"; });
    document.getElementById("devModeBtn").addEventListener("click", enableDeveloperMode);
    document.getElementById("exportBtn").addEventListener("click", exportExcel);
    document.getElementById("resetBtn").addEventListener("click",()=>{ if (!confirm("确定要清空本实验在当前浏览器中保存的数据吗？")) return; localStorage.removeItem(STORAGE_KEY); state = loadState(); session = null; clearTimers(); renderApp(); });
    renderApp();
  </script>
  <script src="assets/ai-assistant.js"></script>
</body>
