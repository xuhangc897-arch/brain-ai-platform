<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>实验数据后台 - 教师工具</title>
  <style>
    :root {
      --bg: #f5f8ff;
      --panel: #fff;
      --ink: #142033;
      --muted: #667085;
      --line: #d8e1f2;
      --primary: #4f7cff;
      --primary-dark: #315fe4;
      --danger: #d92d20;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, #f8fbff 0%, var(--bg) 100%);
      padding: 32px 18px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(52, 79, 135, 0.12);
      padding: 24px;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
    }

    .intro {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .auth-gate {
      display: none;
      margin-bottom: 18px;
      padding: 16px 18px;
      border: 1px solid #f1c16d;
      border-radius: 14px;
      background: #fff8e8;
      color: #7a4f01;
    }

    .auth-gate.is-visible {
      display: block;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 12px;
      color: var(--ink);
      background: #fbfcff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .btn {
      min-height: 40px;
      padding: 0 16px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), #6aa1ff);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 12px 22px rgba(79, 124, 255, 0.22);
    }

    .btn.secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--primary-dark);
      box-shadow: none;
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.64;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      background: #fff;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f0f4ff;
      color: #2f477a;
      font-weight: 900;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    dialog {
      width: min(760px, calc(100% - 32px));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 0;
      color: var(--ink);
      box-shadow: 0 24px 70px rgba(20, 32, 51, 0.24);
    }

    dialog::backdrop {
      background: rgba(20, 32, 51, 0.36);
    }

    .dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .dialog-head h2 {
      margin: 0;
      font-size: 20px;
    }

    pre {
      margin: 0;
      padding: 20px;
      max-height: 62vh;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: #fbfcff;
      color: #26364f;
    }

    @media (max-width: 860px) {
      .header {
        display: grid;
      }

      .filters {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <div class="header">
        <div>
          <h1>实验数据后台</h1>
          <p class="intro">查看学生自动上传到 CloudBase 的实验记录（当前为临时免登录维护模式）。</p>
        </div>
        <a class="btn secondary" href="../index.html">返回首页</a>
      </div>

      <div class="auth-gate" id="authGate">
        <p>请先登录后再查看实验数据。</p>
        <a class="btn" href="../login.html?redirect=admin/dashboard.html">去登录</a>
      </div>

      <div class="filters">
        <div class="field">
          <label for="moduleFilter">实验模块</label>
          <select id="moduleFilter">
            <option value="memory">记忆容量</option>
            <option value="nback">N-back 工作记忆</option>
            <option value="interference">长时记忆干扰</option>
            <option value="strategies">长时记忆策略</option>
            <option value="poster">海报制作</option>
            <option value="screening">资格审查</option>
            <option value="aiChat">AI 对话合集</option>
          </select>
        </div>
        <div class="field">
          <label for="studentIdFilter">学号</label>
          <input id="studentIdFilter" placeholder="例如：001">
        </div>
        <div class="field">
          <label for="classNameFilter">班级</label>
          <input id="classNameFilter" placeholder="例如：一班">
        </div>
        <div class="field">
          <label for="groupNameFilter">小组</label>
          <input id="groupNameFilter" placeholder="例如：1组">
        </div>
        <div class="field">
          <label for="limitFilter">读取条数</label>
          <select id="limitFilter">
            <option value="100">100</option>
            <option value="200">200</option>
            <option value="500">500</option>
          </select>
        </div>
        <div class="field">
          <label for="dateFromFilter">开始日期</label>
          <input id="dateFromFilter" type="date">
        </div>
        <div class="field">
          <label for="dateToFilter">结束日期</label>
          <input id="dateToFilter" type="date">
        </div>
        <div class="field">
          <label for="sourceModuleFilter">AI 来源模块</label>
          <select id="sourceModuleFilter">
            <option value="">全部</option>
            <option value="memory">记忆容量</option>
            <option value="nback">N-back 工作记忆</option>
            <option value="interference">长时记忆干扰</option>
            <option value="strategies">长时记忆策略</option>
            <option value="poster">海报制作</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="queryBtn" type="button">查询记录</button>
        <button class="btn secondary" id="resetBtn" type="button">清空筛选</button>
        <button class="btn secondary" id="exportBtn" type="button">导出 Excel</button>
      </div>

      <p class="status" id="status">正在检查登录状态...</p>

      <div class="table-wrap" id="tableWrap">
        <div class="empty">暂无数据</div>
      </div>
    </section>
  </main>

  <dialog id="detailDialog">
    <div class="dialog-head">
      <h2>记录详情</h2>
      <button class="btn secondary" id="closeDialogBtn" type="button">关闭</button>
    </div>
    <pre id="detailContent"></pre>
  </dialog>

  <script src="https://static.cloudbase.net/cloudbase-js-sdk/3.0.0/cloudbase.full.js"></script>
  <script src="../cloudbase.js"></script>
  <script>
    const GET_EXPERIMENT_RECORDS_URL = "https://memory-detective-platfor-d369a42-1441391469.ap-shanghai.app.tcloudbase.com/getExperimentRecords";

    const authGate = document.getElementById("authGate");
    const statusEl = document.getElementById("status");
    const tableWrap = document.getElementById("tableWrap");
    const queryBtn = document.getElementById("queryBtn");
    const resetBtn = document.getElementById("resetBtn");
    const exportBtn = document.getElementById("exportBtn");
    const detailDialog = document.getElementById("detailDialog");
    const detailContent = document.getElementById("detailContent");
    const closeDialogBtn = document.getElementById("closeDialogBtn");
    const filters = {
      module: document.getElementById("moduleFilter"),
      studentId: document.getElementById("studentIdFilter"),
      className: document.getElementById("classNameFilter"),
      groupName: document.getElementById("groupNameFilter"),
      dateFrom: document.getElementById("dateFromFilter"),
      dateTo: document.getElementById("dateToFilter"),
      sourceModule: document.getElementById("sourceModuleFilter"),
      limit: document.getElementById("limitFilter")
    };

    /*
     * 临时维护开关（2026-07-21）：教师近期需要直接读取已上传数据。
     * 仅绕过 dashboard.html 的前端登录遮罩，不影响学生登录、学生导入页或数据库内容。
     * 完成正式教师认证后删除此开关和 checkAdminLogin 中的临时分支。
     */
    const TEMPORARY_DASHBOARD_LOGIN_BYPASS = true;
    let isLoggedIn = false;
    let records = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(message) {
      statusEl.textContent = message;
    }

    async function getAdminLoginState() {
      if (window.auth && typeof window.auth.getLoginState === "function") {
        const loginState = await window.auth.getLoginState();
        return Boolean(loginState || window.auth.currentUser);
      }

      throw new Error("当前 CloudBase SDK 不支持检查登录状态。");
    }

    async function checkAdminLogin() {
      if (TEMPORARY_DASHBOARD_LOGIN_BYPASS) {
        isLoggedIn = true;
        authGate.classList.remove("is-visible");
        setStatus("临时免登录维护模式：正在读取实验记录...");
        await loadRecords();
        return;
      }

      try {
        isLoggedIn = await getAdminLoginState();
      } catch (error) {
        console.error("检查登录状态失败", error);
        isLoggedIn = false;
      }

      if (isLoggedIn) {
        authGate.classList.remove("is-visible");
        setStatus("已登录，可以查询实验记录。");
        await loadRecords();
      } else {
        authGate.classList.add("is-visible");
        setStatus("请先登录后再查看实验记录。");
      }
    }

    function buildQueryPayload() {
      return {
        module: filters.module.value.trim(),
        recordType: "submission",
        studentId: filters.studentId.value.trim(),
        className: filters.className.value.trim(),
        groupName: filters.groupName.value.trim(),
        dateFrom: filters.dateFrom.value,
        dateTo: filters.dateTo.value,
        sourceModule: filters.sourceModule.value.trim(),
        limit: Number(filters.limit.value) || 100,
        skip: 0
      };
    }

    async function fetchRecords(payload) {
      const response = await fetch(GET_EXPERIMENT_RECORDS_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });
      const result = await response.json();

      if (!response.ok || !result.ok) {
        throw new Error(result.message || `读取失败：HTTP ${response.status}`);
      }

      return Array.isArray(result.records) ? result.records : [];
    }

    async function loadRecords() {
      if (!isLoggedIn) {
        authGate.classList.add("is-visible");
        setStatus("请先登录后再查看实验记录。");
        return;
      }

      queryBtn.disabled = true;
      setStatus("正在读取实验记录...");

      try {
        records = await fetchRecords(buildQueryPayload());
        renderSubmissionTable();
        setStatus(`已读取 ${records.length} 条实验记录。`);
      } catch (error) {
        console.error("读取实验记录失败", error);
        records = [];
        renderSubmissionTable();
        setStatus(error.message || "读取实验记录失败。");
      } finally {
        queryBtn.disabled = false;
      }
    }

    function renderTable() {
      if (!records.length) {
        tableWrap.innerHTML = '<div class="empty">暂无数据</div>';
        return;
      }

      tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>上传时间</th>
              <th>学号</th>
              <th>姓名</th>
              <th>班级</th>
              <th>小组</th>
              <th>模块</th>
              <th>被试</th>
              <th>次数</th>
              <th>方法</th>
              <th>材料</th>
              <th>长度</th>
              <th>是否正确</th>
              <th>最终容量</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${records.map((record, index) => {
              const data = record.data || {};
              return `
                <tr>
                  <td>${escapeHtml(formatDate(record.uploadedAt || record.createdAt))}</td>
                  <td>${escapeHtml(record.studentId)}</td>
                  <td>${escapeHtml(record.studentName)}</td>
                  <td>${escapeHtml(record.className)}</td>
                  <td>${escapeHtml(record.groupName)}</td>
                  <td>${escapeHtml(record.module)}</td>
                  <td>${escapeHtml(data.subject)}</td>
                  <td>${escapeHtml(data.runNumber)}</td>
                  <td>${escapeHtml(data.method)}</td>
                  <td>${escapeHtml(data.materialType || data.material)}</td>
                  <td>${escapeHtml(data.length)}</td>
                  <td>${data.isCorrect ? "正确" : "错误"}</td>
                  <td>${escapeHtml(data.finalCapacity ?? data.capacityAfterTrial ?? "")}</td>
                  <td><button class="btn secondary" type="button" data-detail="${index}">详情</button></td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;

      tableWrap.querySelectorAll("[data-detail]").forEach((button) => {
        button.addEventListener("click", () => showDetail(Number(button.dataset.detail)));
      });
    }

    function renderSubmissionTable() {
      if (!records.length) {
        tableWrap.innerHTML = '<div class="empty">暂无数据</div>';
        return;
      }

      tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>提交时间</th>
              <th>学号</th>
              <th>姓名</th>
              <th>班级</th>
              <th>小组</th>
              <th>实验模块</th>
              <th>提交方式</th>
              <th>明细数</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${records.map((record, index) => {
              const data = record.data || {};
              const detailCount = getRecordDetailCount(record);
              return `
                <tr>
                  <td>${escapeHtml(formatDate(record.uploadedAt || record.createdAt))}</td>
                  <td>${escapeHtml(record.studentId)}</td>
                  <td>${escapeHtml(record.studentName)}</td>
                  <td>${escapeHtml(record.className)}</td>
                  <td>${escapeHtml(record.groupName)}</td>
                  <td>${escapeHtml(getModuleLabel(record.module))}</td>
                  <td>${escapeHtml(getSubmitActionLabel(data.submitAction))}</td>
                  <td>${escapeHtml(detailCount)}</td>
                  <td><button class="btn secondary" type="button" data-detail="${index}">详情</button></td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;

      tableWrap.querySelectorAll("[data-detail]").forEach((button) => {
        button.addEventListener("click", () => showDetail(Number(button.dataset.detail)));
      });
    }

    function formatDate(value) {
      if (!value) return "";
      if (typeof value === "string") return value;
      if (value.$date) return new Date(value.$date).toLocaleString();
      if (value.seconds) return new Date(value.seconds * 1000).toLocaleString();
      return String(value);
    }

    function showDetail(index) {
      const record = records[index];
      detailContent.textContent = JSON.stringify(record, null, 2);
      detailDialog.showModal();
    }

    function getModuleLabel(module) {
      return {
        memory: "记忆容量",
        nback: "N-back 工作记忆",
        interference: "长时记忆干扰",
        strategies: "长时记忆策略",
        poster: "海报制作",
        screening: "资格审查",
        aiChat: "AI 对话合集"
      }[module] || module || "";
    }

    function getRecordDetailCount(record) {
      const data = record.data || {};
      const fullState = data.fullState || {};
      if (record.module === "nback") return Array.isArray(fullState.testRuns) ? fullState.testRuns.length : 0;
      if (record.module === "strategies") {
        return (Array.isArray(fullState.records) ? fullState.records.length : 0) + (Array.isArray(fullState.strategyScores) ? fullState.strategyScores.length : 0);
      }
      if (record.module === "poster") {
        return (Array.isArray(fullState.qaRecords) ? fullState.qaRecords.length : 0) + (Array.isArray(fullState.questions) ? fullState.questions.length : 0) + (Array.isArray(fullState.scoreRecords) ? fullState.scoreRecords.length : 0);
      }
      if (record.module === "screening") return fullState.answered || Object.keys(fullState.answers || {}).length || 0;
      if (record.module === "aiChat") return Array.isArray(data.logs) ? data.logs.length : data.logCount || 0;
      return Array.isArray(fullState.records) ? fullState.records.length : 0;
    }

    function getSubmitActionLabel(action) {
      return {
        generateReport: "生成侦探报告",
        completeScreening: "完成资格审查"
      }[action] || action || "完整提交";
    }

    function getMaterialTypeLabel(type) {
      return {
        number: "数字",
        letter: "英文大写字母",
        chinese: "汉字",
        shape: "图形",
        数字: "数字",
        字母: "英文大写字母",
        英文大写字母: "英文大写字母",
        汉字: "汉字",
        图形: "图形"
      }[type] || "数字";
    }

    function getNbackMaterialTypeLabel(type) {
      return {
        image: "图片",
        number: "数字",
        letter: "英文大写字母",
        chinese: "汉字",
        图形: "图片",
        图片: "图片",
        数字: "数字",
        字母: "英文大写字母",
        英文大写字母: "英文大写字母",
        汉字: "汉字"
      }[type] || "图片";
    }

    function summarizeMemoryRecords(memoryRecords) {
      const byRun = new Map();
      memoryRecords.forEach((record) => {
        const key = `${record.subject}|${record.runNumber}`;
        byRun.set(key, record.finalCapacity ?? record.capacityAfterTrial ?? 0);
      });

      const bySubject = new Map();
      byRun.forEach((capacity, key) => {
        const subject = key.split("|")[0];
        if (!bySubject.has(subject)) bySubject.set(subject, []);
        bySubject.get(subject).push(Number(capacity) || 0);
      });

      return Array.from(bySubject.entries()).map(([subject, runs]) => ({
        subject,
        runs,
        count: runs.length,
        average: runs.length ? Number((runs.reduce((sum, value) => sum + value, 0) / runs.length).toFixed(1)) : 0
      }));
    }

    function getPersonalShortTermMemory(summary) {
      const first = summary[0];
      return first ? first.average : "";
    }

    function getShortTermGroupAverage(personalResult) {
      const values = [personalResult].map(Number).filter((value) => Number.isFinite(value) && value > 0);
      return values.length ? Number((values.reduce((sum, value) => sum + value, 0) / values.length).toFixed(1)) : "";
    }

    function getThinkingRowsFromState(state) {
      const fields = state.fields || {};
      return [
        ["提出问题/研究问题-个人思考", fields.question],
        ["提出问题/研究问题-小组共识", fields.question_group],
        ["作出假设/研究假设-个人思考", fields.hypothesis],
        ["作出假设/研究假设-小组共识", fields.hypothesis_group],
        ["得出结论/最终结论-个人思考", fields.finalConclusion],
        ["得出结论/最终结论-小组共识", fields.finalConclusion_group],
        ["反思交流/实验设计改进-个人思考", fields.designImprove],
        ["反思交流/实验设计改进-小组共识", fields.designImprove_group],
        ["反思交流/团队合作反思-个人思考", fields.teamwork],
        ["反思交流/团队合作反思-小组共识", fields.teamwork_group],
        ["反思交流/探究环节反思-个人思考", fields.inquiryReflection],
        ["反思交流/探究环节反思-小组共识", fields.inquiryReflection_group]
      ];
    }

    const MEMORY_SURVEY_DEFS = {
      postMeta: {
        title: "学习收获调查",
        labels: { 1: "非常不同意", 2: "不同意", 3: "一般", 4: "同意", 5: "非常同意" },
        items: [
          "我能够理解本次科学探究中获得的有关短时记忆容量的知识。",
          "这些有关短时记忆容量的知识对我很有用，我会继续运用。",
          "在学习这些有关短时记忆容量的知识时，我会与现实生活进行联系。",
          "我会根据今天科学探究中获得的知识，反思自己以前记忆过程中做得不足的地方并加以改进。",
          "在学习这些有关短时记忆容量的知识时，我会联想到之前学过或了解过的知识。",
          "我能够利用本次科学探究的结果，解释为什么人的短时记忆容量是有限的。"
        ]
      },
      cognitiveLoad: {
        title: "侦探小结-认知负荷",

    function getNbackRecordType(record) {
      if (record.recordType) return record.recordType;

      return "answer";
    }

    function summarizeNbackRuns(testRuns) {
      const groups = new Map();
      testRuns.forEach((record) => {
        const recordType = getNbackRecordType(record);
        if (recordType === "observe") return;
        const key = `${record.subject}|${record.conditionLabel}|${record.stimulusType}`;
        if (!groups.has(key)) {
          groups.set(key, {
            subject: record.subject,
            conditionLabel: record.conditionLabel,
            stimulusType: record.stimulusType,
            totalAnswered: 0,
            correct: 0,
            missed: 0,
            responseTimes: []
          });
        }
        const group = groups.get(key);
        if (recordType === "miss") {
          group.missed += 1;
        } else {
          group.totalAnswered += 1;
          if (record.isCorrect) group.correct += 1;
          if (Number(record.responseTime) > 0) group.responseTimes.push(Number(record.responseTime));
        }
      });

      return Array.from(groups.values()).map((item) => {
        const attempts = item.totalAnswered + item.missed;
        const accuracy = item.totalAnswered ? Math.round((item.correct / item.totalAnswered) * 100) : 0;
        const missRate = attempts ? Math.round((item.missed / attempts) * 100) : 0;
        const avgRt = item.responseTimes.length ? Math.round(item.responseTimes.reduce((sum, value) => sum + value, 0) / item.responseTimes.length) : "";
        return Object.assign(item, { accuracy, missRate, avgRt });
      });
    }

        [`${studentLabel}-系统信息`, [
          ["项目", "内容"],

          ["保存时间", state.savedAt || ""],

      ];
    }

    function formatSheetCell(value) {
      if (Array.isArray(value)) return value.join("；");
      if (value && typeof value === "object") return JSON.stringify(value);
      return value == null ? "" : value;
    }

    function buildLongTermBaseSheets(stateRecord, experimentTitle, storageKey) {
      const state = stateRecord.data?.fullState || stateRecord.data || {};
      const fields = state.fields || {};
      const studentLabel = state.studentId || stateRecord.studentId || "未知学生";

      return {
        state,
        fields,
        studentLabel,
        sheets: [
          [`${studentLabel}-基本信息`, [
            ["项目", "内容"],
            ["实验", experimentTitle],
            ["学号", state.studentId || stateRecord.studentId],
            ["姓名", state.studentName || stateRecord.studentName || ""],
            ["班级", state.className || stateRecord.className || ""],
            ["小组", state.groupName || state.groupId || stateRecord.groupName || ""],
            ["学生年龄", state.studentAge || ""],
            ["实验时间", state.savedAt || ""],
            ["后台提交时间", formatDate(stateRecord.uploadedAt || stateRecord.createdAt)],
            ["导出时间", new Date().toLocaleString()]
          ]],
          [`${studentLabel}-探究填写字段`, [
            ["字段", "内容"],
            ...Object.entries(fields).map(([key, value]) => [key, formatSheetCell(value)])
          ]],
          buildSurveySheet(studentLabel, state, "postMeta"),
          buildSurveySheet(studentLabel, state, "cognitiveLoad"),
          buildSurveySheet(studentLabel, state, "inquiryParticipation"),
          [`${studentLabel}-localStorage原始数据`, [
            ["localStorage key", "JSON"],
            [storageKey, JSON.stringify(state)]
          ]]
        ]
      };
    }

        ...records.map((record) => [
          record.studentId,
          record.studentName || "",
          record.className || "",
          record.groupName || record.groupId || "",
          record.participant,
          record.round,
          record.factor,
          record.materialSource,
          record.materialType,
          record.difficultyLabel || record.difficulty,
          record.condition,
          record.videoCondition,
          record.memorySeconds,
          record.restSeconds,
          record.interferenceSeconds,
          record.memoryItems,

          record.scoreRule,

          record.score ?? record.correctCount,
          `${record.accuracy}%`,
          record.recall,
          record.headband,
          record.emotionRating,

      base.sheets.splice(2, 0, detailSheet);

    }

    function buildStrategiesStateSheets(stateRecord) {
      const base = buildLongTermBaseSheets(stateRecord, "改善长时记忆的策略有哪些", "longterm-strategies-state-v1");

        ...records.map((record) => [
          record.studentId,
          record.studentName || "",
          record.className || "",
          record.groupName || record.groupId || "",
          record.stage,
          record.strategy,
          record.materialType,
          record.itemCount,
          record.memorySeconds,
          record.puzzleSeconds,

    function buildScreeningStateSheets(stateRecord) {
      const state = stateRecord.data?.fullState || stateRecord.data || {};
      const answers = state.answers || state.preMeta || {};
      const items = Array.isArray(state.items) ? state.items : [];
      const labels = state.labels || {};
      const studentLabel = state.studentId || stateRecord.studentId || "未知学生";

      return [
        [`${studentLabel}-基本信息`, [
          ["项目", "内容"],
          ["模块", "记忆侦探资格审查"],
          ["学号", state.studentId || stateRecord.studentId],
          ["姓名", state.studentName || stateRecord.studentName || ""],
          ["班级", state.className || stateRecord.className || ""],
          ["小组", state.groupName || state.groupId || stateRecord.groupName || ""],
          ["学生年龄", state.studentAge || ""],
          ["完成时间", state.completedAt || ""],
          ["后台提交时间", formatDate(stateRecord.uploadedAt || stateRecord.createdAt)],
          ["导出时间", new Date().toLocaleString()]
        ]],
        [`${studentLabel}-资格审查结果`, [
          ["题号", "题目", "作答结果", "每题得分"],
          ...items.map((item, index) => {
            const score = Number(answers[`q${index + 1}`] || 0);
            return [String(index + 1), item, labels[score] || "", score || ""];
          }),
          ["合计", "已完成题目", "", state.answered || Object.keys(answers).length],
          ["合计", "总分", "", state.total || ""],
          ["合计", "均分", "", state.average || ""],
          ["合计", "是否完成", "", state.complete || state.completed ? "是" : "否"]
        ]],
        [`${studentLabel}-localStorage原始数据`, [
          ["localStorage key", "JSON"],
          ["detectiveQualificationData", JSON.stringify(state)]
        ]]
      ];
    }

    function buildAiChatStateSheets(stateRecord) {
      const data = stateRecord.data || {};
      const logs = Array.isArray(data.logs) ? data.logs : [];
      const studentLabel = stateRecord.studentId || data.studentId || "未知学生";

      return [
        [`${studentLabel}-${data.sourceModule || "AI"}-AI对话`, [
          ["学号", "姓名", "班级", "小组", "来源模块", "实验/页面", "阶段", "提问时间", "学生问题", "AI回答"],
          ...logs.map((log) => [
            log.studentId || data.studentId || stateRecord.studentId,
            log.studentName || data.studentName || stateRecord.studentName || "",
            log.className || data.className || stateRecord.className || "",
            log.groupName || log.groupId || data.groupName || stateRecord.groupName || "",
            data.sourceModule || "",
            log.experimentName || data.experimentName || log.pageTitle || data.pageTitle || "",
            log.currentStep || "",
            log.timestamp || "",
            log.question || "",
            log.answer || ""
          ])
        ]],
        [`${studentLabel}-${data.sourceModule || "AI"}-AI原始数据`, [

        ]]

    }

    async function exportExcel() {
      setStatus("正在生成完整导出...");

      let sheets = [];
      try {
        const latestStateRecords = getLatestStateRecords(records);
        const detailSheets = latestStateRecords.flatMap((record) => {
          if (record.module === "nback") return buildNbackStateSheets(record);
          if (record.module === "interference") return buildInterferenceStateSheets(record);
          if (record.module === "strategies") return buildStrategiesStateSheets(record);
          if (record.module === "poster") return buildPosterStateSheets(record);
          if (record.module === "screening") return buildScreeningStateSheets(record);
          if (record.module === "aiChat") return buildAiChatStateSheets(record);
          return buildMemoryStateSheets(record);
        });
        sheets = [buildOverviewSheet(latestStateRecords), ...detailSheets];
      } catch (error) {
        console.warn("读取完整状态快照失败，将使用明细记录导出。", error);
      }

      if (!sheets.length) {
        sheets = buildFallbackSheets();
      }

      if (!sheets.length || !sheets.some(([, rows]) => rows.length > 1)) {
        setStatus("没有可导出的记录。");
        return;
      }

      const html = `<html><head><meta charset="utf-8"></head><body>${sheets.map(([title, rows]) => `
        <h2>${escapeHtml(title)}</h2>
        <table border="1">${rows.map((row) => `<tr>${row.map((cell) => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}</table>
        <br>
      `).join("")}</body></html>`;
      const blob = new Blob(["\ufeff", html], { type: "application/vnd.ms-excel;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `实验完整数据_${new Date().toISOString().slice(0, 10)}.xls`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      setStatus(`已导出 ${sheets.length} 个数据表。`);
    }

    queryBtn.addEventListener("click", loadRecords);
    exportBtn.addEventListener("click", exportExcel);
    resetBtn.addEventListener("click", () => {
      filters.studentId.value = "";

      filters.dateFrom.value = "";
      filters.dateTo.value = "";
      filters.sourceModule.value = "";
      filters.limit.value = "100";
      loadRecords();
    });
    closeDialogBtn.addEventListener("click", () => detailDialog.close());

    checkAdminLogin();
