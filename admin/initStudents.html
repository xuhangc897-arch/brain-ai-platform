<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学生账号初始化 - 教师工具</title>
  <style>
    :root {
      --bg: #f5f8ff;
      --panel: #fff;
      --ink: #142033;
      --muted: #667085;
      --line: #d8e1f2;
      --primary: #4f7cff;
      --primary-dark: #315fe4;
      --success: #16875f;
      --warning: #b7791f;
      --danger: #d92d20;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, #f8fbff 0%, var(--bg) 100%);
      padding: 32px 18px;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      width: min(960px, 100%);
      margin: 0 auto;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(52, 79, 135, 0.12);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
    }

    .intro {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.7;
    }

    .upload-box {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px dashed #a9bae0;
      border-radius: 14px;
      background: #f9fbff;
    }

    .upload-box strong {
      color: var(--primary-dark);
    }

    .auth-gate {
      display: none;
      margin-bottom: 18px;
      padding: 16px 18px;
      border: 1px solid #f1c16d;
      border-radius: 14px;
      background: #fff8e8;
      color: #7a4f01;
    }

    .auth-gate.is-visible {
      display: block;
    }

    .auth-gate p {
      margin: 0 0 12px;
      font-weight: 800;
    }

    .auth-gate .btn {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
    }

    .btn {
      min-height: 42px;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), #6aa1ff);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 12px 22px rgba(79, 124, 255, 0.22);
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.64;
    }

    .status {
      min-height: 22px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 22px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: #fbfcff;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 28px;
      line-height: 1;
    }

    .success strong {
      color: var(--success);
    }

    .skipped strong {
      color: var(--warning);
    }

    .failed strong {
      color: var(--danger);
    }

    table {
      width: 100%;
      margin-top: 22px;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
      background: #fff;
      font-size: 14px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #eef4ff;
      color: #344054;
      font-weight: 800;
    }

    .tag {
      display: inline-flex;
      min-width: 52px;
      justify-content: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 800;
    }

    .tag-success {
      background: #e8f7f0;
      color: var(--success);
    }

    .tag-skipped {
      background: #fff4db;
      color: var(--warning);
    }

    .tag-failed {
      background: #fdecec;
      color: var(--danger);
    }

    .error-details {
      display: none;
      margin-top: 22px;
      border: 1px solid #f1b8b8;
      border-radius: 14px;
      background: #fff8f8;
      overflow: hidden;
    }

    .error-details.is-visible {
      display: block;
    }

    .error-details h2 {
      margin: 0;
      padding: 12px 16px;
      border-bottom: 1px solid #f1b8b8;
      color: var(--danger);
      font-size: 16px;
    }

    .error-details pre {
      margin: 0;
      max-height: 320px;
      overflow: auto;
      padding: 16px;
      color: #7a271a;
      font: 13px/1.55 Consolas, "SFMono-Regular", Menlo, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 720px) {
      .panel {
        padding: 20px;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel" aria-labelledby="pageTitle">
      <h1 id="pageTitle">学生账号初始化</h1>
      <p class="intro">
        教师上传包含“学号、姓名、班级、小组”的 Excel 后，系统会导入学生资料。
        学生资料已导入，可使用学号和默认密码登录。
      </p>

      <div class="auth-gate" id="authGate">
        <p>请先登录后再导入学生账号。</p>
        <a class="btn" href="../login.html?redirect=admin/initStudents.html">去登录</a>
      </div>

      <div class="upload-box">
        <strong>Excel 表头必须包含：学号、姓名、班级、小组；可选包含：密码</strong>
        <input id="excelFile" type="file" accept=".xlsx,.xls" />
      </div>

      <div class="actions">
        <button class="btn" id="importBtn" type="button">开始导入</button>
        <span class="status" id="statusText">请选择 Excel 文件。</span>
      </div>

      <div class="summary" aria-label="导入统计">
        <div class="stat success">
          <span>成功</span>
          <strong id="successCount">0</strong>
        </div>
        <div class="stat skipped">
          <span>跳过</span>
          <strong id="skippedCount">0</strong>
        </div>
        <div class="stat failed">
          <span>失败</span>
          <strong id="failedCount">0</strong>
        </div>
      </div>

      <table aria-label="导入结果">
        <thead>
          <tr>
            <th>学号</th>
            <th>姓名</th>
            <th>班级</th>
            <th>小组</th>
            <th>结果</th>
            <th>原因</th>
          </tr>
        </thead>
        <tbody id="resultBody">
          <tr>
            <td colspan="6">尚未导入。</td>
          </tr>
        </tbody>
      </table>

      <section class="error-details" id="errorDetails" aria-labelledby="errorDetailsTitle">
        <h2 id="errorDetailsTitle">详细错误信息</h2>
        <pre id="errorDetailsContent">暂无错误。</pre>
      </section>
    </section>
  </main>

  <script src="https://static.cloudbase.net/cloudbase-js-sdk/3.0.0/cloudbase.full.js"></script>
  <script src="../cloudbase.js"></script>
  <script src="../assets/vendor/xlsx.full.min.js"></script>
  <script>
    if (!window.XLSX) {
      document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>');
    }
  </script>
  <script>
    if (!window.XLSX) {
      document.write('<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"><\/script>');
    }
  </script>
  <script>
    /*
     * 教师初始化工具
     * ------------------------------------------------------------
     * 本页面只用于批量初始化学生账号，不会被学生登录页引用。
     * 学生端 login.html 仍然只有登录能力，没有注册入口。
     */
    const REQUIRED_HEADERS = ["学号", "姓名", "班级", "小组"];
    const NO_STUDENTS_MESSAGE = "没有读取到学生数据，请检查 Excel 表头是否包含：学号、姓名、班级、小组。";
    const CREATE_STUDENTS_HTTP_URL = "https://memory-detective-platfor-d369a42-1441391469.ap-shanghai.app.tcloudbase.com/createStudents";

    const excelFile = document.getElementById("excelFile");
    const importBtn = document.getElementById("importBtn");
    const statusText = document.getElementById("statusText");
    const resultBody = document.getElementById("resultBody");
    const successCount = document.getElementById("successCount");
    const skippedCount = document.getElementById("skippedCount");
    const failedCount = document.getElementById("failedCount");
    const authGate = document.getElementById("authGate");
    const errorDetails = document.getElementById("errorDetails");
    const errorDetailsContent = document.getElementById("errorDetailsContent");

    /*
     * admin 页面不再自行初始化 CloudBase，也不再自行创建 Auth 实例。
     * 全项目统一使用 ../cloudbase.js 暴露的 window.app 和 window.auth。
     */
    let isLoggedIn = false;

    importBtn.disabled = true;

    async function getAdminLoginState() {
      if (typeof window.ensureCloudBaseLogin === "function") {
        await window.ensureCloudBaseLogin();
      }

      if (window.auth && typeof window.auth.getLoginState === "function") {
        const loginState = await window.auth.getLoginState();
        return Boolean(loginState && (loginState.user || loginState.uid || loginState.userId || loginState.accessToken || loginState.refreshToken || loginState.credential || loginState.loginType));
      }

      throw new Error("当前 CloudBase SDK 不支持检查登录状态。");
    }

    async function checkAdminLogin() {
      try {
        isLoggedIn = await getAdminLoginState();
      } catch (error) {
        console.error(error);
        isLoggedIn = false;
      }

      if (isLoggedIn) {
        authGate.classList.remove("is-visible");
        importBtn.disabled = false;
        setStatus("已登录，请选择 Excel 文件。");
      } else {
        authGate.classList.add("is-visible");
        importBtn.disabled = true;
        setStatus("请先登录后再导入学生账号。");
      }
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function normalizeCell(value) {
      return String(value ?? "").trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getErrorMessage(error) {
      return error?.message || error?.errMsg || error?.msg || "未知错误";
    }

    function getErrorCode(error) {
      return error?.code || error?.errCode || error?.errorCode || error?.category || "";
    }

    function isPermissionDenied(error) {
      const text = [
        error?.message,
        error?.msg,
        error?.errMsg,
        error?.code,
        error?.errCode,
        error?.errorCode,
        stringifyError(error)
      ].filter(Boolean).join(" ");

      return text.includes("PERMISSION_DENIED") || text.includes("Permission denied");
    }

    function stringifyError(error) {
      try {
        const seen = new WeakSet();
        return JSON.stringify(error, (key, value) => {
          if (typeof value === "object" && value !== null) {
            if (seen.has(value)) {
              return "[Circular]";
            }
            seen.add(value);
          }
          if (typeof value === "function") {
            return `[Function ${value.name || "anonymous"}]`;
          }
          return value;
        }, 2);
      } catch (stringifyErrorEvent) {
        return String(error);
      }
    }

    function formatErrorDetails(error, context) {
      const message = getErrorMessage(error);
      const code = getErrorCode(error);
      const debugInfo = error?.debugInfo || null;
      const raw = error?.raw || null;
      const details = [
        `context: ${context}`,
        "调用目标: createStudents 云函数",
        `错误来源: ${error?.source || "读取 Excel、调用 createStudents 或云函数返回"}`,
        "前端直接写 students 集合: 否，本页面只解析 Excel 并调用 createStudents",
        `error.message: ${message}`,
        `error.code: ${code || "无"}`,
        debugInfo ? `debugInfo: ${stringifyError(debugInfo)}` : "",
        raw ? `cloudFunctionRaw: ${stringifyError(raw)}` : "",
        "",
        "完整 error 对象:",
        stringifyError(error)
      ].filter((item) => item !== "");

      return details.join("\n");
    }

    function showErrorDetails(error, context) {
      console.error(error);
      errorDetails.classList.add("is-visible");
      errorDetailsContent.textContent = formatErrorDetails(error, context);
    }

    function hideErrorDetails() {
      errorDetails.classList.remove("is-visible");
      errorDetailsContent.textContent = "暂无错误。";
    }

    function validateHeaders(rows) {
      if (rows.length === 0) {
        throw new Error(NO_STUDENTS_MESSAGE);
      }

      const firstRow = rows[0] || {};
      const missingHeaders = REQUIRED_HEADERS.filter((header) => !(header in firstRow));

      if (missingHeaders.length > 0) {
        throw new Error(`Excel 缺少表头：${missingHeaders.join("、")}`);
      }
    }

    function assertXlsxLoaded() {
      if (window.XLSX && typeof window.XLSX.read === "function" && window.XLSX.utils) {
        return;
      }

      throw new Error("Excel 解析库 XLSX 加载失败。请检查网络是否能访问 CDN，或下载 xlsx.full.min.js 到 assets/vendor/xlsx.full.min.js 后刷新页面。");
    }

    async function readExcel(file) {
      assertXlsxLoaded();
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: "array" });
      const firstSheetName = workbook.SheetNames[0];

      if (!firstSheetName) {
        throw new Error("Excel 中没有可读取的工作表。");
      }

      const worksheet = workbook.Sheets[firstSheetName];
      const rows = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
      validateHeaders(rows);

      const students = rows.map((row, index) => ({
        rowNumber: index + 2,
        studentId: normalizeCell(row["学号"]),
        name: normalizeCell(row["姓名"]),
        className: normalizeCell(row["班级"]),
        groupName: normalizeCell(row["小组"]),
        password: normalizeCell(row["密码"])
      }));

      if (students.length === 0) {
        throw new Error(NO_STUDENTS_MESSAGE);
      }

      return students;
    }

    function validateOneStudent(student, seenStudentIds) {
      if (!student.studentId || !student.name || !student.className || !student.groupName) {
        return {
          status: "failed",
          reason: `第 ${student.rowNumber} 行缺少学号、姓名、班级或小组。`
        };
      }

      if (seenStudentIds.has(student.studentId)) {
        return {
          status: "skipped",
          reason: "Excel 中学号重复，已跳过。"
        };
      }

      seenStudentIds.add(student.studentId);
      return null;
    }

    function normalizeCreateStudentsResult(cloudFunctionResult) {
      if (cloudFunctionResult.ok === false) {
        const error = new Error(cloudFunctionResult.message || "createStudents 云函数执行失败。");
        error.code = cloudFunctionResult.code || "";
        error.raw = cloudFunctionResult;
        error.source = "createStudents 云函数返回失败";
        throw error;
      }

      return {
        success: Number(cloudFunctionResult.success) || 0,
        skipped: Number(cloudFunctionResult.skipped) || 0,
        failed: Number(cloudFunctionResult.failed) || 0,
        message: cloudFunctionResult.message || "",
        results: Array.isArray(cloudFunctionResult.results) ? cloudFunctionResult.results : []
      };
    }

    async function callCreateStudentsByHttp(students, originalError) {
      console.warn("callFunction 被权限拒绝，改用 HTTP 网关调用 createStudents。", originalError);

      const response = await fetch(CREATE_STUDENTS_HTTP_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ students })
      });

      const text = await response.text();
      let data = {};

      try {
        data = text ? JSON.parse(text) : {};
      } catch (error) {
        const parseError = new Error(`createStudents HTTP 网关返回了非 JSON 内容：${text.slice(0, 200)}`);
        parseError.source = "createStudents HTTP 网关返回格式错误";
        parseError.raw = text;
        throw parseError;
      }

      if (!response.ok) {
        const error = new Error(data.message || data.msg || `createStudents HTTP 网关调用失败：HTTP ${response.status}`);
        error.code = data.code || data.errCode || response.status;
        error.raw = data;
        error.source = "createStudents HTTP 网关调用失败";
        throw error;
      }

      return normalizeCreateStudentsResult(data.result || data);
    }

    async function callCreateStudents(students) {
      console.log("准备调用 createStudents");
      console.log("students 数组内容", students.map((student) => ({
        ...student,
        password: student.password ? "[已提供]" : "[使用默认密码]"
      })));

      let result;

      try {
        if (typeof window.ensureCloudBaseLogin === "function") {
          await window.ensureCloudBaseLogin();
        }

        const callFunctionTask = window.app.callFunction({
          name: "createStudents",
          data: { students }
        });

        const timeoutTask = new Promise((resolve, reject) => {
          window.setTimeout(() => {
            reject(new Error("调用 createStudents 云函数超时，请到 CloudBase 控制台查看 createStudents 最新日志。"));
          }, 30000);
        });

        result = await Promise.race([callFunctionTask, timeoutTask]);
        console.log("createStudents 云函数返回结果", result);
      } catch (error) {
        console.error("createStudents 云函数调用失败", error);

        if (isPermissionDenied(error)) {
          return await callCreateStudentsByHttp(students, error);
        }

        const debugInfo = {
          envId: window.BrainCloudBase?.ENV_ID || "",
          href: window.location.href,
          origin: window.location.origin,
          hasApp: Boolean(window.app),
          hasCallFunction: Boolean(window.app && typeof window.app.callFunction === "function"),
          hasAuth: Boolean(window.auth),
          currentUser: window.auth?.currentUser || null,
          loginState: null
        };

        try {
          debugInfo.loginState = await window.auth.getLoginState();
        } catch (loginStateError) {
          debugInfo.loginStateError = {
            message: loginStateError?.message || "",
            code: loginStateError?.code || "",
            stack: loginStateError?.stack || ""
          };
        }

        console.error("createStudents 调用前端诊断信息", debugInfo);
        error.debugInfo = debugInfo;
        error.source = "调用 createStudents 云函数失败，不是前端直接写 students 集合";
        throw error;
      }

      if (result.code) {
        const error = new Error(result.message || "调用 createStudents 云函数失败。");
        error.code = result.code;
        error.raw = result;
        error.source = "CloudBase callFunction 返回错误，调用目标是 createStudents";
        throw error;
      }

      const cloudFunctionResult = result.result || result.data || {};
      return normalizeCreateStudentsResult(cloudFunctionResult);
    }

    function renderResults(results) {
      if (results.length === 0) {
        resultBody.innerHTML = '<tr><td colspan="6">没有可导入的数据。</td></tr>';
        return;
      }

      resultBody.innerHTML = results.map((item) => {
        const tagClass = item.status === "success"
          ? "tag-success"
          : item.status === "skipped"
            ? "tag-skipped"
            : "tag-failed";
        const label = item.status === "success"
          ? "成功"
          : item.status === "skipped"
            ? "跳过"
            : "失败";

        return `
          <tr>
            <td>${escapeHtml(item.student.studentId)}</td>
            <td>${escapeHtml(item.student.name)}</td>
            <td>${escapeHtml(item.student.className)}</td>
            <td>${escapeHtml(item.student.groupName)}</td>
            <td><span class="tag ${tagClass}">${label}</span></td>
            <td>${escapeHtml(item.reason)}</td>
          </tr>
        `;
      }).join("");
    }

    function updateCounts(results) {
      successCount.textContent = String(results.filter((item) => item.status === "success").length);
      skippedCount.textContent = String(results.filter((item) => item.status === "skipped").length);
      failedCount.textContent = String(results.filter((item) => item.status === "failed").length);
    }

    importBtn.addEventListener("click", async () => {
      if (!isLoggedIn) {
        authGate.classList.add("is-visible");
        setStatus("请先登录后再导入学生账号。");
        return;
      }

      const file = excelFile.files[0];

      if (!file) {
        setStatus("请先选择 Excel 文件。");
        return;
      }

      importBtn.disabled = true;
      importBtn.textContent = "导入中...";
      setStatus("正在读取 Excel...");
      resultBody.innerHTML = '<tr><td colspan="6">正在导入，请稍候。</td></tr>';
      updateCounts([]);
      hideErrorDetails();

      try {
        const students = await readExcel(file);
        const results = [];
        const seenStudentIds = new Set();
        const validStudents = [];
        const validStudentMap = new Map();

        for (let index = 0; index < students.length; index += 1) {
          const student = students[index];
          const validationError = validateOneStudent(student, seenStudentIds);

          if (validationError) {
            results.push({
              student,
              status: validationError.status,
              reason: validationError.reason
            });
          } else {
            validStudents.push({
              studentId: student.studentId,
              name: student.name,
              class: student.className,
              group: student.groupName,
              password: student.password
            });
            validStudentMap.set(student.studentId, student);
          }

          renderResults(results);
          updateCounts(results);
        }

        if (students.length === 0) {
          throw new Error(NO_STUDENTS_MESSAGE);
        }

        if (validStudents.length === 0) {
          renderResults(results);
          updateCounts(results);
          setStatus(NO_STUDENTS_MESSAGE);
          return;
        }

        setStatus(`正在调用 createStudents 云函数，准备导入 ${validStudents.length} 人...`);
        const cloudImportResult = await callCreateStudents(validStudents);

        cloudImportResult.results.forEach((item) => {
          const student = validStudentMap.get(item.studentId) || {
            studentId: item.studentId || "",
            name: item.name || "",
            className: item.class || "",
            groupName: item.group || ""
          };

          results.push({
            student,
            status: item.status || "failed",
            reason: item.reason || item.message || "云函数未返回原因。"
          });
        });

        renderResults(results);
        updateCounts(results);

        setStatus(`导入结束：成功 ${cloudImportResult.success} 人，跳过 ${cloudImportResult.skipped} 人，失败 ${cloudImportResult.failed} 人。学生资料已导入，可使用学号和默认密码登录。`);
      } catch (error) {
        showErrorDetails(error, "读取 Excel 或整体导入流程失败");
        const message = getErrorMessage(error);
        const code = getErrorCode(error);
        const source = error?.source || "读取 Excel、调用 createStudents 或云函数返回";
        setStatus(`导入失败：${message}${code ? `（code: ${code}）` : ""}；调用目标：createStudents；错误来源：${source}`);
        resultBody.innerHTML = `<tr><td colspan="6">${escapeHtml(`message: ${message}${code ? `；code: ${code}` : ""}；调用目标：createStudents；错误来源：${source}`)}</td></tr>`;
      } finally {
        importBtn.disabled = false;
        importBtn.textContent = "开始导入";
      }
    });

    checkAdminLogin();
  </script>
</body>
</html>
