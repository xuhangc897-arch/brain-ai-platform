    function checked(field, value) {
      return state.fields[field] === value ? "checked" : "";
    }

    function selected(field, value) {
      return state.fields[field] === value ? "selected" : "";
    }

    function getMaterialTypeLabel(type) {
      return {
        image: "图片",
        number: "数字",
        letter: "英文大写字母",
        chinese: "汉字",
        图形: "图片",
        图片: "图片",
        数字: "数字",
        字母: "英文大写字母",
        英文大写字母: "英文大写字母",
        汉字: "汉字"
      }[type] || "图片";
    }

    function normalizeMaterialType(fields) {
      const legacy = fields.stimulusMaterial;
      const type = fields.materialType || (
        legacy === "数字" ? "number" :
        legacy === "英文大写字母" || legacy === "字母" ? "letter" :
        legacy === "汉字" ? "chinese" :
        "image"
      );
      fields.materialType = ["image", "number", "letter", "chinese"].includes(type) ? type : "image";
      fields.stimulusMaterial = getMaterialTypeLabel(fields.materialType);
    }

    function syncMaterialFields(type) {
      state.fields.materialType = ["image", "number", "letter", "chinese"].includes(type) ? type : "image";
      state.fields.stimulusMaterial = getMaterialTypeLabel(state.fields.materialType);
    }

    function bindInputs() {
      main.querySelectorAll("[data-field]").forEach((element) => {
        const field = element.dataset.field;
        element.addEventListener("change", () => updateField(element, field));
        element.addEventListener("input", () => {
          if (element.type !== "radio" && element.type !== "checkbox") updateField(element, field);
        });
      });
    }

    function updateField(element, field) {
      if (element.type === "checkbox") {
        state.fields[field] = element.checked;
      } else if (element.type === "radio") {
        if (element.checked) state.fields[field] = element.value;
      } else {
        state.fields[field] = element.value;
      }
      if (field === "materialType" || field === "stimulusMaterial") {
        if (field === "materialType") syncMaterialFields(state.fields.materialType);
        else normalizeMaterialType(state.fields);
      }
      saveState();
    }

    function bindStepEvents(stepId) {
      bindSurveyInputs();
      bindKnowledgeQuizInputs();
      const prev = document.getElementById("prevStep");
      const next = document.getElementById("nextStep");
      if (prev) {
        prev.addEventListener("click", () => {
          if (state.currentStep > 0) goToStep(state.currentStep - 1);
        });
      }
      if (next) {
        next.addEventListener("click", goNextStep);
      }
      if (stepId === "evidence") bindGameEvents();
      if (stepId === "question") bindPracticeEvents();
      const finalExport = document.getElementById("finalExportBtn");
      if (finalExport) finalExport.addEventListener("click", exportExcel);
      const reviewReport = document.getElementById("reviewReportBtn");
      if (reviewReport) reviewReport.addEventListener("click", () => generateReviewReport("nback"));
    }

    function generateReviewReport(activityType) {
      saveState();
      window.open(`review.html?activityType=${encodeURIComponent(activityType)}`, "_blank");
    }

    function bindPracticeEvents() {
      const open = document.getElementById("openPracticeBtn");
      const start = document.getElementById("practiceStartBtn");
      const restart = document.getElementById("practiceRestartBtn");
      const close = document.getElementById("practiceCloseBtn");
      const yes = document.getElementById("practiceYesBtn");
      const no = document.getElementById("practiceNoBtn");
      if (!open || !start || !restart || !close || !yes || !no) return;
      open.addEventListener("click", openPracticeModal);
      start.addEventListener("click", handlePracticeStart);
      restart.addEventListener("click", startPracticeGame);
      close.addEventListener("click", closePracticeModal);
      yes.addEventListener("click", () => submitPracticeResponse("是"));
      no.addEventListener("click", () => submitPracticeResponse("否"));
      updatePracticeUi();
    }

    function openPracticeModal() {
      const modal = document.getElementById("practiceModal");
      if (!modal) return;
      modal.classList.add("is-visible");
      practiceGame = null;
      clearPracticeAdvanceTimer();
      updatePracticeUi();
    }

    function closePracticeModal() {
      const modal = document.getElementById("practiceModal");
      if (!modal) return;
      modal.classList.remove("is-visible");
      practiceGame = null;
      clearPracticeAdvanceTimer();
      updatePracticeUi();
    }

    function handlePracticeStart() {
      if (!practiceGame || practiceGame.finished) {
        startPracticeGame();
        return;
      }
      if (practiceGame.currentIndex < practiceGame.n) {
        advancePracticeTrial();
      }
    }

    function startPracticeGame() {
      clearPracticeAdvanceTimer();
      practiceGame = {
        n: 2,
        totalTrials: 10,
        sequence: generateSequence(2, 10, "number"),
        currentIndex: 0,
        correct: 0,
        answered: 0,
        finished: false,
        lastFeedback: "请先记住前两个数字。"
      };
      updatePracticeUi();
    }

    function submitPracticeResponse(response) {
      if (!practiceGame || practiceGame.finished || practiceGame.currentIndex < practiceGame.n) return;
      const index = practiceGame.currentIndex;
      const expected = practiceGame.sequence[index] === practiceGame.sequence[index - practiceGame.n] ? "是" : "否";
      const isCorrect = response === expected;
      practiceGame.answered += 1;
      if (isCorrect) practiceGame.correct += 1;
      practiceGame.lastFeedback = isCorrect ? "正确" : "不正确";
      updatePracticeUi(true);
      clearPracticeAdvanceTimer();
      practiceAdvanceTimerId = window.setTimeout(advancePracticeTrial, 650);
    }

    function advancePracticeTrial() {
      if (!practiceGame) return;
      clearPracticeAdvanceTimer();
      practiceGame.currentIndex += 1;
      if (practiceGame.currentIndex >= practiceGame.totalTrials) {
        practiceGame.finished = true;
        const accuracy = practiceGame.answered ? Math.round((practiceGame.correct / practiceGame.answered) * 100) : 0;
        practiceGame.lastFeedback = `体验完成，正确率 ${accuracy}%`;
      } else if (practiceGame.currentIndex < practiceGame.n) {
        practiceGame.lastFeedback = "请先记住前两个数字。";
      } else {
        practiceGame.lastFeedback = `请判断当前数字是否与前 ${practiceGame.n} 个数字相同。`;
      }
      updatePracticeUi();
    }

    function clearPracticeAdvanceTimer() {
      if (practiceAdvanceTimerId) {
        window.clearTimeout(practiceAdvanceTimerId);
        practiceAdvanceTimerId = null;
      }
    }

    function updatePracticeUi(lockResponses = false) {
      const progress = document.getElementById("practiceProgress");
      const number = document.getElementById("practiceNumber");
      const feedback = document.getElementById("practiceFeedback");
      const yes = document.getElementById("practiceYesBtn");
      const no = document.getElementById("practiceNoBtn");
      const start = document.getElementById("practiceStartBtn");
      if (!progress || !number || !feedback || !yes || !no || !start) return;

      if (!practiceGame) {
        progress.textContent = "尚未开始";
        number.textContent = "?";
        feedback.textContent = "点击“开始体验”后开始。";
        yes.disabled = true;
        no.disabled = true;
        start.disabled = false;
        start.textContent = "开始体验";
        return;
      }

      if (practiceGame.finished) {
        progress.textContent = `第 ${practiceGame.totalTrials} / ${practiceGame.totalTrials} 个`;
        number.textContent = practiceGame.sequence[practiceGame.totalTrials - 1];
        feedback.textContent = practiceGame.lastFeedback;
        yes.disabled = true;
        no.disabled = true;
        start.disabled = false;
        start.textContent = "开始体验";
        return;
      }

      const index = practiceGame.currentIndex;
      const isWarmup = index < practiceGame.n;
      progress.textContent = `第 ${index + 1} / ${practiceGame.totalTrials} 个`;
      number.textContent = practiceGame.sequence[index];
      feedback.textContent = practiceGame.lastFeedback;
      yes.disabled = isWarmup || lockResponses;
      no.disabled = isWarmup || lockResponses;
      start.disabled = !isWarmup;
      start.textContent = isWarmup ? "继续体验" : "开始体验";
    }

    function bindGameEvents() {
      const mode = document.getElementById("gameMode");
      const condition = document.getElementById("gameCondition");
      const start = document.getElementById("startGameBtn");
      const yes = document.getElementById("yesBtn");
      const no = document.getElementById("noBtn");
      const confirmStart = document.getElementById("confirmStartGameBtn");
      const cancelStart = document.getElementById("cancelStartGameBtn");
      mode.addEventListener("change", populateConditions);
      start.addEventListener("click", showFocusPrep);
      confirmStart.addEventListener("click", startGame);
      cancelStart.addEventListener("click", hideFocusPrep);
      yes.addEventListener("click", () => submitResponse("是"));
      no.addEventListener("click", () => submitResponse("否"));
      document.onkeydown = (event) => {
        if (!currentGame || steps[state.currentStep].id !== "evidence") return;
        const key = event.key.toLowerCase();
        if (key === "y") submitResponse("是");
        if (key === "n") submitResponse("否");
      };
      populateConditions();
      condition.dispatchEvent(new Event("change"));
      updateGameUi();
    }

    function showFocusPrep() {
      const intervalInput = document.getElementById("stimulusInterval");
      const seconds = clampInterval(intervalInput.value);
      intervalInput.value = seconds;
      state.fields.stimulusInterval = seconds;
      saveState();
      document.getElementById("focusPrep").classList.add("is-visible");
    }

    function hideFocusPrep() {
      document.getElementById("focusPrep").classList.remove("is-visible");
    }

    function clampInterval(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return 2;
      return Math.min(5, Math.max(1, numeric));
    }

    function populateConditions() {
      const mode = document.getElementById("gameMode").value;
      const condition = document.getElementById("gameCondition");
      const options = mode === "levels"
        ? [15, 20, 25, 30, 35].map((total) => ({ value: `2-${total}`, label: `N=2，关卡数=${total}` }))
        : [2, 3, 4, 5, 6].map((n) => ({ value: `${n}-15`, label: `N=${n}，关卡数=15` }));
      condition.innerHTML = options.map((item) => `<option value="${item.value}">${item.label}</option>`).join("");
    }

    function startGame() {
      hideFocusPrep();
      const [nValue, totalValue] = document.getElementById("gameCondition").value.split("-").map(Number);
      const subject = document.getElementById("gameSubject").value.trim() || state.fields.participantId || state.studentId;
      const mode = document.getElementById("gameMode").value;
      const materialType = document.getElementById("gameStimulus").value;
      const intervalSeconds = clampInterval(document.getElementById("stimulusInterval").value);
      state.fields.stimulusInterval = intervalSeconds;
      state.fields.participantId = subject;
      syncMaterialFields(materialType);
      saveState();
      const sequence = generateSequence(nValue, totalValue, state.fields.materialType);
      currentGame = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        subject,
        mode,
        materialType: state.fields.materialType,
        stimulusType: state.fields.materialType,
        n: nValue,
        totalTrials: totalValue,
        conditionLabel: `N=${nValue}，关卡数=${totalValue}`,
        intervalSeconds,
        sequence,
        currentIndex: 0,
        records: [],
        startedAt: new Date().toISOString()
      };
      enterFocusMode();
      showCurrentTrial();
    }

    function generateSequence(n, total, materialType) {
      const poolMap = {
        image: ["●", "▲", "■", "◆", "★", "✚", "⬟", "⬤"],
        number: ["1", "2", "3", "4", "5", "6", "7", "8", "9"],
        letter: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""),
        chinese: ["山", "水", "木", "火", "土", "日", "月", "人", "口", "手", "目", "田", "石", "云", "雨", "风", "花", "鸟", "鱼", "马"]
      };
      const pool = poolMap[materialType] || poolMap.image;
      const sequence = [];
      for (let i = 0; i < total; i += 1) {
        if (i < n) {
          sequence.push(pool[Math.floor(Math.random() * pool.length)]);
          continue;
        }
        const shouldMatch = Math.random() < 0.32;
        if (shouldMatch) {
          sequence.push(sequence[i - n]);
        } else {
          const previous = sequence[i - n];
          const choices = pool.filter((item) => item !== previous);
          sequence.push(choices[Math.floor(Math.random() * choices.length)]);
        }
      }
      return sequence;
    }

    function showCurrentTrial() {
      if (!currentGame) return;
      clearTrialTimers();
      if (currentGame.currentIndex >= currentGame.totalTrials) {
        finishGame();
        return;
      }
      const stimulus = document.getElementById("stimulus");
      const value = currentGame.sequence[currentGame.currentIndex];
      stimulus.textContent = value;
      stimulus.classList.toggle("shape", currentGame.materialType === "image");
      trialStartedAt = performance.now();
      updateGameUi();
      startTrialTimers();
    }

    function submitResponse(response) {
      if (!currentGame) return;
      const index = currentGame.currentIndex;
      if (index < currentGame.n) return;
      clearTrialTimers();
      const expected = currentGame.sequence[index] === currentGame.sequence[index - currentGame.n] ? "是" : "否";
      const responseTime = Math.round(performance.now() - trialStartedAt);
      currentGame.records.push(makeRecord(expected, response, response === expected, responseTime, "answer"));
      currentGame.currentIndex += 1;
      showCurrentTrial();
    }

    function startTrialTimers() {
      if (!currentGame) return;
      updateCountdown();
      countdownIntervalId = window.setInterval(updateCountdown, 80);
      trialTimeoutId = window.setTimeout(handleTrialTimeout, currentGame.intervalSeconds * 1000);
    }

    function clearTrialTimers() {
      if (trialTimeoutId) {
        window.clearTimeout(trialTimeoutId);
        trialTimeoutId = null;
      }
      if (countdownIntervalId) {
        window.clearInterval(countdownIntervalId);
        countdownIntervalId = null;
      }
    }

    function updateCountdown() {
      if (!currentGame) return;
      const fill = document.getElementById("countdownFill");
      if (!fill) return;
      const elapsed = performance.now() - trialStartedAt;
      const total = currentGame.intervalSeconds * 1000;
      const remaining = Math.max(0, 1 - elapsed / total);
      fill.style.width = `${Math.round(remaining * 100)}%`;
    }

    function handleTrialTimeout() {
      if (!currentGame) return;
      const index = currentGame.currentIndex;
      clearTrialTimers();
      if (index < currentGame.n) {
        currentGame.records.push(makeRecord("/", "/", null, "", "observe"));
      } else {
        const expected = currentGame.sequence[index] === currentGame.sequence[index - currentGame.n] ? "是" : "否";
        currentGame.records.push(makeRecord(expected, "漏答", "miss", "", "miss"));
      }
      currentGame.currentIndex += 1;
      showCurrentTrial();
    }

    function makeRecord(expected, response, isCorrect, responseTime, recordType) {
      const index = currentGame.currentIndex;
      return {
        runId: currentGame.id,
        studentName: state.studentName,
        studentAge: state.studentAge,
        studentId: state.studentId,
        groupId: state.groupId,
        subject: currentGame.subject,
        mode: currentGame.mode === "levels" ? "关卡数量" : "N的大小",
        conditionLabel: currentGame.conditionLabel,
        n: currentGame.n,
        totalTrials: currentGame.totalTrials,
        intervalSeconds: currentGame.intervalSeconds,
        materialType: currentGame.materialType,
        stimulusType: getMaterialTypeLabel(currentGame.materialType),
        trialNumber: index + 1,
        stimulus: currentGame.sequence[index],
        expected,
        response,
        isCorrect,
        recordType,
        isMissed: recordType === "miss",
        responseTime,
        createdAt: new Date().toLocaleString()
      };
    }

    function finishGame() {
      clearTrialTimers();
      state.testRuns.push(...currentGame.records);
      saveState();
      const finished = currentGame;
      currentGame = null;
      exitFocusMode();
      updateGameUi();
      alert(`${finished.subject} 的 ${finished.conditionLabel} 已完成并保存。`);
    }

    async function enterFocusMode() {
      document.body.classList.add("is-focus-mode");
      try {
        if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen();
        }
      } catch (error) {
        // Browser or user may reject fullscreen; page-level focus mode still works.
      }
    }

    async function exitFocusMode() {
      document.body.classList.remove("is-focus-mode");
      try {
        if (document.fullscreenElement && document.exitFullscreen) {
          await document.exitFullscreen();
        }
      } catch (error) {
        // Leaving fullscreen is best-effort.
      }
    }

    function updateGameUi() {
      const status = document.getElementById("gameStatus");
      const conditionStat = document.getElementById("conditionStat");
      const trialStat = document.getElementById("trialStat");
      const correctStat = document.getElementById("correctStat");
      const accuracyStat = document.getElementById("accuracyStat");
      const missedStat = document.getElementById("missedStat");
      const yes = document.getElementById("yesBtn");
      const no = document.getElementById("noBtn");
      const log = document.getElementById("gameLogBody");

      if (!status) return;

      if (!currentGame) {
        status.textContent = "请选择条件并开始";
        conditionStat.textContent = "--";
        trialStat.textContent = "0/0";
        correctStat.textContent = "0";
        accuracyStat.textContent = "0%";
        missedStat.textContent = "0";
        yes.disabled = true;
        no.disabled = true;
        document.getElementById("stimulus").textContent = "N";
        document.getElementById("countdownFill").style.width = "100%";
        log.innerHTML = `<tr><td colspan="4">暂无本轮记录</td></tr>`;
        return;
      }

      const index = currentGame.currentIndex;
      const answered = currentGame.records.filter((record) => record.recordType === "answer");
      const correct = answered.filter((record) => record.isCorrect).length;
      const missed = currentGame.records.filter((record) => record.recordType === "miss").length;
      const accuracy = answered.length ? Math.round((correct / answered.length) * 100) : 0;
      const warmup = index < currentGame.n;
      status.textContent = warmup ? `第 ${index + 1} 关：只观察，不判断` : `第 ${index + 1} 关：判断是否与前 ${currentGame.n} 个相同`;
      conditionStat.textContent = `${currentGame.conditionLabel} / ${currentGame.intervalSeconds}秒`;
      trialStat.textContent = `${Math.min(index + 1, currentGame.totalTrials)}/${currentGame.totalTrials}`;
      correctStat.textContent = String(correct);
      accuracyStat.textContent = `${accuracy}%`;
      missedStat.textContent = String(missed);
      yes.disabled = warmup;
      no.disabled = warmup;
      log.innerHTML = currentGame.records.length ? currentGame.records.slice().reverse().map((record) => `
        <tr>
          <td>${record.trialNumber}</td>
          <td>${record.expected}</td>
          <td>${record.response}</td>
          <td>${record.recordType === "observe" ? '<span class="tag">观察</span>' : record.recordType === "miss" ? '<span class="tag bad">漏答</span>' : record.isCorrect ? '<span class="tag ok">正确</span>' : '<span class="tag bad">错误</span>'}</td>
        </tr>
      `).join("") : `<tr><td colspan="4">本轮开始后会显示记录</td></tr>`;
    }

    function summarizeRuns() {
      const groups = new Map();
      state.testRuns.forEach((record) => {
        const recordType = getRecordType(record);
        if (recordType === "observe") return;
        const key = `${record.subject}|${record.conditionLabel}|${record.stimulusType}`;
        if (!groups.has(key)) {
          groups.set(key, {
            subject: record.subject,
            conditionLabel: `${record.conditionLabel}（${record.stimulusType}）`,
            correct: 0,
            totalAnswered: 0,
            missed: 0,
            rtSum: 0,
            rtCount: 0
          });
        }
        const item = groups.get(key);
        if (recordType === "miss") {
          item.missed += 1;
          return;
        }
        item.totalAnswered += 1;
        if (record.isCorrect === true) item.correct += 1;
        if (record.responseTime) {
          item.rtSum += Number(record.responseTime);
          item.rtCount += 1;
        }
      });
      return Array.from(groups.values()).map((item) => ({
        ...item,
        accuracy: item.totalAnswered ? Math.round((item.correct / item.totalAnswered) * 100) : 0,
        missRate: item.totalAnswered + item.missed ? Math.round((item.missed / (item.totalAnswered + item.missed)) * 100) : 0,
        avgRt: item.rtCount ? Math.round(item.rtSum / item.rtCount) : 0
      }));
    }

    function getRecordType(record) {
      if (record.recordType) return record.recordType;
      if (record.isCorrect === null) return "observe";
      if (record.response === "漏答") return "miss";
      return "answer";
    }

    function exportExcel() {
      const summary = summarizeRuns();
      const sheets = [
        ["基本信息", [
          ["项目", "内容"],
          ["学生姓名", state.studentName || ""],
          ["学生年龄", state.studentAge || ""],
          ["学生编号", state.studentId],
          ["小组编号", state.groupId],
          ["实验时间", state.savedAt || ""],
          ["导出时间", new Date().toLocaleString()]
        ]],
        ["实验过程", [
          ["字段", "内容"],
          ...getThinkingRows(),
          ["自变量", state.fields.independentVariable],
          ["因变量-工作记忆表现", state.fields.dependentMemory ? "是" : "否"],
          ["因变量-大脑活动水平", state.fields.dependentBrain ? "是" : "否"],
          ["控制变量-记忆内容类型", state.fields.controlContentType ? "是" : "否"],
          ["其他控制变量", state.fields.controlOther],
          ["研究问题", state.fields.researchQuestion],
          ["研究假设", state.fields.hypothesis],
          ["实验材料类别", getMaterialTypeLabel(state.fields.materialType || state.fields.stimulusMaterial)],
          ["实验材料", state.fields.stimulusMaterial],
          ["实验设计", state.fields.experimentDesign],
          ["A 被测试者", state.fields.roleA],
          ["B 被测试者", state.fields.roleB],
          ["C 指导与操作", state.fields.roleC],
          ["D 记录与统计", state.fields.roleD],
          ["头环观察记录", state.fields.headbandObservation],
          ["假设判断", state.fields.conclusionSupported],
          ["结论", state.fields.conclusion],
          ["改进", state.fields.improvement],
          ["提高说服力", state.fields.persuasiveness]
        ]],
        ["N-back明细记录", [
          ["学生姓名", "学生年龄", "学生编号", "小组编号", "被测试者", "实验设计", "条件", "N", "关卡数", "每题规定作答时间s", "实验材料类别", "刺激类型", "关卡", "刺激", "正确答案", "学生答案", "记录类型", "是否漏答", "是否正确", "反应时ms", "记录时间"],
          ...state.testRuns.map((record) => {
            const recordType = getRecordType(record);
            return [
              record.studentName || "",
              record.studentAge || "",
              record.studentId,
              record.groupId,
              record.subject,
              record.mode,
              record.conditionLabel,
              record.n,
              record.totalTrials,
              record.intervalSeconds || "",
              getMaterialTypeLabel(record.materialType || record.stimulusType),
              record.stimulusType,
              record.trialNumber,
              record.stimulus,
              record.expected,
              record.response,
              recordType === "observe" ? "观察" : recordType === "miss" ? "漏答" : "作答",
              recordType === "miss" ? "是" : "否",
              recordType === "observe" ? "无需判断" : recordType === "miss" ? "漏答" : record.isCorrect ? "正确" : "错误",
              record.responseTime,
              record.createdAt
            ];
          })
        ]],
        ["条件汇总正确率", [
          ["被测试者", "条件", "作答题数", "正确题数", "正确率", "漏答数", "漏答率", "平均反应时ms"],
          ...summary.map((item) => [item.subject, item.conditionLabel, item.totalAnswered, item.correct, `${item.accuracy}%`, item.missed, `${item.missRate}%`, item.avgRt || ""])
        ]],
        getTeamResultSheet(summary),
        getHeadbandSummarySheet(),
        getSystemInfoSheet(state.testRuns.length),
        getRawStorageSheet(),
        ...getSurveySheets()
      ];

      const html = `
        <html><head><meta charset="utf-8"></head><body>
          ${sheets.map(([title, rows]) => `
            <h2>${escapeHtml(title)}</h2>
            <table border="1">
              ${rows.map((row) => `<tr>${row.map((cell) => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}
            </table>
            <br>
          `).join("")}
        </body></html>
      `;
      const blob = new Blob(["\ufeff", html], { type: "application/vnd.ms-excel;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `N-back科学探究_${state.groupId}_${state.studentId}.xls`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const studentName = document.getElementById("studentName").value.trim();
      const studentAge = document.getElementById("studentAge").value.trim();
      const studentId = document.getElementById("studentId").value.trim();
      const groupId = document.getElementById("groupId").value.trim();
      if (!studentId || !groupId) {
        loginError.textContent = "请先填写学生编号和小组编号。";
        return;
      }
      loginError.textContent = "";
      state.studentName = studentName;
      state.studentAge = studentAge;
      state.studentId = studentId;
      state.groupId = groupId;
      state.started = true;
      localStorage.setItem(CONTEXT_KEY, JSON.stringify({
        studentName,
        studentAge,
        studentId,
        groupId,
        savedAt: new Date().toISOString()
      }));
      saveState();
      renderApp();
    });

    homeBtn.addEventListener("click", () => {
      location.href = "index.html";
    });
    document.getElementById("devModeBtn").addEventListener("click", enableDeveloperMode);

    exportBtn.addEventListener("click", exportExcel);
    resetBtn.addEventListener("click", () => {
      if (!confirm("确定要清空当前浏览器中保存的活动数据吗？")) return;
      localStorage.removeItem(STORAGE_KEY);
      state = loadState();
      currentGame = null;
      renderApp();
    });

    renderApp();
  </script>
  <script src="assets/ai-assistant.js"></script>
  <script src="assets/voice-recorder.js"></script>
  <script src="assets/voice-assistant.js"></script>
</body>
