<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>N-back 科学探究活动</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #dbe3ef;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #eaf1ff;
      --teal: #0f766e;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
      --shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
      --radius: 8px;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 8px;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: none;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(23, 32, 51, 0.06);
      backdrop-filter: blur(10px);
    }

    .topbar.is-visible {
      display: block;
    }

    body.is-focus-mode .topbar {
      display: none;
    }

    body.is-focus-mode {
      background: #08111f;
    }

    body.is-focus-mode .main {
      max-width: none;
      min-height: 100vh;
      padding: 0;
    }

    body.is-focus-mode .main > .panel {
      min-height: 100vh;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      background: #08111f;
    }

    body.is-focus-mode .main > .panel > .panel-head,
    body.is-focus-mode .main > .panel > .panel-body > .actions,
    body.is-focus-mode .nback-toolbar,
    body.is-focus-mode .game-log,
    body.is-focus-mode .game-side .stat-grid {
      display: none;
    }

    body.is-focus-mode .main > .panel > .panel-body {
      min-height: 100vh;
      padding: 0;
    }

    .topbar-inner {
      max-width: 1240px;
      margin: 0 auto;
      padding: 14px 24px 12px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .brand-title {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .brand-title h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .identity-pill {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(8, minmax(88px, 1fr));
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .progress-step {
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: #f9fbff;
      color: var(--muted);
      border-radius: 8px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-step strong {
      display: inline-grid;
      place-items: center;
      width: 22px;
      height: 22px;
      flex: 0 0 22px;
      border-radius: 50%;
      background: #edf2f7;
      color: #475467;
      font-size: 12px;
    }

    .progress-step span {
      font-size: 13px;
      line-height: 1.25;
      white-space: nowrap;
    }

    .progress-step.is-active {
      background: var(--primary-soft);
      border-color: #9ec5ff;
      color: var(--primary-dark);
    }

    .progress-step.is-active strong {
      background: var(--primary);
      color: #fff;
    }

    .progress-step.is-done {
      background: #eefaf6;
      border-color: #bde7d5;
      color: var(--teal);
    }

    .progress-step.is-done strong {
      background: var(--teal);
      color: #fff;
    }

    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(15, 118, 110, 0.06)),
        var(--bg);
    }

    .login-card {
      width: min(900px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .login-intro {
      padding: 44px;
      background: #0f172a;
      color: #fff;
    }

    .login-intro h2 {
      margin: 0 0 14px;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .login-intro p {
      margin: 0 0 24px;
      color: #cbd5e1;
      font-size: 16px;
    }

    .intro-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 30px;
    }

    .intro-stat {
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
    }

    .intro-stat b {
      display: block;
      font-size: 24px;
      line-height: 1;
    }

    .intro-stat span {
      color: #cbd5e1;
      font-size: 12px;
    }

    .login-form {
      padding: 44px;
    }

    .login-form h3 {
      margin: 0 0 18px;
      font-size: 22px;
    }

    .field {
      margin-bottom: 18px;
    }

    .material-inline-field {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 300px;
    }

    .material-inline-field label {
      margin-bottom: 0;
      white-space: nowrap;
    }

    .material-inline-field select {
      width: 200px;
      flex: 0 0 200px;
    }

    .nback-toolbar .material-inline-field {
      align-self: flex-end;
      min-height: 42px;
    }

    .toolbar.nback-toolbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      align-items: end;
    }

    .toolbar.nback-toolbar .field {
      min-width: 0;
      margin-bottom: 0;
    }

    .toolbar.nback-toolbar label {
      white-space: normal;
    }

    .toolbar.nback-toolbar .btn {
      align-self: end;
      width: 100%;
      min-height: 42px;
    }

    .member-result-list {
      display: grid;
      gap: 12px;
    }

    .member-result-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
    }

    .member-result-row .field {
      margin-bottom: 0;
    }

    .member-id-field {
      width: 130px;
      flex: 0 0 130px;
    }

    .member-material-field {
      width: 180px;
      flex: 0 0 180px;
    }

    .member-number-field {
      width: 150px;
      flex: 0 0 150px;
    }

    .percent-input {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .percent-input span {
      color: var(--muted);
      font-weight: 800;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #344054;
      font-size: 14px;
      font-weight: 700;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 11px 12px;
      outline: none;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .error {
      min-height: 22px;
      margin: 8px 0 0;
      color: var(--red);
      font-size: 13px;
      font-weight: 700;
    }

    .main {
      display: none;
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 24px 44px;
    }

    .main.is-visible {
      display: block;
    }

    .step-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      align-items: start;
    }

    .single-step-layout,
    .reflection-layout {
      display: grid;
      gap: 22px;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .reflection-layout {
      max-width: 1000px;
    }

    .analysis-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      align-items: start;
    }

    .analysis-layout .panel,
    .single-step-layout .panel,
    .reflection-layout .panel {
      border-radius: 10px;
    }

    .panel-head h2,
    .panel-head h3 {
      font-size: 20px;
    }

    .single-step-layout .panel-body,
    .reflection-layout .panel-body {
      padding: 24px;
    }

    input:not([type="checkbox"]):not([type="radio"]),
    textarea,
    select {
      min-height: 42px;
    }

    .analysis-layout .empty-state {
      min-height: 120px;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .team-result-card table input {
      min-height: 38px;
      padding: 8px 10px;
    }

    .team-result-card th,
    .team-result-card td {
      padding: 8px 9px;
    }

    .reflection-layout textarea {
      min-height: 140px;
    }

    .reflection-layout textarea::placeholder {
      color: #98a2b3;
      opacity: 1;
    }

    .reflection-layout textarea:focus::placeholder {
      color: transparent;
    }

    .thinking-layer { display: grid; gap: 14px; }
    .thinking-box { border-radius: 8px; padding: 14px; }
    .thinking-personal { border: 1px solid #dbeafe; background: #fff; }
    .thinking-group { border: 1px dashed #bfdbfe; background: #f8fbff; }
    .thinking-label { display: block; margin-bottom: 10px; color: #1e3a8a; font-size: 14px; font-weight: 900; }
    .thinking-group textarea { background: #fff; min-height: 110px; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(23, 32, 51, 0.05);
    }

    .panel-head {
      padding: 20px 22px 12px;
      border-bottom: 1px solid #eef2f7;
    }

    .panel-head h2,
    .panel-head h3 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .panel-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .panel-body {
      padding: 20px 22px 22px;
    }

    .reading-list {
      display: grid;
      gap: 14px;
    }

    .reading-card {
      border: 1px solid #e5edf7;
      border-radius: 8px;
      padding: 16px;
      background: #fbfdff;
    }

    .reading-card h4 {
      margin: 0 0 8px;
      font-size: 16px;
      color: #1e3a8a;
    }

    .reading-card p {
      margin: 0 0 10px;
      color: #344054;
      font-size: 14px;
    }

    .reading-card p:last-child {
      margin-bottom: 0;
    }

    .headband-image-container {
      margin: 24px 0;
      text-align: center;
    }

    .headband-guide-image {
      width: 100%;
      max-width: 1100px;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      display: block;
      margin: 0 auto;
    }

    .memory-table-wrap {
      margin-top: 12px;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .memory-table {
      min-width: 520px;
      margin: 0;
      font-size: 13px;
    }

    .memory-table th,
    .memory-table td {
      border-bottom: 1px solid #edf2f7;
      padding: 10px 12px;
      vertical-align: top;
    }

    .memory-table tr:last-child td {
      border-bottom: 0;
    }

    .memory-table th:first-child,
    .memory-table td:first-child {
      width: 120px;
      font-weight: 800;
      color: #1e3a8a;
      white-space: nowrap;
    }

    .nback-example {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .nback-example-svg {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .practice-entry {
      display: flex;
      justify-content: flex-start;
    }

    .practice-modal {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(8, 17, 31, 0.68);
    }

    .practice-modal.is-visible {
      display: grid;
    }

    .practice-card {
      width: min(620px, 100%);
      max-height: calc(100vh - 48px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 24px 80px rgba(8, 17, 31, 0.26);
    }

    .practice-head {
      padding: 20px 22px 12px;
      border-bottom: 1px solid #eef2f7;
    }

    .practice-head h3 {
      margin: 0;
      font-size: 22px;
    }

    .practice-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .practice-body {
      display: grid;
      gap: 16px;
      padding: 20px 22px 22px;
    }

    .practice-settings {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .practice-settings div,
    .practice-feedback {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #f8fbff;
    }

    .practice-settings span,
    .practice-feedback span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .practice-settings b,
    .practice-feedback b {
      color: var(--ink);
      font-size: 16px;
    }

    .practice-stage {
      display: grid;
      place-items: center;
      min-height: 180px;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .practice-number {
      display: grid;
      place-items: center;
      width: 116px;
      aspect-ratio: 1 / 1;
      border: 2px solid #bfdbfe;
      border-radius: 8px;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 56px;
      line-height: 1;
      font-weight: 900;
    }

    .practice-response-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .practice-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .choice-group {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .choice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #344054;
    }

    .choice input {
      width: auto;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 16px;
      background: var(--primary);
      color: #fff;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .btn.secondary {
      background: #fff;
      color: #344054;
      border: 1px solid var(--line);
    }

    .btn.secondary:hover {
      background: #f8fafc;
    }

    .btn.success {
      background: var(--green);
    }

    .btn.success:hover {
      background: #15803d;
    }

    .btn.danger {
      background: #fff;
      color: var(--red);
      border: 1px solid #fecaca;
    }

    .btn.danger:hover {
      background: #fff5f5;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    .toolbar .field {
      min-width: 180px;
      flex: 1;
      margin-bottom: 0;
    }

    .game-area {
      display: grid;
      grid-template-columns: 1fr 330px;
      gap: 18px;
      align-items: stretch;
    }

    body.is-focus-mode .game-area {
      min-height: 100vh;
      grid-template-columns: 1fr;
      gap: 0;
      background: #08111f;
    }

    .stimulus-stage {
      display: grid;
      place-items: center;
      min-height: 380px;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      background:
        linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      position: relative;
      overflow: hidden;
    }

    body.is-focus-mode .stimulus-stage {
      min-height: 100vh;
      border: 0;
      border-radius: 0;
      background: radial-gradient(circle at center, #12213a 0%, #08111f 66%);
    }

    .stimulus-meta {
      position: absolute;
      top: 14px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    body.is-focus-mode .stimulus-meta {
      top: 30px;
      left: 36px;
      right: 36px;
      color: #dbeafe;
      font-size: 20px;
    }

    .stimulus {
      display: grid;
      place-items: center;
      width: min(240px, 70vw);
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      background: #eff6ff;
      border: 2px solid #bfdbfe;
      color: #1e3a8a;
      font-size: 88px;
      font-weight: 800;
      line-height: 1;
    }

    body.is-focus-mode .stimulus {
      width: min(560px, 76vw);
      font-size: clamp(150px, 24vw, 320px);
      background: #f8fbff;
      border: 4px solid #93c5fd;
      box-shadow: 0 28px 90px rgba(37, 99, 235, 0.22);
    }

    .stimulus.shape {
      font-size: 96px;
      color: #0f766e;
      background: #ecfdf5;
      border-color: #99f6e4;
    }

    body.is-focus-mode .stimulus.shape {
      font-size: clamp(140px, 22vw, 280px);
      background: #ecfdf5;
      border-color: #5eead4;
    }

    .game-side {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    body.is-focus-mode .game-side {
      position: fixed;
      left: 50%;
      bottom: 36px;
      width: min(620px, calc(100vw - 32px));
      transform: translateX(-50%);
      z-index: 30;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .mini-stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .mini-stat b {
      font-size: 22px;
      line-height: 1.2;
    }

    .response-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .response-btn {
      min-height: 84px;
      color: #fff;
      font-size: 22px;
    }

    body.is-focus-mode .response-btn {
      min-height: 92px;
      font-size: 30px;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
    }

    .countdown {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      height: 10px;
      border-radius: 999px;
      background: #dbeafe;
      overflow: hidden;
    }

    .countdown-fill {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--amber));
      transform-origin: left center;
      transition: width 0.08s linear;
    }

    body.is-focus-mode .countdown {
      left: 36px;
      right: 36px;
      bottom: 160px;
      height: 14px;
      background: rgba(219, 234, 254, 0.22);
    }

    .focus-prep {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(8, 17, 31, 0.88);
      color: #fff;
    }

    .focus-prep.is-visible {
      display: grid;
    }

    .focus-prep-card {
      width: min(560px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 28px;
      background: #111827;

      knowledgeQuiz: createDefaultKnowledgeQuiz(),
      savedAt: ""
    };

    let state = loadState();
    let currentGame = null;
    let practiceGame = null;
    let practiceAdvanceTimerId = null;
    let trialStartedAt = 0;
    let trialTimeoutId = null;
    let countdownIntervalId = null;

    const topbar = document.getElementById("topbar");
    const progress = document.getElementById("progress");
    const main = document.getElementById("main");
    const loginScreen = document.getElementById("loginScreen");
    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const identityPill = document.getElementById("identityPill");
    const homeBtn = document.getElementById("homeBtn");
    const exportBtn = document.getElementById("exportBtn");
    const resetBtn = document.getElementById("resetBtn");

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        const merged = mergeState(defaultState, saved || {});
        const context = JSON.parse(localStorage.getItem(CONTEXT_KEY) || "null");
        if (context && context.studentId && context.groupId) {
          merged.studentName = context.studentName || merged.studentName || "";
          merged.studentAge = context.studentAge || merged.studentAge || "";
          merged.studentId = context.studentId;
          merged.groupId = context.groupId;
          merged.started = true;
        }
        return merged;
      } catch (error) {
        return structuredClone(defaultState);
      }
    }

    function mergeState(base, incoming) {
      const merged = structuredClone(base);
      Object.assign(merged, incoming);
      merged.fields = Object.assign({}, base.fields, incoming.fields || {});
      normalizeMaterialType(merged.fields);
      if (!merged.fields.headbandObservation) {
        merged.fields.headbandObservation = [incoming.fields?.brainA, incoming.fields?.brainB].filter(Boolean).join("；");
      }
      merged.testRuns = Array.isArray(incoming.testRuns) ? incoming.testRuns : [];
      merged.surveys = mergeSurveys(incoming.surveys);
      merged.knowledgeQuiz = mergeKnowledgeQuiz(incoming.knowledgeQuiz);
      if (!incoming.surveys) merged.currentStep = 0;
      if (incoming.flowVersion !== FLOW_VERSION) {
        merged.currentStep = migrateLegacyStepIndex(merged.currentStep);
        merged.maxUnlockedStep = migrateLegacyStepIndex(merged.maxUnlockedStep);
      }
      merged.flowVersion = FLOW_VERSION;
      return merged;
    }
    function migrateLegacyStepIndex(value) {
      const index = Number(value);
      if (!Number.isInteger(index) || index <= 0) return 0;
      return Math.max(0, index - 1);
    }

    function normalizeCurrentStep() {
      normalizeStepAccess();
      if (!isDeveloperMode()) saveState();
    }

    function isDeveloperMode() {
      return sessionStorage.getItem(DEV_MODE_KEY) === "true";
    }

    function enableDeveloperMode() {
      const password = window.prompt("请输入开发者密码");
      if (password !== "memory") {
        alert("密码错误，无法开启开发者模式。");
        return;
      }
      sessionStorage.setItem(DEV_MODE_KEY, "true");
      alert("开发者模式已开启，可自由切换步骤。");
      renderApp();
    }

    function saveState() {
      syncThinkingFields();
      state.savedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function hasThoughtText(value) { return value !== null && value !== undefined && String(value).trim() !== ""; }
    function joinThoughts(items) { return items.filter(hasThoughtText).join("\n"); }
    function thoughtLine(label, value) { return hasThoughtText(value) ? `${label}：${value}` : ""; }
    function renderPairedField(label, personalHtml, groupHtml) {
      return `<div class="field paired-field"><label>${label}</label><div class="thinking-layer"><div class="thinking-box thinking-personal"><span class="thinking-label">个人思考（我）</span>${personalHtml}</div><div class="thinking-box thinking-group"><span class="thinking-label">小组共识（我们）</span>${groupHtml}</div></div></div>`;
    }
    function renderGroupTextarea(field, placeholder = "请写下你与小组成员讨论后达成的一致结果") {
      return `<textarea data-field="${field}" placeholder="${escapeHtml(placeholder)}">${escapeHtml(state.fields[field])}</textarea>`;
    }
    function renderGroupInput(field, placeholder = "") {
      return `<input type="text" data-field="${field}" value="${escapeHtml(state.fields[field])}" placeholder="${escapeHtml(placeholder)}" />`;
    }
    function renderGroupSelect(field, options, value = state.fields[field]) {
      return `<select data-field="${field}">${options.map((item)=>`<option value="${escapeHtml(item)}" ${value === item ? "selected" : ""}>${escapeHtml(item)}</option>`).join("")}</select>`;
    }
    function syncThinkingFields() {
      const fields = state.fields;
      const dependent = joinThoughts([fields.dependentMemory ? "工作记忆表现" : "", fields.dependentBrain ? "大脑活动水平" : ""]);
      fields.question_individual = joinThoughts([thoughtLine("自变量", fields.independentVariable), thoughtLine("因变量", dependent), thoughtLine("研究问题", fields.researchQuestion)]);
      fields.question_group = fields.researchQuestion_group || fields.question_group || "";
      fields.hypothesis_individual = fields.hypothesis || "";
      fields.hypothesis_group = fields.hypothesis_group || "";
      fields.conclusion_individual = joinThoughts([thoughtLine("假设是否被证实", fields.conclusionSupported), thoughtLine("结论", fields.conclusion)]);
      fields.reflection_individual = joinThoughts([thoughtLine("改进", fields.improvement), thoughtLine("提高说服力", fields.persuasiveness)]);
      fields.reflection_group = joinThoughts([thoughtLine("改进", fields.improvement_group), thoughtLine("提高说服力", fields.persuasiveness_group)]) || fields.reflection_group || "";
    }
    function getThinkingRows() {
      syncThinkingFields();
      const fields = state.fields;
      return [["提出问题/研究问题-个人思考", fields.researchQuestion], ["提出问题/研究问题-小组共识", fields.researchQuestion_group], ["作出假设/研究假设-个人思考", fields.hypothesis], ["作出假设/研究假设-小组共识", fields.hypothesis_group], ["得出结论/假设判断-个人思考", fields.conclusionSupported], ["得出结论/假设判断-小组共识", fields.conclusionSupported_group], ["得出结论/结论-个人思考", fields.conclusion], ["得出结论/结论-小组共识", fields.conclusion_group], ["反思交流/改进-个人思考", fields.improvement], ["反思交流/改进-小组共识", fields.improvement_group], ["反思交流/提高说服力-个人思考", fields.persuasiveness], ["反思交流/提高说服力-小组共识", fields.persuasiveness_group]];
    }

    function renderApp() {
      if (!state.started) {
        topbar.classList.remove("is-visible");
        main.classList.remove("is-visible");
        loginScreen.style.display = "grid";
        document.getElementById("studentName").value = state.studentName || "";
        document.getElementById("studentAge").value = state.studentAge || "";
        document.getElementById("studentId").value = state.studentId || "";
        document.getElementById("groupId").value = state.groupId || "";
        return;
      }

      loginScreen.style.display = "none";
      topbar.classList.add("is-visible");
      main.classList.add("is-visible");
      identityPill.textContent = `${state.studentName ? `姓名：${state.studentName}　` : ""}${state.studentAge ? `年龄：${state.studentAge}　` : ""}学生：${state.studentId}　小组：${state.groupId}`;
      normalizeCurrentStep();
      renderProgress();
      renderStep();
    }


    function clampStepIndex(value) {
      const index = Number(value);
      if (!Number.isInteger(index)) return 0;
      return Math.min(Math.max(index, 0), steps.length - 1);
    }

    function normalizeStepAccess() {
      const legacyCurrent = clampStepIndex(state.currentStep);
      if (!Number.isInteger(Number(state.maxUnlockedStep))) {
        state.maxUnlockedStep = legacyCurrent;
      } else {
        state.maxUnlockedStep = clampStepIndex(state.maxUnlockedStep);
      }
      state.currentStep = isDeveloperMode() ? legacyCurrent : Math.min(legacyCurrent, state.maxUnlockedStep);
    }

    function showStepMessage(message) {
      alert(message);
    }

    function goToStep(targetStep) {
      const target = clampStepIndex(targetStep);
      if (!isDeveloperMode() && target > state.maxUnlockedStep) {
        showStepMessage("请先完成前一步内容，再进入下一步。");
        return;
      }
      state.currentStep = target;
      if (!isDeveloperMode()) saveState();
      renderApp();
    }

    function goNextStep() {
      if (!validateStep(steps[state.currentStep].id)) {
        showStepMessage("请先完成本步骤内容。");
        return;
      }
      if (state.currentStep < steps.length - 1) {
        if (!isDeveloperMode()) state.maxUnlockedStep = Math.max(state.maxUnlockedStep || 0, state.currentStep + 1);
        state.currentStep += 1;
        if (!isDeveloperMode()) saveState();
        renderApp();
      }
    }

    function hasText(value) {
      return String(value ?? "").trim().length > 0;
    }

    function validateStep(stepId) {
      if (isDeveloperMode()) return true;
      if (!isSurveyStepComplete(stepId)) return false;
      const fields = state.fields || {};
      if (stepId === "question") return hasText(fields.researchQuestion) && hasText(fields.independentVariable) && (fields.dependentMemory || fields.dependentBrain);
      if (stepId === "hypothesis") return hasText(fields.hypothesis);
      if (stepId === "plan") return hasText(fields.stimulusMaterial) && hasText(fields.experimentDesign) && hasText(fields.stimulusInterval);
      if (stepId === "evidence") return Array.isArray(state.testRuns) && state.testRuns.length > 0;
      if (stepId === "analysis") return Array.isArray(state.testRuns) && state.testRuns.length > 0 && (hasText(fields.headbandObservation) || hasText(fields.teammate1Result) || hasText(fields.teammate2Result));
      if (stepId === "conclusion") return hasText(fields.conclusion) && fields.conclusionSupported !== defaultState.fields.conclusionSupported;
      if (stepId === "reflection") return hasText(fields.improvement) && hasText(fields.persuasiveness);
      return true;
    }

    function renderProgress() {
      normalizeStepAccess();
      progress.innerHTML = steps.map((step, index) => {
        const isActive = index === state.currentStep;
        const isDone = index < state.maxUnlockedStep;
        const isLocked = !isDeveloperMode() && index > state.maxUnlockedStep;
        const cls = isActive ? "is-active" : isDone ? "is-done" : isLocked ? "is-locked" : "";
        const lockedAttrs = isLocked ? ' aria-disabled="true" title="请先完成前一步内容，再进入下一步。"' : '';
        return `<button class="progress-step ${cls}" type="button" data-step="${index}"${lockedAttrs}><strong>${index + 1}</strong><span>${step.title}</span></button>`;
      }).join("");
      progress.querySelectorAll("[data-step]").forEach((button) => {
        button.addEventListener("click", () => {
          goToStep(Number(button.dataset.step));
        });
      });
    }

    function renderStep() {
      const step = steps[state.currentStep];
      main.innerHTML = `
        <section class="panel">
          <div class="panel-head">
            <h2>${step.id === "posttest" ? step.title : `${state.currentStep + 1}. ${step.title}`}</h2>
            <p>建议时长：${step.minutes}</p>
          </div>
          <div class="panel-body">
            ${getStepHtml(step.id)}
            ${renderNavigation()}
          </div>
        </section>
      `;
      bindInputs();
      bindStepEvents(step.id);
    }

    function renderNavigation() {
      const nextButton = state.currentStep === steps.length - 1 ? "" : '<button class="btn" type="button" id="nextStep">下一步</button>';
      return `
        <div class="actions">
          <button class="btn secondary" type="button" id="prevStep" ${state.currentStep === 0 ? "disabled" : ""}>上一步</button>
          ${nextButton}
        </div>
      `;
    }

    function getStepHtml(stepId) {
      const map = {
        question: renderQuestionStep,
        hypothesis: renderHypothesisStep,
        plan: renderPlanStep,
        evidence: renderEvidenceStep,
        analysis: renderAnalysisStep,
        conclusion: renderConclusionStep,
        reflection: renderReflectionStep
      ,
        posttest: renderPosttestStep};
      return map[stepId]();
    }
    function renderPosttestStep() { return renderSurveyPage("posttest"); }

    function renderSurveyPage(kind) {
      return '<div class="survey-shell">' +
        renderKnowledgeQuiz() +
        '<div class="survey-intro"><h3>📝 学习收获调查</h3><p>请根据刚刚完成的科学探究活动，选择最符合你真实情况的选项。</p></div>' +
        renderSurveyForm("postMeta", "meta") +
        renderSurveyForm("cognitiveLoad", "load") +
        renderSurveyForm("inquiryParticipation", "inquiry") +
        renderSurveySummaryCards() +
        renderPosttestExportArea() +
      '</div>';
    }

    function renderPosttestExportArea() {
      return '<div class="actions" style="justify-content:flex-end;"><button class="btn secondary" type="button" id="reviewReportBtn">生成记忆侦探报告</button><button class="btn success" type="button" id="finalExportBtn">导出完整实验记录</button></div>';
    }

    function renderSurveyForm(surveyKey, defKey) {
      const def = SURVEY_DEFS[defKey];
      const answers = state.surveys?.[surveyKey] || {};
      return '<section class="survey-card">' +
        '<div class="survey-card-head"><h4>' + def.title + '</h4><p class="survey-card-note">' + def.note + '</p></div>' +
        '<div class="survey-items">' +
          def.items.map((item, index) => {
            const itemKey = 'q' + (index + 1);
            return '<div class="survey-item"><p>' + (index + 1) + '. ' + escapeHtml(item) + '</p>' +
              '<div class="survey-scale" role="radiogroup" aria-label="' + escapeHtml(item) + '">' +
                def.scale.map((score) => {
                  const checked = Number(answers[itemKey]) === score;
                  const label = def.labels?.[score] || '';
                  return '<label class="survey-option ' + (checked ? 'is-selected' : '') + '">' +
                    '<input type="radio" name="' + surveyKey + '-' + itemKey + '" data-survey="' + surveyKey + '" data-question="' + itemKey + '" value="' + score + '" ' + (checked ? 'checked' : '') + '>' +
                    '<span class="survey-option-card"><span class="survey-score">' + score + '</span><span class="survey-label">' + escapeHtml(label) + '</span></span></label>';
                }).join('') +
              '</div></div>';
          }).join('') +
        '</div></section>';
    }

    function renderSurveySummaryCards() {
      const post = summarizeSurvey("postMeta", "meta");
      const load = summarizeSurvey("cognitiveLoad", "load");
      const inquiry = summarizeSurvey("inquiryParticipation", "inquiry");
      return '<div class="survey-summary">' +
        '<div><strong>' + post.answered + ' / ' + SURVEY_DEFS.meta.items.length + '</strong><span>学习收获调查完成进度</span></div>' +
        '<div><strong>' + load.answered + ' / ' + SURVEY_DEFS.load.items.length + '</strong><span>认知负荷完成进度</span></div>' +
        '<div><strong>' + inquiry.answered + ' / ' + SURVEY_DEFS.inquiry.items.length + '</strong><span>探究参与完成进度</span></div>' +
      '</div>';
    }
    function renderKnowledgeQuiz() {
      const quiz = mergeKnowledgeQuiz(state.knowledgeQuiz);
      const result = quiz.submitted
        ? '<div class="quiz-result"><div>✔ 答对：<strong>' + quiz.correctCount + ' / ' + KNOWLEDGE_QUIZ.items.length + '</strong></div><div>案件知识验证成绩：<strong>' + quiz.score + ' / 100</strong></div>' + renderKnowledgeQuizMessage(quiz.score) + '</div>'
        : '<div class="quiz-result"><div>案件知识验证成绩：<strong>待提交</strong></div></div>';
      return '<section class="quiz-section">' +
        '<div class="survey-intro"><h3>🕵️ 案件知识验证</h3><p>请根据本次案件调查中获得的证据，完成下面的知识验证。</p></div>' +
        KNOWLEDGE_QUIZ.items.map((item, index) => {
          const itemKey = 'q' + (index + 1);
          const selected = quiz.answers[itemKey] || '';
          return '<article class="quiz-card"><h4>第' + (index + 1) + '题</h4><p>' + escapeHtml(item.question) + '</p>' +
            '<div class="quiz-options">' + Object.keys(item.options).map((key) => {
              const checked = selected === key;
              return '<label class="quiz-option ' + (checked ? 'is-selected' : '') + '"><input type="radio" name="knowledge-' + itemKey + '" data-quiz-question="' + itemKey + '" value="' + key + '" ' + (checked ? 'checked' : '') + '><span>' + key + '　' + escapeHtml(item.options[key]) + '</span></label>';
            }).join('') + '</div></article>';
        }).join('') +
        result +
        '<div class="actions" style="justify-content:flex-end;"><button class="btn" type="button" id="submitKnowledgeQuizBtn">提交知识验证</button></div>' +
      '</section>';
    }

    function renderKnowledgeQuizMessage(score) {
      if (score === 100) return '<div class="quiz-message">🎉 恭喜你成功破解本案件！</div>';
      if (score < 60) return '<div class="quiz-message is-warning">💡 建议再次回顾本次探究过程，寻找更多证据。</div>';
      return '<div class="quiz-message">继续保持，用证据完善你的判断。</div>';
    }

    function bindKnowledgeQuizInputs() {
      main.querySelectorAll('[data-quiz-question]').forEach((input) => {
        input.addEventListener('change', () => {
          state.knowledgeQuiz = mergeKnowledgeQuiz(state.knowledgeQuiz);
          state.knowledgeQuiz.answers[input.dataset.quizQuestion] = input.value;
          state.knowledgeQuiz.submitted = false;
          state.knowledgeQuiz.correctCount = 0;
          state.knowledgeQuiz.score = 0;
          state.knowledgeQuiz.wrongQuestions = [];
          saveState();
          renderApp();
        });
      });
      const submit = document.getElementById('submitKnowledgeQuizBtn');
      if (submit) submit.addEventListener('click', submitKnowledgeQuiz);
    }

    function submitKnowledgeQuiz() {
      state.knowledgeQuiz = mergeKnowledgeQuiz(state.knowledgeQuiz);
      const unanswered = KNOWLEDGE_QUIZ.items.some((_, index) => !state.knowledgeQuiz.answers['q' + (index + 1)]);
      if (unanswered) {
        alert('请先完成全部案件知识验证题目。');
        return;
      }
      let correctCount = 0;
      const wrongQuestions = [];
      KNOWLEDGE_QUIZ.items.forEach((item, index) => {
        const itemKey = 'q' + (index + 1);
        if (state.knowledgeQuiz.answers[itemKey] === item.answer) correctCount += 1;
        else wrongQuestions.push(index + 1);
      });
      state.knowledgeQuiz.correctCount = correctCount;
      state.knowledgeQuiz.score = correctCount * 10;
      state.knowledgeQuiz.submitted = true;
      state.knowledgeQuiz.submittedAt = new Date().toISOString();
      state.knowledgeQuiz.wrongQuestions = wrongQuestions;
      saveState();
      renderApp();
    }

    function getKnowledgeQuizSheet() {
      const quiz = mergeKnowledgeQuiz(state.knowledgeQuiz);
      return ["案件知识验证", [
        ["题号", "题目", "学生答案", "正确答案", "是否正确"],
        ...KNOWLEDGE_QUIZ.items.map((item, index) => {
          const itemKey = 'q' + (index + 1);
          const answer = quiz.answers[itemKey] || "";
          return [String(index + 1), item.question, answer ? answer + " " + (item.options[answer] || "") : "", item.answer + " " + item.options[item.answer], answer ? (answer === item.answer ? "正确" : "错误") : "未作答"];
        }),
        ["汇总", "答对数量", quiz.correctCount + " / " + KNOWLEDGE_QUIZ.items.length, "", ""],
        ["汇总", "知识验证得分", quiz.score, "总成绩", quiz.score + " / 100"],
        ["汇总", "提交时间", quiz.submittedAt ? new Date(quiz.submittedAt).toLocaleString() : "", "", ""]
      ]];
    }

    function bindSurveyInputs() {
      main.querySelectorAll("[data-survey]").forEach((input) => {
        input.addEventListener("change", () => {
          const surveyKey = input.dataset.survey;
          const questionKey = input.dataset.question;
          state.surveys = mergeSurveys(state.surveys);
          state.surveys[surveyKey][questionKey] = Number(input.value);
          saveState();
          renderApp();
        });
      });
    }

    function summarizeSurvey(surveyKey, defKey) {
      const def = SURVEY_DEFS[defKey];
      const answers = state.surveys?.[surveyKey] || {};
      const values = def.items.map((_, index) => Number(answers['q' + (index + 1)] || 0)).filter(Boolean);
      const total = values.reduce((sum, value) => sum + value, 0);
      return { answered: values.length, total, average: values.length ? Number((total / values.length).toFixed(2)) : 0, complete: values.length === def.items.length };
    }

    function isSurveyStepComplete(stepId) {
      if (stepId === "posttest") return summarizeSurvey("postMeta", "meta").complete && summarizeSurvey("cognitiveLoad", "load").complete && summarizeSurvey("inquiryParticipation", "inquiry").complete;
      return true;
    }

    function getSurveySheets() {
      const makeSheet = (title, surveyKey, defKey) => {
        const def = SURVEY_DEFS[defKey];
        const answers = state.surveys?.[surveyKey] || {};
        const summary = summarizeSurvey(surveyKey, defKey);
        return [title, [
          ["题号", "题目", "得分"],
          ...def.items.map((item, index) => [String(index + 1), item, answers['q' + (index + 1)] || ""]),
          ["合计", "总分", summary.total],
          ["合计", "均分", summary.average]
        ]];
      };
      const post = summarizeSurvey("postMeta", "meta");
      const load = summarizeSurvey("cognitiveLoad", "load");
      const inquiry = summarizeSurvey("inquiryParticipation", "inquiry");
      return [
        makeSheet("学习收获调查", "postMeta", "meta"),
        makeSheet("侦探小结-认知负荷", "cognitiveLoad", "load"),
        makeSheet("侦探小结-探究参与", "inquiryParticipation", "inquiry"),
        ["问卷汇总", [
          ["问卷", "已答题数", "总分", "均分", "完成情况"],
          ["学习收获调查", post.answered, post.total, post.average, post.complete ? "已完成" : "未完成"],
          ["侦探小结认知负荷", load.answered, load.total, load.average, load.complete ? "已完成" : "未完成"],
          ["侦探小结科学探究参与", inquiry.answered, inquiry.total, inquiry.average, inquiry.complete ? "已完成" : "未完成"]
        ]],
        getKnowledgeQuizSheet()
      ];
    }


    function renderInquiryScaffold(type) {
      if (type === "hypothesis") {
        return '<div class="inquiry-helper">' +
          '<div class="helper-card"><h4>\u7814\u7a76\u5047\u8bbe\u601d\u8003\u70b9</h4><ul><li>\u5b83\u662f\u5426\u56de\u5e94\u4e86\u4f60\u4eec\u7684\u7814\u7a76\u95ee\u9898\uff1f</li><li>\u5b83\u662f\u5426\u8bf4\u660e\u4e86\u4f60\u4eec\u5bf9\u7ed3\u679c\u7684\u9884\u6d4b\uff1f</li><li>\u5b83\u662f\u5426\u53ef\u4ee5\u88ab\u540e\u9762\u7684\u6570\u636e\u652f\u6301\u6216\u53cd\u9a73\uff1f</li></ul></div>' +
        '</div>';
      }
      return '<div class="inquiry-helper">' +

    function renderQuestionStep() {
      return `
        <div class="single-step-layout">
          <div class="panel">
            <div class="panel-head">
              <h3>阅读材料</h3>
              <p>先回忆工作记忆，再理解 N-back、控制变量和头环测量。</p>
            </div>
            <div class="panel-body reading-list">
              <article class="reading-card">
                <h4>材料一：工作记忆</h4>
                <p>工作记忆是指对信息进行暂时存储和加工的容量有限的记忆系统。工作记忆对信息的加工主要体现在维持和更新这两个方面。</p>
                <p>例如，要完成口算任务2×4×5×6，你首先必须记住2×4等于8；接着还必须记住8×5等于40，这样才能顺利进行下一步的计算，这里需要在工作记忆中维持和更新每一步的计算结果，如8和40。假如工作记忆出了问题，就不可能计算成功。</p>
                <div class="memory-table-wrap">
                  <table class="memory-table" aria-label="工作记忆特点说明">
                    <thead>
                      <tr>
                        <th>工作记忆特点</th>
                        <th>在 N-back 任务中的体现</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td>维持</td>
                        <td>指个体在工作记忆中持续保存最近呈现的数字信息，以便将其与第 N 个数字进行对比。随着 N 的增加，个体需要在大脑中记忆的数字数量增加，维持信息的时间变长。</td>
                      </tr>
                      <tr>
                        <td>更新</td>
                        <td>指个体在每次新数字出现时，动态替换记忆中最旧的数字。随着关卡数的增加，个体需要更新信息的次数增加。</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </article>
              <article class="reading-card">
                <h4>材料二：N-back任务</h4>
                <p>N-back任务是一种常用的工作记忆任务。在N-back任务中，人们需要根据当前的刺激（比如字母、数字、算式或图形及图形的位置）来判断是否与该刺激的第前n个刺激相同。这种任务要求被试者不仅要记住当前刺激，还要持续关注前面的刺激序列，以便做出正确的反应。</p>
                <p>例如，假设n=2，屏幕上显示的数字是：7，5，6，5，8，3...当你看到数字6时，需回想：数字6的前2个数字是什么？是7，所以不一样，按否；下一个数字是5，你继续回想，数字5的前2个数字也是5，一致，按是。</p>
                <div class="nback-example">
                  <svg class="nback-example-svg" viewBox="0 0 720 320" role="img" aria-labelledby="nbackExampleTitle nbackExampleDesc">
                    <title id="nbackExampleTitle">N-back活动举例：2-back数字实验</title>
                    <desc id="nbackExampleDesc">数字序列7、5、6、5、8、3中，从第三个数字开始与前两个数字比较。</desc>
                    <rect x="1" y="1" width="718" height="318" rx="8" fill="#ffffff" stroke="#dbe3ef" />
                    <text x="360" y="36" text-anchor="middle" fill="#172033" font-size="22" font-weight="800">N-back活动举例：2-back数字实验</text>
                    <g fill="none" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M74 76 Q94 58 114 76 Q94 94 74 76Z" />
                      <circle cx="94" cy="76" r="5" fill="#1e3a8a" />
                      <path d="M174 76 Q194 58 214 76 Q194 94 174 76Z" />
                      <circle cx="194" cy="76" r="5" fill="#1e3a8a" />
                    </g>
                    <text x="94" y="112" text-anchor="middle" fill="#1e3a8a" font-size="16" font-weight="800">先看</text>
                    <text x="194" y="112" text-anchor="middle" fill="#1e3a8a" font-size="16" font-weight="800">先看</text>
                    <g fill="#fff" stroke="#bfdbfe" stroke-width="2">
                      <rect x="50" y="130" width="88" height="70" rx="8" />
                      <rect x="150" y="130" width="88" height="70" rx="8" />
                      <rect x="250" y="130" width="88" height="70" rx="8" />
                      <rect x="350" y="130" width="88" height="70" rx="8" />
                      <rect x="450" y="130" width="88" height="70" rx="8" />
                      <rect x="550" y="130" width="88" height="70" rx="8" />
                    </g>
                    <g fill="#172033" font-size="34" font-weight="900" text-anchor="middle">
                      <text x="94" y="176">7</text>
                      <text x="194" y="176">5</text>
                      <text x="294" y="176">6</text>
                      <text x="394" y="176">5</text>
                      <text x="494" y="176">8</text>
                      <text x="594" y="176">3</text>
                    </g>
                    <g fill="#0f766e" font-size="18" font-weight="900" text-anchor="middle">
                      <text x="294" y="112">否</text>
                      <text x="394" y="112">是</text>
                      <text x="494" y="112">否</text>
                      <text x="594" y="112">否</text>
                    </g>
                    <g fill="none" stroke="#1e3a8a" stroke-width="2.5" stroke-linecap="round">
                      <path d="M94 218 C94 246 294 246 294 218" />
                      <path d="M194 238 C194 266 394 266 394 238" />
                      <path d="M294 258 C294 286 494 286 494 258" />
                      <path d="M394 278 C394 306 594 306 594 278" />
                    </g>
                    <g fill="#475467" font-size="14" text-anchor="middle">
                      <text x="194" y="242">6 与前2个数字7比较</text>
                      <text x="294" y="270">5 与前2个数字5比较</text>
                      <text x="394" y="292">8 与前2个数字6比较</text>
                      <text x="494" y="312">3 与前2个数字5比较</text>
                    </g>
                  </svg>
                  <div class="practice-entry">
                    <button class="btn" id="openPracticeBtn" type="button">体验 N-back</button>
                  </div>
                </div>
              </article>
              <article class="reading-card">
                <h4>材料三：控制变量</h4>
                <p>控制变量是指在实验的过程中需要控制那些除了自变量以外的所有影响实验结果的变量，这些变量不是本实验所要研究的变量，所以又称无关变量。只有将自变量以外的所有无关变量控制好，才能弄清实验中的因果关系。</p>
              </article>
              <article class="reading-card">
                <h4>材料四：头环</h4>
                <p>头环是我们用来测量N-back活动中大脑前额叶活动水平的工具。头环就像一个特殊的“脑力探测器”，只要把头环戴在头上就可以可以收集信息，并且可以在电脑显示屏上生成一幅3D的脑激活图，展示大脑在执行特定任务或接受刺激时，不同脑区神经活动的空间分布状态。这张图可以直观呈现被激活脑区的位置、范围和强度，它会用颜色告诉你，在实验过程中大脑中哪些地方被激活，用红-黄色表示激活强度高，蓝-冷色表示抑制或无变化。也就是说，图中的某个脑区越红说明越活跃，在努力“思考”。假设3-back比2-back需要消耗更多的大脑资源，导致前额叶的激活水平更高，那么头环收集信息生成的结果图中，3-back的结果图中某个区域的颜色应该比2-back的结果图中相应区域的颜色更红，说明在玩更难的3-back游戏时，大脑需要花比玩2-back多得多的“力气”。</p>
                <div class="headband-image-container">
                  <img src="assets/headband-guide.png" alt="头环工作原理示意图" class="headband-guide-image">
                </div>
              </article>
            </div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <h3>科学探究案例</h3>
              <p>先参考案例和思考点，再形成自己的研究问题。</p>
            </div>
            <div class="panel-body">
              ${renderInquiryCases()}
              ${renderInquiryScaffold("question")}
            </div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <h3>提出研究问题</h3>
              <p>请围绕自变量、因变量和控制变量形成研究问题。</p>
            </div>
            <div class="panel-body">
              <div class="field"><label>自变量</label><div class="choice-group"><label class="choice"><input type="radio" name="independentVariable" data-field="independentVariable" value="N的大小" ${checked("independentVariable", "N的大小")}>N-back 活动中 N 的大小</label><label class="choice"><input type="radio" name="independentVariable" data-field="independentVariable" value="关卡数量" ${checked("independentVariable", "关卡数量")}>N-back 活动中关卡的数量</label></div></div>
              <div class="field"><label>因变量</label><div class="choice-group"><label class="choice"><input type="checkbox" data-field="dependentMemory" ${state.fields.dependentMemory ? "checked" : ""}>工作记忆表现（N-back 正确率）</label><label class="choice"><input type="checkbox" data-field="dependentBrain" ${state.fields.dependentBrain ? "checked" : ""}>大脑活动水平（前额叶激活水平）</label></div></div>
              <div class="field"><label>控制变量</label><div class="choice-group"><label class="choice"><input type="checkbox" data-field="controlContentType" ${state.fields.controlContentType ? "checked" : ""}>N-back 任务中记忆内容的类型</label></div><input type="text" data-field="controlOther" value="${escapeHtml(state.fields.controlOther)}" placeholder="其他控制变量" /></div>
              ${renderPairedField("研究问题", `<textarea data-field="researchQuestion" placeholder="写下你自己真正想探究的问题">${escapeHtml(state.fields.researchQuestion)}</textarea>`, renderGroupTextarea("researchQuestion_group"))}
            </div>
          </div>
        </div>
        <div class="practice-modal" id="practiceModal" role="dialog" aria-modal="true" aria-labelledby="practiceTitle">
          <div class="practice-card">
            <div class="practice-head">
              <h3 id="practiceTitle">体验 N-back</h3>
              <p>这是一个练习任务，用来帮助你理解 N-back 的判断方式。体验结果不会进入正式实验数据。</p>
            </div>
            <div class="practice-body">
              <div class="practice-settings" aria-label="任务设置">
                <div><span>N 值</span><b>2-back</b></div>
                <div><span>刺激类型</span><b>数字</b></div>
                <div><span>数字范围</span><b>1-9</b></div>
                <div><span>总试次数</span><b>10 次</b></div>
              </div>
              <div class="practice-feedback">
                <span>当前进度</span>
                <b id="practiceProgress">尚未开始</b>
              </div>
              <div class="practice-stage">
                <div class="practice-number" id="practiceNumber">?</div>
              </div>
              <div class="practice-feedback">
                <span>当前反馈</span>
                <b id="practiceFeedback">点击“开始体验”后开始。</b>
              </div>
              <div class="practice-response-grid">
                <button class="response-btn yes-btn" id="practiceYesBtn" type="button" disabled>是</button>
                <button class="response-btn no-btn" id="practiceNoBtn" type="button" disabled>否</button>
              </div>
              <div class="practice-actions">
                <button class="btn" id="practiceStartBtn" type="button">开始体验</button>
                <button class="btn secondary" id="practiceRestartBtn" type="button">重新体验</button>
                <button class="btn secondary" id="practiceCloseBtn" type="button">关闭</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderHypothesisStep() {

                    <g fill="none" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">

      return `平均正确率 ${avgAccuracy}%，平均漏答率 ${avgMissRate}%`;
