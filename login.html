<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学生登录 - 记忆侦探平台</title>
  <style>
    :root {
      --bg: #eef4ff;
      --panel: rgba(255, 255, 255, 0.86);
      --ink: #142033;
      --muted: #667085;
      --line: rgba(111, 133, 170, 0.22);
      --primary: #4f7cff;
      --primary-dark: #315fe4;
      --danger: #d92d20;
      --shadow: 0 24px 70px rgba(52, 79, 135, 0.16);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 10%, rgba(127, 209, 174, 0.35), transparent 32%),
        radial-gradient(circle at 88% 8%, rgba(79, 124, 255, 0.26), transparent 34%),
        linear-gradient(135deg, #f8fbff 0%, var(--bg) 45%, #f5fbff 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    button,
    input {
      font: inherit;
    }

    .login-card {
      width: min(420px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .login-card h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .login-card p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: #344054;
      font-size: 14px;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border: 1px solid rgba(111, 133, 170, 0.28);
      border-radius: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .field input:focus {
      border-color: rgba(79, 124, 255, 0.72);
      box-shadow: 0 0 0 4px rgba(79, 124, 255, 0.12);
    }

    .submit-btn {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), #6aa1ff);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 14px 24px rgba(79, 124, 255, 0.22);
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 18px 30px rgba(79, 124, 255, 0.28);
      filter: saturate(1.04);
    }

    .submit-btn:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    .message {
      min-height: 22px;
      margin: 14px 0 0;
      color: var(--danger);
      text-align: center;
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="login-card" aria-labelledby="loginTitle">
    <h1 id="loginTitle">学生登录</h1>
    <p>请输入学生账号和密码。</p>

    <form id="loginForm">
      <div class="field">
        <label for="account">账号</label>
        <input id="account" name="account" type="text" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <button class="submit-btn" id="submitBtn" type="submit">登录</button>
      <p class="message" id="message" role="alert"></p>
    </form>
  </main>

  <script>
    /*
     * 登录页脚本只负责登录相关交互：
     * 1. 页面打开时先检查是否已经登录；
     * 2. 已登录则直接进入首页；
     * 3. 未登录则等待学生输入账号密码并调用 studentLogin HTTP 云函数。
     */
    const STUDENT_LOGIN_URL = "https://memory-detective-platfor-d369a42-1441391469.ap-shanghai.app.tcloudbase.com/studentLogin";
    const loginForm = document.getElementById("loginForm");
    const accountInput = document.getElementById("account");
    const passwordInput = document.getElementById("password");
    const submitBtn = document.getElementById("submitBtn");
    const message = document.getElementById("message");
    const redirectTarget = new URLSearchParams(window.location.search).get("redirect") || "index.html";

    function getErrorMessage(error) {
      return error?.message || error?.errMsg || error?.msg || "未知错误";
    }

    function getErrorCode(error) {
      return error?.code || error?.errCode || error?.errorCode || error?.category || "";
    }

    /*
     * 如果浏览器里已经有学生会话，说明学生无需重复登录，
     * 直接进入 index.html，减少重复操作。
     */
    try {
      if (localStorage.getItem("studentSession")) {
        window.location.replace(redirectTarget);
      }
    } catch (event) {
      localStorage.removeItem("studentSession");
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const account = accountInput.value.trim();
      const password = passwordInput.value;

      if (!account || !password) {
        message.textContent = "请输入账号和密码。";
        return;
      }

      /*
       * 登录过程中禁用按钮，避免学生连续点击导致重复请求。
       * 不论成功或失败，都会在 finally 中恢复按钮状态。
       */
      submitBtn.disabled = true;
      submitBtn.textContent = "登录中...";
      message.textContent = "";

      try {
        const response = await fetch(STUDENT_LOGIN_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            studentId: account,
            password
          })
        });

        if (!response.ok) {
          throw new Error(`登录请求失败：HTTP ${response.status}`);
        }

        const cloudFunctionResult = await response.json();

        if (!cloudFunctionResult.ok) {
          message.textContent = cloudFunctionResult.message || "登录失败";
          return;
        }

        localStorage.setItem("studentSession", JSON.stringify(cloudFunctionResult.student));
        window.location.href = redirectTarget;
      } catch (error) {
        console.error("studentLogin failed:", error);
        message.textContent = getErrorMessage(error) || "登录失败";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "登录";
      }
    });
  </script>
</body>
</html>
