<html lang="zh-CN">
<head>
  <meta charset="utf-8" />

  <title>实验三：探究干扰长时记忆的因素</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #fff;
      --ink: #172033;
      --muted: #667085;
      --line: #dbe3ef;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #eaf1ff;
      --teal: #0f766e;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
      --shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); line-height: 1.6; }
    button, input, textarea, select { font: inherit; }
    button { border: 0; border-radius: 8px; cursor: pointer; font-weight: 800; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }

    .topbar {
      position: sticky; top: 0; z-index: 20;
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(23,32,51,.06);
      backdrop-filter: blur(10px);
    }
    .topbar-inner { max-width: 1240px; margin: 0 auto; padding: 14px 24px 12px; }
    .brand-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 10px; }
    .brand-title h1 { margin: 0; font-size: 20px; line-height: 1.2; }
    .identity-pill { color: var(--muted); font-size: 13px; }
    .top-actions { display: flex; gap: 10px; align-items: center; }
    .progress { display: grid; grid-template-columns: repeat(7, minmax(88px, 1fr)); gap: 8px; overflow-x: auto; padding-bottom: 2px; }
    .progress-step { min-height: 44px; padding: 8px 10px; border: 1px solid var(--line); background: #f9fbff; color: var(--muted); border-radius: 8px; text-align: left; display: flex; align-items: center; gap: 8px; }
    .progress-step strong { display: inline-grid; place-items: center; width: 22px; height: 22px; border-radius: 50%; background: #edf2f7; color: #475467; font-size: 12px; }
    .progress-step span { font-size: 13px; white-space: nowrap; }
    .progress-step.is-active { background: var(--primary-soft); border-color: #9ec5ff; color: var(--primary-dark); }
    .progress-step.is-active strong { background: var(--primary); color: #fff; }
    .progress-step.is-done { background: #eefaf6; border-color: #bde7d5; color: var(--teal); }
    .progress-step.is-done strong { background: var(--teal); color: #fff; }

    .main { max-width: 1240px; margin: 0 auto; padding: 28px 24px 44px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    .panel-head { padding: 20px 22px 12px; border-bottom: 1px solid #eef2f7; }
    .panel-head h2, .panel-head h3 { margin: 0; font-size: 22px; line-height: 1.25; }
    .panel-head p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .panel-body { padding: 20px 22px 22px; }
    .step-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
    .single-step-layout, .reflection-layout { display: grid; gap: 22px; width: 100%; max-width: 1100px; margin: 0 auto; }
    .reflection-layout { max-width: 1000px; }
    .analysis-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
    .analysis-layout .panel, .single-step-layout .panel, .reflection-layout .panel { border-radius: 10px; }
    .panel-head h2, .panel-head h3 { font-size: 20px; }
    .single-step-layout .panel-body, .reflection-layout .panel-body { padding: 24px; }
    input:not([type="checkbox"]):not([type="radio"]), textarea, select { min-height: 42px; }
    .analysis-layout .empty-state { min-height: 120px; display: grid; place-items: center; padding: 18px; }
    .team-result-card table input { min-height: 38px; padding: 8px 10px; }
    .team-result-card th, .team-result-card td { padding: 8px 9px; }
    .reflection-layout textarea { min-height: 140px; }
    .reading-list { display: grid; gap: 14px; }
    .reading-card { border: 1px solid #e5edf7; border-radius: 8px; padding: 16px; background: #fbfdff; }
    .reading-card h4 { margin: 0 0 8px; color: #1e3a8a; font-size: 16px; }
    .reading-card p { margin: 0 0 10px; color: #344054; font-size: 14px; }
    .reading-card p:last-child { margin-bottom: 0; }
    .question-intro-strip { grid-column: 1 / -1; border: 1px solid #bfdbfe; border-radius: 8px; padding: 18px 20px; background: linear-gradient(135deg, #eff6ff, #f8fbff); box-shadow: 0 12px 28px rgba(37,99,235,.08); }
    .question-intro-strip p { margin: 0 0 12px; color: #24364f; font-size: 15px; line-height: 1.8; }
    .question-intro-strip .field { margin: 14px 0 0; }
    .question-intro-strip textarea { background: #fff; min-height: 88px; }
    .reading-card .material-lead { margin-bottom: 12px; color: var(--muted); }
    .variable-table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .variable-table { min-width: 680px; margin: 0; }
    .variable-table th:first-child, .variable-table td:first-child { width: 230px; color: #1e3a8a; font-weight: 800; }
    .variable-table textarea { min-height: 74px; }
    .material-details { border: 1px solid #e5edf7; border-radius: 8px; background: #fbfdff; overflow: hidden; }
    .material-details summary { padding: 14px 16px; color: #1e3a8a; font-weight: 900; cursor: pointer; }
    .material-details summary::marker { color: var(--primary); }
    .material-details-body { display: grid; gap: 10px; padding: 0 16px 16px; color: #344054; font-size: 14px; }
    .material-details-body p { margin: 0; line-height: 1.8; }
    .material-details-body .field { margin: 2px 0 0; }
    .field { margin-bottom: 18px; }
    label { display: block; margin-bottom: 7px; color: #344054; font-size: 14px; font-weight: 700; }
    input, textarea, select { width: 100%; border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 8px; padding: 11px 12px; outline: none; }
    textarea { min-height: 112px; resize: vertical; }
    input:focus, textarea:focus, select:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .actions { display: flex; justify-content: space-between; gap: 12px; margin-top: 22px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-height: 42px; padding: 10px 16px; background: var(--primary); color: #fff; }
    .btn:hover { background: var(--primary-dark); }
    .btn.secondary { background: #fff; color: #344054; border: 1px solid var(--line); }
    .btn.secondary:hover { background: #f8fafc; }
    .btn.success { background: var(--green); }
    .btn.danger { background: #fff; color: var(--red); border: 1px solid #fecaca; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: end; margin-bottom: 16px; }
    .toolbar .field { min-width: 150px; flex: 1; margin-bottom: 0; }

    .experiment-game { display: grid; grid-template-columns: 1fr 360px; gap: 18px; align-items: stretch; }
    .stage { position: relative; display: grid; place-items: center; min-height: 440px; border: 1px solid #dbeafe; border-radius: 8px; background: linear-gradient(180deg,#fff 0%,#f8fbff 100%); overflow: hidden; }
    .stage-meta { position: absolute; top: 14px; left: 16px; right: 16px; display: flex; justify-content: space-between; color: var(--muted); font-size: 13px; font-weight: 700; }
    .timer { position: absolute; left: 16px; right: 16px; bottom: 16px; height: 10px; border-radius: 999px; background: #dbeafe; overflow: hidden; }
    .timer-fill { width: 100%; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--green), var(--amber)); transition: width .08s linear; }
    .task-card { width: min(720px, 90%); padding: 24px; border: 1px solid #bfdbfe; border-radius: 8px; background: #eff6ff; color: #1e3a8a; text-align: center; }
    .task-card h3 { margin: 0 0 12px; font-size: 30px; }
    .memory-items { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 14px; }
    .memory-item { padding: 8px 12px; border-radius: 8px; background: #fff; border: 1px solid #bfdbfe; font-size: 22px; font-weight: 900; }
    .answer-box { display: none; width: min(720px, 90%); }
    .answer-box.is-visible { display: block; }
    .answer-box textarea { min-height: 180px; font-size: 18px; }
    .material-source { display: inline-flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; color: var(--muted); font-size: 13px; }
    .material-chip { display: inline-flex; align-items: center; padding: 5px 9px; border-radius: 999px; background: #eef6ff; color: #1d4ed8; font-weight: 800; }
    .material-block { display: grid; gap: 12px; text-align: left; }
    .material-line { padding: 12px; border-radius: 8px; background: #fff; border: 1px solid #bfdbfe; color: #1e3a8a; font-size: 20px; font-weight: 800; line-height: 1.55; }
    .interference-video { display: block; width: min(760px, 100%); max-height: 54vh; margin: 16px auto 0; border-radius: 8px; background: #000; box-shadow: 0 18px 42px rgba(0,0,0,.18); }
    .video-status { margin-top: 14px; padding: 12px 14px; border-radius: 8px; background: #fff; border: 1px solid #bfdbfe; color: #1e3a8a; font-size: 14px; font-weight: 800; }
    .video-status.warning { border-color: #fed7aa; background: #fff7ed; color: #9a3412; }
    .video-status.error { border-color: #fecaca; background: #fef2f2; color: #b91c1c; }
    .video-actions { margin-top: 14px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .score-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .score-row input { font-size: 18px; font-weight: 900; text-align: center; }
    .score-rule { margin-top: 12px; padding: 12px; border-radius: 8px; background: #f8fbff; color: #344054; font-size: 14px; }
    .game-side { display: flex; flex-direction: column; gap: 12px; }
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .mini-stat { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #fff; }
    .mini-stat span { display: block; color: var(--muted); font-size: 12px; }
    .mini-stat b { font-size: 22px; line-height: 1.2; }
    .game-log { max-height: 300px; overflow: auto; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #edf2f7; padding: 9px 10px; text-align: left; vertical-align: middle; }
    th { position: sticky; top: 0; background: #f8fafc; color: #475467; font-weight: 800; }
    .tag { display: inline-flex; min-width: 38px; justify-content: center; padding: 2px 8px; border-radius: 999px; background: #eef2ff; color: #3730a3; font-size: 12px; font-weight: 800; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
    .chart { display: grid; gap: 12px; margin-top: 14px; }
    .bar-row { display: grid; grid-template-columns: 180px 1fr 70px; gap: 12px; align-items: center; }
    .bar-track { height: 22px; border-radius: 8px; background: #eef2f7; overflow: hidden; }
    .bar-fill { height: 100%; min-width: 2px; background: linear-gradient(90deg, var(--primary), var(--teal)); }
    .empty-state { border: 1px dashed #cbd5e1; border-radius: 8px; padding: 22px; background: #f8fafc; color: var(--muted); text-align: center; }

    body.is-focus-mode { background: #08111f; }
    body.is-focus-mode .topbar { display: none; }
    body.is-focus-mode .main { max-width: none; min-height: 100vh; padding: 0; }
    body.is-focus-mode .main > .panel { min-height: 100vh; border: 0; border-radius: 0; box-shadow: none; background: #08111f; }
    body.is-focus-mode .main > .panel > .panel-head,
    body.is-focus-mode .main > .panel > .panel-body > .actions,
    body.is-focus-mode .interference-toolbar,
    body.is-focus-mode .game-log,
    body.is-focus-mode .game-side .stat-grid { display: none; }
    body.is-focus-mode .main > .panel > .panel-body { min-height: 100vh; padding: 0; }
    body.is-focus-mode .experiment-game { min-height: 100vh; grid-template-columns: 1fr; gap: 0; background: #08111f; }
    body.is-focus-mode .stage { min-height: 100vh; border: 0; border-radius: 0; background: radial-gradient(circle at center, #12213a 0%, #08111f 66%); }
    body.is-focus-mode .stage-meta { top: 30px; left: 36px; right: 36px; color: #dbeafe; font-size: 20px; }
    body.is-focus-mode .task-card { width: min(900px, calc(100vw - 48px)); padding: 34px; border: 1px solid rgba(255,255,255,.16); background: rgba(248,251,255,.96); box-shadow: 0 28px 90px rgba(37,99,235,.22); }
    body.is-focus-mode .task-card h3 { font-size: 42px; }
    body.is-focus-mode .memory-item { font-size: 28px; padding: 10px 16px; }
    body.is-focus-mode .answer-box { width: min(820px, calc(100vw - 48px)); padding: 28px; border: 1px solid rgba(255,255,255,.16); border-radius: 8px; background: rgba(15,23,42,.88); box-shadow: 0 28px 90px rgba(0,0,0,.34); }
    body.is-focus-mode .answer-box label { color: #dbeafe; font-size: 20px; text-align: center; }
    body.is-focus-mode .answer-box textarea { min-height: 220px; font-size: 22px; background: #f8fbff; }
    body.is-focus-mode .answer-box .btn { min-height: 58px; font-size: 20px; }
    body.is-focus-mode .timer { left: 36px; right: 36px; bottom: 36px; height: 14px; background: rgba(219,234,254,.22); }
    body.is-focus-mode .game-side { position: fixed; left: 50%; bottom: 36px; width: min(620px, calc(100vw - 32px)); transform: translateX(-50%); z-index: 30; pointer-events: none; }
    body.is-focus-mode .answer-box, body.is-focus-mode .answer-box * { pointer-events: auto; }
    body.is-focus-mode .answer-box ~ .timer { bottom: 24px; }
    .focus-prep { position: fixed; inset: 0; z-index: 60; display: none; place-items: center; padding: 24px; background: rgba(8,17,31,.88); color: #fff; }
    .focus-prep.is-visible { display: grid; }
    .focus-prep-card { width: min(560px, 100%); border: 1px solid rgba(255,255,255,.16); border-radius: 8px; padding: 28px; background: #111827; box-shadow: 0 24px 80px rgba(0,0,0,.36); }
    .focus-prep-card h3 { margin: 0 0 10px; font-size: 26px; }
    .focus-prep-card p { margin: 0 0 12px; color: #cbd5e1; }

    @media (max-width: 980px) {
      .step-layout, .analysis-layout, .experiment-game { grid-template-columns: 1fr; }
      .progress { grid-template-columns: repeat(7, 132px); }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .topbar-inner, .main { padding-left: 14px; padding-right: 14px; }
      .brand-row, .actions { align-items: stretch; flex-direction: column; }
      .top-actions, .form-grid, .summary-grid { grid-template-columns: 1fr; flex-direction: column; }
      .bar-row { grid-template-columns: 1fr; gap: 6px; }
    }

    .survey-shell { display: grid; gap: 18px; }
    .survey-intro { padding: 18px; border: 1px solid var(--line); border-radius: 8px; background: linear-gradient(135deg, #ffffff, #eef6ff); }
    .survey-intro h3 { margin: 0 0 8px; font-size: 20px; }
    .survey-intro p { margin: 0; color: var(--muted); line-height: 1.8; }
    .survey-card { border: 1px solid var(--line); border-radius: 8px; background: #fff; overflow: hidden; }
    .survey-card-head { padding: 14px 16px; background: #f8fbff; border-bottom: 1px solid var(--line); }
    .survey-card-head h4 { margin: 0; font-size: 17px; }
    .survey-card-note { margin: 6px 0 0; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .survey-items { display: grid; gap: 0; }
    .survey-item { padding: 16px; border-bottom: 1px solid var(--line); }
    .survey-item:last-child { border-bottom: 0; }
    .survey-item p { margin: 0 0 12px; font-weight: 700; line-height: 1.6; }
    .survey-scale { display: grid; grid-template-columns: repeat(auto-fit, minmax(86px, 1fr)); gap: 10px; max-width: 860px; }
    .survey-option { min-width: 0; }
    .survey-option input { position: absolute; opacity: 0; pointer-events: none; }
    .survey-option-card { display: grid; place-items: center; min-height: 66px; padding: 10px 8px; border-radius: 12px; border: 1px solid var(--line); background: #fff; color: var(--muted); cursor: pointer; transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease, color .16s ease; }
    .survey-score { display: block; font-size: 20px; line-height: 1; font-weight: 900; color: var(--text); }
    .survey-label { display: block; margin-top: 7px; font-size: 13px; line-height: 1.2; font-weight: 700; text-align: center; color: var(--muted); }
    .survey-option:hover .survey-option-card { transform: translateY(-2px); border-color: rgba(37, 99, 235, 0.38); box-shadow: 0 10px 22px rgba(37, 99, 235, 0.12); }
    .survey-option.is-selected .survey-option-card, .survey-option input:checked + .survey-option-card { background: linear-gradient(135deg, rgba(37, 99, 235, 0.98), rgba(79, 124, 255, 0.9)); border-color: var(--primary); color: #fff; box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24); }
    .survey-option.is-selected .survey-score, .survey-option.is-selected .survey-label, .survey-option input:checked + .survey-option-card .survey-score, .survey-option input:checked + .survey-option-card .survey-label { color: #fff; }
    .survey-summary { display: grid; grid-template-columns: repeat(5, minmax(120px, 1fr)); gap: 10px; }
    .survey-summary div { padding: 14px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .survey-summary strong { display: block; font-size: 22px; color: var(--primary); }
    .survey-summary span { color: var(--muted); font-size: 13px; }
    @media (max-width: 760px) { .survey-scale { grid-template-columns: repeat(auto-fit, minmax(72px, 1fr)); } .survey-option-card { min-height: 60px; padding: 9px 6px; } .survey-score { font-size: 18px; } .survey-label { font-size: 12px; } .survey-summary { grid-template-columns: 1fr 1fr; } }



    .inquiry-helper { display: grid; gap: 14px; margin-top: 16px; }
    .helper-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .helper-card, .template-card, .case-card { border: 1px solid #e5edf7; border-radius: 14px; background: linear-gradient(135deg, #ffffff, #f8fbff); box-shadow: 0 10px 24px rgba(23, 32, 51, 0.05); }
    .helper-card { padding: 14px; }
    .helper-card h4, .template-card h4 { margin: 0 0 10px; color: #1e3a8a; font-size: 15px; }
    .helper-card ul { margin: 0; padding-left: 18px; color: #344054; font-size: 14px; }
    .template-card { padding: 14px; background: linear-gradient(135deg, #f8fbff, #eef6ff); }
    .case-list { display: grid; gap: 10px; margin-top: 16px; }
    .case-card { overflow: hidden; }
    .case-card summary { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 13px 14px; color: #172033; cursor: pointer; font-weight: 900; }
    .case-card summary::after { content: "+"; display: inline-grid; place-items: center; width: 24px; height: 24px; border-radius: 999px; background: #eef4ff; color: #2563eb; }
    .case-card[open] summary::after { content: "-"; }
    .case-body { padding: 0 14px 14px; color: #344054; font-size: 14px; }
    .case-body p { margin: 8px 0; }
    .case-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .case-tag { padding: 5px 9px; border-radius: 999px; background: #eefbf6; color: #0f766e; font-size: 12px; font-weight: 900; }
    @media (max-width: 760px) { .helper-grid { grid-template-columns: 1fr; } .case-card summary { align-items: flex-start; } }

  </style>

  <header class="topbar">

  <script>
    const CONTEXT_KEY = "science-inquiry-context-v1";
    const STORAGE_KEY = "longterm-interference-state-v1";
    const EXTERNAL_EMOTION_VIDEOS = {
      "中性": "https://brain-ai-video-1441391469.cos.ap-shanghai.myqcloud.com/neutral.mp4",
      "悲伤": "https://brain-ai-video-1441391469.cos.ap-shanghai.myqcloud.com/sad.mp4",
      "愉悦": "https://brain-ai-video-1441391469.cos.ap-shanghai.myqcloud.com/pleasant.mp4"
    };
    const steps = [
      
      { id: "pretest", title: "前测", minutes: "10分钟" },{ id: "question", title: "提出问题", minutes: "15分钟" },
      { id: "hypothesis", title: "作出假设", minutes: "5分钟" },
      { id: "plan", title: "制定计划", minutes: "20分钟" },
      { id: "evidence", title: "搜集证据", minutes: "45分钟" },
      { id: "analysis", title: "处理信息", minutes: "15分钟" },
      { id: "conclusion", title: "得出结论", minutes: "5分钟" },
      { id: "reflection", title: "反思评价", minutes: "15分钟" },
      { id: "posttest", title: "后测", minutes: "15分钟" }

      const inquiry = summarizeSurvey("inquiryParticipation", "inquiry");
      const delta = post.answered && pre.answered ? Number((post.total - pre.total).toFixed(1)) : "待完成";
      return '<div class="survey-summary">' +
        '<div><strong>' + (pre.total || '待完成') + '</strong><span>前测元认知总分</span></div>' +
        '<div><strong>' + (post.total || '待完成') + '</strong><span>后测元认知总分</span></div>' +
        '<div><strong>' + delta + '</strong><span>元认知变化</span></div>' +
        '<div><strong>' + (load.average || '待完成') + '</strong><span>认知负荷均分</span></div>' +
        '<div><strong>' + (inquiry.average || '待完成') + '</strong><span>探究参与均分</span></div>' +
      '</div>';
    }

    function bindSurveyInputs() {
      main.querySelectorAll("[data-survey]").forEach((input) => {
        input.addEventListener("change", () => {
          const surveyKey = input.dataset.survey;
          const questionKey = input.dataset.question;
          state.surveys = mergeSurveys(state.surveys);
          state.surveys[surveyKey][questionKey] = Number(input.value);
          saveState();
          renderApp();
        });
      });
    }

    function summarizeSurvey(surveyKey, defKey) {
      const def = SURVEY_DEFS[defKey];
      const answers = state.surveys?.[surveyKey] || {};
      const values = def.items.map((_, index) => Number(answers['q' + (index + 1)] || 0)).filter(Boolean);
      const total = values.reduce((sum, value) => sum + value, 0);
      return { answered: values.length, total, average: values.length ? Number((total / values.length).toFixed(2)) : 0, complete: values.length === def.items.length };
    }

    function isSurveyStepComplete(stepId) {
      if (stepId === "pretest") return summarizeSurvey("preMeta", "meta").complete;
      if (stepId === "posttest") return summarizeSurvey("postMeta", "meta").complete && summarizeSurvey("cognitiveLoad", "load").complete && summarizeSurvey("inquiryParticipation", "inquiry").complete;
      return true;
    }

    function getSurveySheets() {
      const makeSheet = (title, surveyKey, defKey) => {
        const def = SURVEY_DEFS[defKey];
        const answers = state.surveys?.[surveyKey] || {};
        const summary = summarizeSurvey(surveyKey, defKey);
        return [title, [
          ["题号", "题目", "得分"],
          ...def.items.map((item, index) => [String(index + 1), item, answers['q' + (index + 1)] || ""]),
          ["合计", "总分", summary.total],
          ["合计", "均分", summary.average]
        ]];
      };
      const pre = summarizeSurvey("preMeta", "meta");
      const post = summarizeSurvey("postMeta", "meta");
      const load = summarizeSurvey("cognitiveLoad", "load");
      const inquiry = summarizeSurvey("inquiryParticipation", "inquiry");
      return [
        makeSheet("前测-元认知", "preMeta", "meta"),
        makeSheet("后测-元认知", "postMeta", "meta"),
        makeSheet("后测-认知负荷", "cognitiveLoad", "load"),
        makeSheet("后测-探究参与", "inquiryParticipation", "inquiry"),
        ["问卷汇总", [
          ["问卷", "已答题数", "总分", "均分", "完成情况"],
          ["前测元认知", pre.answered, pre.total, pre.average, pre.complete ? "已完成" : "未完成"],
          ["后测元认知", post.answered, post.total, post.average, post.complete ? "已完成" : "未完成"],
          ["元认知前后测变化", "", Number((post.total - pre.total).toFixed(1)), "", pre.complete && post.complete ? "可比较" : "待补全"],
          ["后测认知负荷", load.answered, load.total, load.average, load.complete ? "已完成" : "未完成"],
          ["后测科学探究参与", inquiry.answered, inquiry.total, inquiry.average, inquiry.complete ? "已完成" : "未完成"]
        ]]
      ];
    }


    function renderInquiryScaffold(type) {
      if (type === "hypothesis") {
        return '<div class="inquiry-helper">' +
          '<div class="helper-card"><h4>\u7814\u7a76\u5047\u8bbe\u601d\u8003\u70b9</h4><ul><li>\u5b83\u662f\u5426\u56de\u5e94\u4e86\u4f60\u4eec\u7684\u7814\u7a76\u95ee\u9898\uff1f</li><li>\u5b83\u662f\u5426\u8bf4\u660e\u4e86\u4f60\u4eec\u5bf9\u7ed3\u679c\u7684\u9884\u6d4b\uff1f</li><li>\u5b83\u662f\u5426\u53ef\u4ee5\u88ab\u540e\u9762\u7684\u6570\u636e\u652f\u6301\u6216\u53cd\u9a73\uff1f</li></ul></div>' +
        '</div>';
      }
      return '<div class="inquiry-helper">' +
        '<div class="helper-card"><h4>\u7814\u7a76\u95ee\u9898\u601d\u8003\u70b9</h4><ul><li>\u4f60\u4eec\u60f3\u89c2\u5bdf\u6216\u6bd4\u8f83\u7684\u73b0\u8c61\u662f\u4ec0\u4e48\uff1f</li><li>\u95ee\u9898\u4e2d\u7684\u53d8\u91cf\u662f\u5426\u6bd4\u8f83\u6e05\u695a\uff1f</li><li>\u662f\u5426\u80fd\u901a\u8fc7\u5b9e\u9a8c\u8bb0\u5f55\u6216\u6570\u636e\u6765\u5bfb\u627e\u8bc1\u636e\uff1f</li></ul></div>' +
      '</div>';
    }

    function renderInquiryCases() {
      const cases = [
        { title: "\u5de7\u514b\u529b\u4e0e\u8bb0\u5fc6", question: "\u6444\u5165\u5c11\u91cf\u5de7\u514b\u529b\u662f\u5426\u4f1a\u5f71\u54cd\u5b66\u751f\u5bf9\u8bcd\u8bed\u7684\u56de\u5fc6\u6570\u91cf\uff1f", hypothesis: "\u76f8\u6bd4\u4e8e\u672a\u6444\u5165\u5de7\u514b\u529b\uff0c\u6444\u5165\u5c11\u91cf\u5de7\u514b\u529b\u53ef\u80fd\u4f1a\u6539\u53d8\u8bcd\u8bed\u56de\u5fc6\u6570\u91cf\u3002" },
        { title: "\u7761\u7720\u4e0e\u5b66\u4e60\u6548\u679c", question: "\u4e0d\u540c\u7761\u7720\u65f6\u957f\u662f\u5426\u4f1a\u5f71\u54cd\u7b2c\u4e8c\u5929\u7684\u5355\u8bcd\u6d4b\u9a8c\u6210\u7ee9\uff1f", hypothesis: "\u76f8\u6bd4\u4e8e\u7761\u7720\u65f6\u95f4\u8f83\u77ed\uff0c\u7761\u7720\u65f6\u95f4\u8f83\u5145\u8db3\u53ef\u80fd\u4f1a\u5bfc\u81f4\u6d4b\u9a8c\u6210\u7ee9\u66f4\u9ad8\u3002" },
        { title: "\u97f3\u4e50\u4e0e\u4e13\u6ce8\u529b", question: "\u80cc\u666f\u97f3\u4e50\u662f\u5426\u4f1a\u5f71\u54cd\u5b66\u751f\u5b8c\u6210\u9605\u8bfb\u4efb\u52a1\u7684\u4e13\u6ce8\u8868\u73b0\uff1f", hypothesis: "\u76f8\u6bd4\u4e8e\u5b89\u9759\u73af\u5883\uff0c\u6709\u80cc\u666f\u97f3\u4e50\u65f6\u5b66\u751f\u7684\u4e13\u6ce8\u8868\u73b0\u53ef\u80fd\u4f1a\u53d1\u751f\u53d8\u5316\u3002" },
        { title: "\u827e\u5bbe\u6d69\u65af\u9057\u5fd8\u5b9e\u9a8c", question: "\u5b66\u4e60\u540e\u7ecf\u8fc7\u7684\u65f6\u95f4\u662f\u5426\u4f1a\u5f71\u54cd\u65e0\u610f\u4e49\u97f3\u8282\u7684\u4fdd\u6301\u7387\uff1f", hypothesis: "\u76f8\u6bd4\u4e8e\u5b66\u4e60\u540e\u7acb\u5373\u6d4b\u8bd5\uff0c\u95f4\u9694\u65f6\u95f4\u66f4\u957f\u53ef\u80fd\u4f1a\u5bfc\u81f4\u4fdd\u6301\u7387\u4e0b\u964d\u3002" },
        { title: "\u7c73\u52d2\u8bb0\u5fc6\u5bb9\u91cf\u5b9e\u9a8c", question: "\u4fe1\u606f\u5355\u4f4d\u6570\u91cf\u662f\u5426\u4f1a\u5f71\u54cd\u53c2\u4e0e\u8005\u51c6\u786e\u590d\u8ff0\u7684\u8868\u73b0\uff1f", hypothesis: "\u76f8\u6bd4\u4e8e\u4fe1\u606f\u5355\u4f4d\u8f83\u5c11\u65f6\uff0c\u4fe1\u606f\u5355\u4f4d\u8f83\u591a\u53ef\u80fd\u4f1a\u5bfc\u81f4\u51c6\u786e\u590d\u8ff0\u7387\u4e0b\u964d\u3002" },
        { title: "\u65af\u7279\u9c81\u666e\u5b9e\u9a8c", question: "\u989c\u8272\u8bcd\u7684\u8bcd\u4e49\u4e0e\u58a8\u8272\u662f\u5426\u4e00\u81f4\u4f1a\u5f71\u54cd\u989c\u8272\u547d\u540d\u901f\u5ea6\uff1f", hypothesis: "\u76f8\u6bd4\u4e8e\u8bcd\u4e49\u4e0e\u58a8\u8272\u4e00\u81f4\u65f6\uff0c\u4e0d\u4e00\u81f4\u6761\u4ef6\u53ef\u80fd\u4f1a\u5bfc\u81f4\u547d\u540d\u65f6\u95f4\u53d8\u957f\u3002" }
      ];
      return '<div class="case-list"><div class="template-card"><h4>\u79d1\u5b66\u63a2\u7a76\u6848\u4f8b</h4><p>\u4ee5\u4e0b\u6848\u4f8b\u53ea\u4f5c\u4e3a\u7075\u611f\u53c2\u8003\uff0c\u53ef\u4ee5\u5b66\u4e60\u601d\u8003\u65b9\u5f0f\uff0c\u4e0d\u9700\u8981\u7167\u7740\u53e5\u5f0f\u5199\u3002</p></div>' +
        cases.map((item) => '<details class="case-card"><summary>' + item.title + '</summary><div class="case-body"><p><strong>\u7814\u7a76\u95ee\u9898\uff1a</strong>' + item.question + '</p><p><strong>\u7814\u7a76\u5047\u8bbe\uff1a</strong>' + item.hypothesis + '</p><div class="case-tags"><span class="case-tag">\u2713 \u6709\u660e\u786e\u53d8\u91cf</span><span class="case-tag">\u2713 \u53ef\u4ee5\u9a8c\u8bc1</span><span class="case-tag">\u2713 \u6709\u53ef\u6d4b\u91cf\u7ed3\u679c</span></div></div></details>').join('') +
      '</div>';
    }

    function renderQuestionStep() {
      return `<div class="step-layout">
        <div class="question-intro-strip">
          <p>你有没有这样的经历：在回忆一篇课文时，开头和结尾的内容记得很清楚，但中间部分却总是模糊不清？其实，这可能是因为你的长时记忆受到了一些干扰。</p>
          <p>干扰可以解释一部分遗忘的原因与发生方式，一些记忆会让人难以回忆其他的记忆。今天，我们将通过实验一起来探究——到底有哪些因素会干扰我们的长时记忆？</p>
          <p>请先和小组成员讨论，你们能想到哪些生活中的长时记忆干扰因素？并写在下面：</p>
          <div class="field"><label>生活中想到的干扰因素</label><textarea data-field="lifeFactors">${escapeHtml(state.fields.lifeFactors)}</textarea></div>
        </div>
        <div class="panel"><div class="panel-head"><h3>阅读材料</h3><p>下面是三则关于长时记忆干扰的材料，请阅读以下材料，想一想还有什么因素会干扰长时记忆。</p></div><div class="panel-body reading-list">
          <article class="reading-card">
            <h4>学习材料一：前摄干扰与倒摄干扰</h4>
            <p>在接受新信息的同时，我们的脑海还储存着以前学习的信息，这些新旧记忆具有相似之处，会相互干扰导致遗忘。其中，旧记忆对新记忆的干扰叫做“前摄干扰”，新记忆对旧记忆的干扰叫做“倒摄干扰”。</p>
            <p>在连续学习多个内容时，常常发生前摄干扰。想一想你背诵过的课文，是不是对开头几段的记忆最为深刻，后面就越来越难背了呢？</p>
            <p>而倒摄干扰就像是你学到的新知识“覆盖”了旧知识，会让旧的记忆变得模糊不清，甚至完全遗忘。这就是为什么在换到全新的教室之后，你更难以记起旧教室的种种细节：除了时间长导致的淡忘，这些记忆还可能是受到有关新教室记忆的干扰。</p>
          </article>
          <article class="reading-card">
            <h4>学习材料二：材料的相似性对记忆的干扰</h4>
            <p>当回忆信息时，如果我们的大脑中存在许多相似的记忆，更容易发生干扰。你昨天中午的午餐吃了什么？如果这个问题发生在平常的一天，你可能一时半会回忆不起来，因为你对其他的饭菜有很多相似的记忆；但如果昨天中午你恰好吃了一顿独一无二的饭菜，就会记得更清楚些。</p>
          </article>
          <article class="reading-card">
            <h4>学习材料三：情绪状态对记忆的干扰</h4>
            <p>我们的情绪状态也会影响记忆。当我们处于开心、紧张、难过或者害怕的状态时，大脑对信息的处理会发生变化。</p>
            <p>在那些情绪激动的时刻，比如观看一场精彩的球赛或者第一次见到震撼人心的美景时，你是否会印象更深刻？或者，你有没有过表演前太紧张，感到大脑一片空白的经历？情绪状态不同，对记忆的干扰程度也不同。你认为什么样的情绪会减轻记忆的干扰、什么样的情绪会加重记忆的干扰呢？</p>
          </article>
        </div></div>
        <div class="panel"><div class="panel-head"><h3>提出研究问题</h3></div><div class="panel-body">
          <div class="field"><label>材料中列出的干扰因素</label><textarea data-field="materialFactors" placeholder="请根据阅读材料自行填写">${escapeHtml(state.fields.materialFactors)}</textarea></div>
          <div class="field"><label>研究问题</label><p class="hint">选择你们感兴趣的1-2个因素进行探究活动，提出研究问题：</p><textarea data-field="question" placeholder="______________会对长时记忆造成干扰吗？">${escapeHtml(state.fields.question)}</textarea></div>
          ${renderInquiryScaffold("question")}
          ${renderInquiryCases()}
        </div></div>
      </div>`;
    }
    function renderHypothesisStep() {
      return `<div class="step-layout"><div class="panel"><div class="panel-head"><h3>研究假设小助手</h3></div><div class="panel-body">${renderInquiryScaffold("hypothesis")}${renderInquiryCases()}</div></div><div class="panel"><div class="panel-head"><h3>研究假设</h3></div><div class="panel-body"><textarea data-field="hypothesis" placeholder="写下你们小组对结果的预测">${escapeHtml(state.fields.hypothesis)}</textarea></div></div></div>`;
    }
    function renderPlanStep() {
      const factorOptions = Object.keys(MATERIAL_SETS).map((factor) => `<option value="${factor}" ${selected("factor", factor)}>${factor}</option>`).join("");
      return `<div class="single-step-layout">
        <div class="panel"><div class="panel-head"><h3>实验计划</h3><p>选择材料包后，搜集证据阶段会按 PPT 固定材料和两轮流程运行。</p></div><div class="panel-body"><div class="form-grid">
          <div class="field"><label>实验类型</label><select data-field="factor">${factorOptions}</select></div>
          <div class="field"><label>参与者编号</label><input type="text" data-field="participant" value="${escapeHtml(state.fields.participant)}" placeholder="请输入参与者编号"></div>
          <div class="field"><label>材料难度</label><select data-field="difficulty"><option value="easy" ${selected("difficulty","easy")}>初级</option><option value="medium" ${selected("difficulty","medium")}>中级</option><option value="hard" ${selected("difficulty","hard")}>高级</option></select></div>
          <div class="field"><label>情绪视频条件</label><select data-field="emotionCondition"><option value="中性" ${selected("emotionCondition","中性")}>中性</option><option value="悲伤" ${selected("emotionCondition","悲伤")}>悲伤</option><option value="愉悦" ${selected("emotionCondition","愉悦")}>愉悦</option></select></div>
          <div class="field"><label>记忆时间（秒）</label><input type="number" min="10" max="180" data-field="memorySeconds" value="${escapeHtml(state.fields.memorySeconds)}"></div>
          <div class="field"><label>休息/视频时间（秒）</label><input type="number" min="5" max="240" data-field="restSeconds" value="${escapeHtml(state.fields.restSeconds)}"></div>
          <div class="field"><label>干扰时间（秒）</label><input type="number" min="5" max="240" data-field="interferenceSeconds" value="${escapeHtml(state.fields.interferenceSeconds)}"></div>
          <div class="field"><label>测试轮次</label><input type="number" min="1" max="2" value="2" disabled></div>
        </div></div></div>
        <div class="panel"><div class="panel-head"><h3>变量设计</h3><p>请根据小组选择的探究因素，填写变量。</p></div><div class="panel-body">
          <div class="variable-table-wrap">
            <table class="variable-table">
              <tbody>
                <tr><td>自变量（两轮实验中需要改变的条件）：</td><td><textarea data-field="independentVariablePlan">${escapeHtml(state.fields.independentVariablePlan)}</textarea></td></tr>
                <tr><td>因变量（实验中观察和记录的变化）：</td><td><textarea data-field="dependentVariablePlan">${escapeHtml(state.fields.dependentVariablePlan)}</textarea></td></tr>
                <tr><td>无关变量（两轮实验中必须保持不变的条件）：</td><td><textarea data-field="controlVariablePlan">${escapeHtml(state.fields.controlVariablePlan)}</textarea></td></tr>
              </tbody>
            </table>
          </div>
        </div></div>
        <div class="panel"><div class="panel-head"><h3>实验材料</h3></div><div class="panel-body reading-list">
          <details class="material-details" open><summary>实验材料一：倒摄干扰的实验设计（参考）</summary><div class="material-details-body">
            <p>我们可以通过以下方式探究新学习内容是否会干扰旧知识的记忆。参与者需要进行两轮“记忆阶段—休息/干扰阶段—测试阶段”的完整操作。</p>
            <p>第一轮实验：</p>
            <p>1）记忆阶段，参与者先学习1分钟记忆材料，</p>
            <p>2）安静地休息3分钟，</p>
            <p>3）参与者回想记忆过的材料的内容，尽可能多地写在纸上。</p>
            <p>第二轮实验：</p>
            <p>1）记忆阶段，参与者学习1分钟新的记忆材料，</p>
            <p>2）安静地休息1分钟，</p>
            <p>3）参与者学习2分钟干扰材料，</p>
            <p>4）回忆并复述出记忆材料的内容。</p>
            <p>如果两次得分差别不大，可以考虑调整材料的难度等级。你认为还有什么原因可能导致出现与预期不符的结果？</p>
          </div></details>
          <details class="material-details"><summary>实验材料二：相似性干扰实验设计（参考）</summary><div class="material-details-body">
            <p>可以通过这个实验设计探究材料的相似性对长时记忆的干扰。</p>
            <p>第一轮实验：</p>
            <p>1）记忆阶段，参与者进行1分钟记忆材料的学习，</p>
            <p>2）休息阶段，安静地休息1分钟，</p>
            <p>3）干扰阶段，参与者学习2分钟干扰材料，</p>
            <p>4）测试阶段，参与者回想记忆过的材料的内容，尽可能多地写在纸上。</p>
            <p>第二轮实验：</p>
            <p>1）记忆阶段，参与者进行1分钟记忆材料的学习，</p>
            <p>2）休息阶段，安静地休息1分钟，</p>
            <p>3）干扰阶段，参与者学习2分钟干扰材料。与第一轮的材料相比，第二轮的干扰材料与记忆材料的相似性更高。</p>
            <p>4）测试阶段，参与者回想记忆过的材料的内容，尽可能多地写在纸上。</p>
            <p>每轮测试完成后，记录员将背诵的正确率和反应时记录在实验记录表上。</p>
          </div></details>
          <details class="material-details"><summary>实验材料三：情绪干扰实验设计（参考）</summary><div class="material-details-body">
            <p>以下实验设计探究了不同的情绪状态是否会干扰长时记忆的编码阶段。基本思路是：通过播放不同的视频，改变参与者的情绪激活状态，观察在不同情绪下记忆效果的差异以得出结论。</p>
            <p>每位参与者独立完成两轮实验，在不同的情绪状态中完成记忆任务。</p>
            <p>第一轮实验：</p>
            <p>1）先播放一段中性视频，使参与者进入放松的情绪状态，</p>
            <p>2）随后，进行1分钟的记忆阶段，</p>
            <p>3）参与者安静地休息1分钟，</p>
            <p>4）测试阶段，参与者需要尽可能多地复述出记忆材料。</p>
            <p>第二轮实验：</p>
            <p>1）选择并播放能够激发参与者愉悦或悲伤情绪的视频，</p>
            <p>2）随后，进行1分钟的记忆阶段，</p>
            <p>3）参与者安静地休息1分钟，</p>
            <p>4）测试阶段，参与者需要尽可能多地复述出记忆材料。</p>
          </div></details>
          <details class="material-details"><summary>实验材料四：头环的使用说明</summary><div class="material-details-body">
            <p>本次探究活动中，我们会使用一个特殊的工具——头环。它就像一个特殊的“脑力探测器”，只要戴在头上，就可以在电脑显示屏上生成一幅3D的脑激活图，展示大脑不同脑区神经活动的空间分布状态。</p>
            <p>3D脑图会用颜色直观呈现被激活脑区的位置、范围和强度，告诉我们在实验过程中大脑中哪些地方在努力“思考”。红-黄色表示脑区更活跃、激活强度高，蓝-冷色表示抑制或无变化。</p>
            <p>证据搜集环节中，头环帮助你获得更科学的实验数据：在记忆阶段与测试阶段，头环会显示出你的大脑活动强度，帮助你判断当前进行的任务是否棘手、题目难度是否适宜；受到不同的干扰时，头环的数据能显示大脑哪些区域被激活，帮助你判断干扰发生的时间、产生的原因。有了这些数据，就能够得到更科学、更精确的探究结论。</p>
            <p>使用头环时要注意：保持额头清洁，确保电极贴片贴紧；实验过程中保持专注；认真观察和记录每个环节的颜色变化。</p>
            <p>在阅读了实验材料后，你是否掌握了实验的流程呢？请完成实验步骤的设计吧。</p>
          </div></details>
          <details class="material-details" open><summary>实验流程</summary><div class="material-details-body">
            <p>探究倒摄干扰时：</p>
            <p>第一轮：记忆—休息—测试</p>
            <p>第二轮：记忆—休息—倒摄干扰—测试</p>
            <p>探究相似性干扰时：</p>
            <p>第一轮：记忆—休息—不相似干扰—测试</p>
            <p>第二轮：记忆—休息—相似性干扰—测试</p>
            <p>探究情绪状态干扰时：</p>
            <p>第一轮：中性情绪干扰—记忆—休息—测试</p>
            <p>第二轮：愉悦/悲伤干扰—记忆—休息—测试</p>
            <p>记忆阶段</p>
            <p>呈现记忆材料，参与者不能发出声音或动笔记录，只能观察并尽可能多地记住内容。</p>
            <p>休息阶段</p>
            <p>参与者安静地闭眼休息，既不刻意地想什么，也不刻意地不想什么。</p>
            <p>干扰阶段（请根据你们选择的干扰因素，补全参与者需要做的事）：</p>
            <div class="field"><textarea data-field="interferenceStagePlan" placeholder="_____________">${escapeHtml(state.fields.interferenceStagePlan)}</textarea></div>
            <p>测试阶段</p>
            <p>在没有任何提示的情况下，参与者回忆并尽可能多地在纸上写出记忆材料的内容。记录员需要在实验记录表中记录头环颜色、反应时间与复述正确率。</p>
          </div></details>
        </div></div>
      </div>`;
    }
    function renderEvidenceStep() {
      const pack = getSelectedMaterialPack();
      const set = getSelectedDifficultySet();
      const rounds = set.rounds || [];
      return `<div class="panel"><div class="panel-head"><h3>长时记忆干扰材料化实验</h3><p>当前使用固定材料包，不再随机生成核心记忆材料。</p><div class="material-source"><span class="material-chip">${escapeHtml(pack.source)}</span><span class="material-chip">${escapeHtml(set.materialType)}</span><span class="material-chip">${escapeHtml(pack.difficultyLabels[state.fields.difficulty] || state.fields.difficulty)}</span></div></div><div class="panel-body">
        <div class="toolbar interference-toolbar">
          <div class="field"><label>本次轮次</label><select id="roundSelect">${rounds.map((round)=>`<option value="${round.round}">第 ${round.round} 轮：${round.condition}</option>`).join("")}</select></div>
          <div class="field"><label>参与者编号</label><input id="participantInput" type="text" value="${escapeHtml(state.fields.participant)}" placeholder="请输入参与者编号"></div>
          <div class="field"><label>情绪条件</label><select id="emotionConditionSelect"><option value="中性" ${selected("emotionCondition","中性")}>中性</option><option value="悲伤" ${selected("emotionCondition","悲伤")}>悲伤</option><option value="愉悦" ${selected("emotionCondition","愉悦")}>愉悦</option></select></div>
          <button class="btn" type="button" id="startRunBtn">开始本轮</button>
        </div>
        <div class="experiment-game"><div class="stage"><div class="stage-meta"><span id="phaseStatus">请选择轮次并开始</span><span id="conditionStatus">${escapeHtml(state.fields.factor)}</span></div><div id="taskCard" class="task-card"><h3>长时记忆干扰实验</h3><p>准备开始固定材料流程</p></div><div id="answerBox" class="answer-box"><label for="recallInput">尽可能完整写出刚才记忆过的目标材料</label><textarea id="recallInput" placeholder="可用空格、逗号或换行分隔；古诗可直接完整输入"></textarea><div class="score-rule" id="scoreRuleBox">${escapeHtml(set.scoreRule)}</div><div class="score-row"><div class="field"><label>本轮得分</label><input id="scoreInput" type="number" min="0" max="${set.fullScore}" step="0.5" placeholder="0-${set.fullScore}"></div><div class="field"><label>满分</label><input id="fullScoreInput" type="number" value="${set.fullScore}" disabled></div></div><div class="field" style="margin-top:12px;"><label>头环/脑活动观察</label><input id="headbandInput" type="text" placeholder="例如：测试时前额叶颜色偏红"></div><div class="field" style="margin-top:12px;"><label>情绪强度自评（1-5，仅情绪实验填写）</label><input id="emotionRatingInput" type="number" min="1" max="5" value="${escapeHtml(state.fields.emotionRating)}"></div><button class="btn" type="button" id="submitRecallBtn" style="width:100%;margin-top:12px;">提交本轮结果</button></div><div class="timer"><div id="timerFill" class="timer-fill"></div></div></div>
          <aside class="game-side"><div class="stat-grid"><div class="mini-stat"><span>阶段</span><b id="phaseStat">--</b></div><div class="mini-stat"><span>剩余时间</span><b id="timeStat">--</b></div><div class="mini-stat"><span>得分</span><b id="correctStat">0</b></div><div class="mini-stat"><span>正确率</span><b id="accuracyStat">0%</b></div></div><div class="game-log"><table><thead><tr><th>轮次</th><th>条件</th><th>得分</th><th>正确率</th></tr></thead><tbody id="gameLogBody"><tr><td colspan="4">暂无记录</td></tr></tbody></table></div></aside></div>
        <div id="focusPrep" class="focus-prep" role="dialog" aria-modal="true"><div class="focus-prep-card"><h3>准备开始材料化实验</h3><p>页面将切换到低干扰模式，并尝试进入全屏。实验会按固定材料流程推进。</p><p>测试阶段请根据评分标准输入回忆内容和得分。</p><button class="btn" type="button" id="confirmStartRunBtn">进入实验</button><button class="btn secondary" type="button" id="cancelStartRunBtn">取消</button></div></div>
      </div></div>`;
    }
    function getPersonalInterferenceResult(summary) {
      const items = summary || summarizeRecords();
      if (!items.length) return "";
      const avgScore = Number((items.reduce((sum, item) => sum + Number(item.avgCorrect || 0), 0) / items.length).toFixed(1));
      const avgAccuracy = Math.round(items.reduce((sum, item) => sum + Number(item.avgAccuracy || 0), 0) / items.length);
      return `平均得分 ${avgScore}，平均正确率 ${avgAccuracy}%`;
    }
    function renderTeamResultTable(summary) {
      const personalResult = getPersonalInterferenceResult(summary);
      return `<div class="panel team-result-card"><div class="panel-head"><h3>其他组员实验结果记录</h3><p>仅用于留痕和对比，不参与统计计算。</p></div><div class="panel-body"><table><thead><tr><th>成员</th><th>组员编号</th><th>实验结果</th></tr></thead><tbody><tr><td>本人</td><td><input type="text" data-field="participantId" value="${escapeHtml(state.fields.participantId || state.studentId)}" placeholder="本人编号"></td><td><input type="text" value="${escapeHtml(personalResult)}" placeholder="自动带入本人结果" disabled></td></tr><tr><td>组员</td><td><input type="text" data-field="teammate1Id" value="${escapeHtml(state.fields.teammate1Id)}" placeholder="请输入编号"></td><td><input type="text" data-field="teammate1Result" value="${escapeHtml(state.fields.teammate1Result)}" placeholder="请输入该组员实验结果"></td></tr><tr><td>组员</td><td><input type="text" data-field="teammate2Id" value="${escapeHtml(state.fields.teammate2Id)}" placeholder="请输入编号"></td><td><input type="text" data-field="teammate2Result" value="${escapeHtml(state.fields.teammate2Result)}" placeholder="请输入该组员实验结果"></td></tr></tbody></table></div></div>`;
    }
    function getTeamResultSheet(summary) {
      return ["小组记录", [["本人编号","本人结果","组员1编号","组员1结果","组员2编号","组员2结果"], [state.fields.participantId || state.studentId, getPersonalInterferenceResult(summary), state.fields.teammate1Id, state.fields.teammate1Result, state.fields.teammate2Id, state.fields.teammate2Result]]];
    }
    function getSystemInfoSheet(recordCount) {
      return ["系统信息", [["项目","内容"],["实验版本","science-inquiry-static-v1"],["localStorage key",STORAGE_KEY],["保存时间",state.savedAt || ""],["导出时间",new Date().toLocaleString()],["当前步骤",`${state.currentStep + 1}/${steps.length}`],["过程性实验记录数",recordCount],["AI聊天记录","不包含，AI 对话请在 AI 助手窗口单独导出"]]];
    }
    function getRawStorageSheet() {
      return ["localStorage原始数据", [["localStorage key","JSON"],[STORAGE_KEY, localStorage.getItem(STORAGE_KEY) || ""]]];
    }
    function getHeadbandSummarySheet() {
      return ["头环数据摘要", [["项目","内容"],["上传文件名",""],["总体头环观察",state.fields.headband || ""],["记录内头环观察",state.records.map((record)=>record.headband).filter(Boolean).join("；")],["数据摘要",state.fields.headband || ""],["统计结果",""]]];
    }
    function renderAnalysisStep() {
      const summary = summarizeRecords();
      const rows = summary.map((item)=>`<tr><td>${escapeHtml(item.condition)}</td><td>${item.count}</td><td>${item.avgCorrect}</td><td>${item.avgAccuracy}%</td><td>${item.avgRt ? item.avgRt + "ms" : "--"}</td></tr>`).join("");
      const chart = summary.length ? summary.map((item)=>`<div class="bar-row"><div>${escapeHtml(item.condition)}</div><div class="bar-track"><div class="bar-fill" style="width:${item.avgAccuracy}%"></div></div><div>${item.avgAccuracy}%</div></div>`).join("") : `<div class="empty-state">完成实验后会自动生成条件对比图。</div>`;
      return `<div class="analysis-layout"><div class="panel"><div class="panel-head"><h3>条件汇总</h3></div><div class="panel-body">${summary.length ? `<table><thead><tr><th>条件</th><th>次数</th><th>平均正确数</th><th>平均正确率</th><th>平均反应时</th></tr></thead><tbody>${rows}</tbody></table>` : `<div class="empty-state">还没有实验数据。请先完成至少一轮实验。</div>`}</div></div>${renderTeamResultTable(summary)}<div class="panel"><div class="panel-head"><h3>结果展示与头环记录</h3></div><div class="panel-body"><div class="chart">${chart}</div><div class="field" style="margin-top:18px;"><label>总体头环观察</label><textarea data-field="headband">${escapeHtml(state.fields.headband)}</textarea></div></div></div></div>`;
    }
    function renderConclusionStep() {
      return `<div class="step-layout"><div class="panel"><div class="panel-head"><h3>得出结论</h3></div><div class="panel-body"><div class="form-grid"><div class="field"><label>结论是否支持假设</label><select data-field="support"><option value="是" ${selected("support","是")}>是</option><option value="否" ${selected("support","否")}>否</option><option value="不确定" ${selected("support","不确定")}>不确定</option></select></div><div class="field"><label>结论是否可信</label><select data-field="credibility"><option value="是" ${selected("credibility","是")}>是</option><option value="否" ${selected("credibility","否")}>否</option><option value="不确定" ${selected("credibility","不确定")}>不确定</option></select></div></div><textarea data-field="conclusion" placeholder="通过实验，我们得到以下结论">${escapeHtml(state.fields.conclusion)}</textarea></div></div><div class="panel"><div class="panel-head"><h3>原因说明</h3></div><div class="panel-body"><div class="reading-card"><h4>提示</h4><p>结论需要回到数据：哪一轮/哪一条件正确率更低，是否说明该因素造成了更强干扰。</p></div></div></div></div>`;
    }
    function renderReflectionStep() {
      return `<div class="reflection-layout"><div class="panel"><div class="panel-head"><h3>反思评价</h3></div><div class="panel-body"><div class="field"><label>本组实验设计有什么优点？</label><textarea data-field="strengths">${escapeHtml(state.fields.strengths)}</textarea></div><div class="field"><label>还有哪些可以改进？</label><textarea data-field="improvements">${escapeHtml(state.fields.improvements)}</textarea></div><div class="field"><label>本实验结论对学习有什么启发？</label><textarea data-field="learningInsight">${escapeHtml(state.fields.learningInsight)}</textarea></div></div></div></div>`;
    }
    function bindInputs() {
      main.querySelectorAll("[data-field]").forEach((element)=>{
        const field = element.dataset.field;
        element.addEventListener("change",()=>updateField(element, field));
        element.addEventListener("input",()=>updateField(element, field));
      });
    }
    function updateField(element, field) {
      state.fields[field] = element.type === "number" ? Number(element.value) : element.value;
      saveState();
    }
    function bindStepEvents(stepId) {
      bindSurveyInputs();
      const prev = document.getElementById("prevStep");
      const next = document.getElementById("nextStep");
      if (prev) prev.addEventListener("click",()=>{ if (state.currentStep > 0) { state.currentStep -= 1; saveState(); renderApp(); }});
      if (next) next.addEventListener("click",()=>{ if (state.currentStep < steps.length - 1) {
            state.currentStep += 1; saveState(); renderApp(); }});
      if (stepId === "evidence") bindGameEvents();
      const finalExport = document.getElementById("finalExportBtn");
      if (finalExport) finalExport.addEventListener("click", exportExcel);
    }
    function bindGameEvents() {
      document.getElementById("startRunBtn").addEventListener("click", showFocusPrep);
      document.getElementById("confirmStartRunBtn").addEventListener("click", startRun);
      document.getElementById("cancelStartRunBtn").addEventListener("click", hideFocusPrep);
      document.getElementById("submitRecallBtn").addEventListener("click", submitRecall);
      updateGameUi();
    }
    function showFocusPrep() { document.getElementById("focusPrep").classList.add("is-visible"); }
    function hideFocusPrep() { document.getElementById("focusPrep").classList.remove("is-visible"); }
    function startRun() {
      hideFocusPrep();
      clearTimers();
      const round = Number(document.getElementById("roundSelect").value);
      const participant = document.getElementById("participantInput").value.trim() || state.fields.participant || state.studentId;
      const emotionSelect = document.getElementById("emotionConditionSelect");
      state.fields.participant = participant;
      if (emotionSelect) state.fields.emotionCondition = emotionSelect.value;
      saveState();
      const pack = getSelectedMaterialPack();
      const set = getSelectedDifficultySet();
      const roundMaterial = getRoundMaterial(round);
      const videoCondition = state.fields.factor === "情绪" ? (state.fields.emotionCondition || "中性") : "";
      session = { id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()), participant, round, factor: state.fields.factor, materialSource: pack.source, materialType: set.materialType, difficulty: state.fields.difficulty, difficultyLabel: pack.difficultyLabels[state.fields.difficulty] || state.fields.difficulty, condition: state.fields.factor === "情绪" ? `${videoCondition}情绪` : roundMaterial.condition, videoCondition, videoSrc: videoCondition ? getVideoSrc(videoCondition) : "", memoryItems: roundMaterial.memory, interferenceItems: roundMaterial.interference || [], instruction: roundMaterial.instruction, interferenceInstruction: roundMaterial.interferenceInstruction, scoreRule: set.scoreRule, fullScore: set.fullScore, phase: state.fields.factor === "情绪" ? "video" : "memory", startedAt: new Date().toISOString(), recallStartedAt: 0 };
      enterFocusMode();
      runPhase(session.phase);
    }
    function getSelectedMaterialPack() {
      return MATERIAL_SETS[state.fields.factor] || MATERIAL_SETS["倒摄干扰"];
    }
    function getSelectedDifficultySet() {
      const pack = getSelectedMaterialPack();
      return pack.sets[state.fields.difficulty] || pack.sets.medium || pack.sets.easy;
    }
    function getRoundMaterial(roundNumber) {
      const set = getSelectedDifficultySet();
      return set.rounds.find((item) => Number(item.round) === Number(roundNumber)) || set.rounds[0];
    }
    function getVideoSrc(condition) {
      const pack = getSelectedMaterialPack();
      return pack.videos ? pack.videos[condition] || pack.videos["中性"] || "" : "";
    }
    function renderMaterialItems(items) {
      return `<div class="material-block">${items.map((item)=>`<div class="material-line">${escapeHtml(item)}</div>`).join("")}</div>`;
    }
    // 固定材料包模式不再随机抽取核心材料。
    function runPhase(phase) {
      if (!session) return;
      clearTimers();
      session.phase = phase;
      const answerBox = document.getElementById("answerBox");
      answerBox.classList.remove("is-visible");
      const taskCard = document.getElementById("taskCard");
      taskCard.style.display = "block";
      let seconds = 0;
      if (phase === "video") {
        renderEmotionVideoPhase(taskCard);
        return;
      } else if (phase === "memory") {
        seconds = clamp(Number(state.fields.memorySeconds), 10, 180, 60);
        taskCard.innerHTML = `<h3>记忆阶段</h3><p>${escapeHtml(session.instruction)}</p>${renderMaterialItems(session.memoryItems)}`;
      } else if (phase === "interference") {
        if (!session.interferenceItems.length) {
          seconds = clamp(Number(state.fields.restSeconds), 5, 240, 180);
          taskCard.innerHTML = `<h3>休息阶段</h3><p>${escapeHtml(session.interferenceInstruction || scenarios.rest)}</p>`;
        } else {
          seconds = clamp(Number(state.fields.interferenceSeconds), 5, 240, 120);
          taskCard.innerHTML = `<h3>干扰阶段</h3><p>${escapeHtml(session.interferenceInstruction)}</p>${renderMaterialItems(session.interferenceItems)}`;
        }
      } else { showRecall(); return; }
      phaseStartedAt = performance.now();
      updateGameUi(seconds);
      const next = phase === "video" ? "memory" : phase === "memory" ? "interference" : "recall";
      startCountdown(seconds, () => runPhase(next));
    }
    function renderEmotionVideoPhase(taskCard) {
      phaseStartedAt = performance.now();
      updateGameUi(0);
      setVideoStatus("请完整观看视频，视频结束后才会进入记忆阶段。");
      const title = `${escapeHtml(session.videoCondition)}情绪视频`;
      if (!session.videoSrc) {
        taskCard.innerHTML = `<h3>${title}</h3><p>当前视频尚未配置，请联系实验管理员。</p><div class="video-status warning">请在 interference.html 顶部的 EXTERNAL_EMOTION_VIDEOS 中填写 ${escapeHtml(session.videoCondition)} 视频的公开视频直链。</div><div class="video-actions"><button class="btn secondary" type="button" id="skipVideoBtn">跳过视频并进入记忆阶段</button></div>`;
        bindSkipVideoButton();
        setVideoStatus("视频未配置");
        return;
      }
      taskCard.innerHTML = `<h3>${title}</h3><p>请安静观看完整视频，播放结束后自动进入记忆阶段。</p><video class="interference-video" id="emotionVideoPlayer" src="${escapeHtml(session.videoSrc)}" controls preload="metadata" playsinline></video><div class="video-status" id="videoStatusBox">正在加载视频信息...</div>`;
      const video = document.getElementById("emotionVideoPlayer");
      const statusBox = document.getElementById("videoStatusBox");
      if (!video) return;
      let maxWatchedTime = 0;
      let restoringSeek = false;
      video.addEventListener("timeupdate", () => {
        if (!video.seeking) maxWatchedTime = Math.max(maxWatchedTime, video.currentTime);
      });
      video.addEventListener("seeking", () => {
        if (restoringSeek || !Number.isFinite(video.duration)) return;
        if (video.currentTime > maxWatchedTime + 1.5) {
          restoringSeek = true;
          video.currentTime = Math.max(0, maxWatchedTime);
          if (statusBox) statusBox.textContent = "请按顺序完整观看视频，视频结束后会自动进入下一阶段。";
          window.setTimeout(() => { restoringSeek = false; }, 120);
        }
      });
      video.addEventListener("loadedmetadata", () => {
        if (statusBox) statusBox.textContent = "视频已加载，请完整观看。";
        setVideoStatus("请完整观看");
      });
      video.addEventListener("ended", () => {
        if (!session || session.phase !== "video") return;
        if (statusBox) textStatus(statusBox, "视频已播放完毕，即将进入记忆阶段。", "");
        setVideoStatus("视频已完成");
        timerId = window.setTimeout(() => runPhase("memory"), 700);
      }, { once: true });
      video.addEventListener("error", () => {
        if (statusBox) textStatus(statusBox, "视频加载失败，请检查公开视频链接或网络连接。", "error");
        setVideoStatus("视频加载失败");
        const actions = document.createElement("div");
        actions.className = "video-actions";
        actions.innerHTML = `<button class="btn secondary" type="button" id="skipVideoBtn">跳过视频并进入记忆阶段</button>`;
        taskCard.appendChild(actions);
        bindSkipVideoButton();
      }, { once: true });
    }
    function textStatus(element, text, type) {
      element.textContent = text;
      element.className = `video-status${type ? " " + type : ""}`;
    }
    function bindSkipVideoButton() {
      const button = document.getElementById("skipVideoBtn");
      if (button) button.addEventListener("click", () => runPhase("memory"));
    }
    function setVideoStatus(text) {
      const timeStat = document.getElementById("timeStat");
      const phaseStat = document.getElementById("phaseStat");
      const fill = document.getElementById("timerFill");
      if (timeStat) timeStat.textContent = text;
      if (phaseStat) phaseStat.textContent = "情绪视频";
      if (fill) fill.style.width = "100%";
    }
    function renderItems(items) { return renderMaterialItems(items); }
    function showRecall() {
      clearTimers();
      if (!session) return;
      session.phase = "recall";
      session.recallStartedAt = performance.now();
      document.getElementById("taskCard").style.display = "none";
      document.getElementById("answerBox").classList.add("is-visible");
      const scoreInput = document.getElementById("scoreInput");
      const fullScoreInput = document.getElementById("fullScoreInput");
      const ruleBox = document.getElementById("scoreRuleBox");
      if (scoreInput) { scoreInput.value = ""; scoreInput.max = session.fullScore; }
      if (fullScoreInput) fullScoreInput.value = session.fullScore;
      if (ruleBox) ruleBox.textContent = session.scoreRule;
      const input = document.getElementById("recallInput");
      input.value = "";
      input.focus();
      updateGameUi(0);
    }
    function startCountdown(seconds, done) {
      tickId = window.setInterval(()=>updateCountdown(seconds), 80);
      timerId = window.setTimeout(done, seconds * 1000);
      updateCountdown(seconds);
    }
    function updateCountdown(seconds) {
      if (!session) return;
      const elapsed = (performance.now() - phaseStartedAt) / 1000;
      const remaining = Math.max(0, seconds - elapsed);
      const fill = document.getElementById("timerFill");
      if (fill) fill.style.width = `${Math.round((remaining / seconds) * 100)}%`;
      const timeStat = document.getElementById("timeStat");
      if (timeStat) timeStat.textContent = `${Math.ceil(remaining)}s`;
    }
    function clearTimers() {
      if (timerId) window.clearTimeout(timerId);
      if (tickId) window.clearInterval(tickId);
      timerId = null;
      tickId = null;
    }
    function submitRecall() {
      if (!session || session.phase !== "recall") return;
      const recall = document.getElementById("recallInput").value.trim();
      const headband = document.getElementById("headbandInput").value.trim();
      const scoreInput = document.getElementById("scoreInput");
      const emotionRatingInput = document.getElementById("emotionRatingInput");
      const fullScore = Number(session.fullScore) || 1;
      let score = Number(scoreInput && scoreInput.value ? scoreInput.value : 0);
      score = Math.max(0, Math.min(fullScore, score));
      const accuracy = Math.round((score / fullScore) * 100);
      if (emotionRatingInput) state.fields.emotionRating = emotionRatingInput.value;
      const reactionTime = Math.round(performance.now() - session.recallStartedAt);
      const record = { runId: session.id, studentName: state.studentName, studentAge: state.studentAge, studentId: state.studentId, groupId: state.groupId, participant: session.participant, round: session.round, factor: session.factor, materialSource: session.materialSource, materialType: session.materialType, difficulty: session.difficulty, difficultyLabel: session.difficultyLabel, condition: session.condition, videoCondition: session.videoCondition, videoSrc: session.videoSrc, memorySeconds: state.fields.memorySeconds, restSeconds: state.fields.restSeconds, interferenceSeconds: state.fields.interferenceSeconds, itemCount: session.memoryItems.length, memoryItems: session.memoryItems.join("；"), interferenceItems: session.interferenceItems.join("；"), scoreRule: session.scoreRule, fullScore, score, recall, correctItems: "人工评分", correctCount: score, accuracy, reactionTime, emotionRating: state.fields.emotionRating, headband, createdAt: new Date().toLocaleString() };
      state.records.push(record);
      saveState();
      const finished = session;
      session = null;
      clearTimers();
      exitFocusMode();
      updateGameUi();
      alert(`${finished.condition} 已保存，得分 ${score}/${fullScore}，正确率 ${accuracy}%。`);
    }
    function tokenize(text) {
      return text.toLowerCase().split(/[\s,，、;；\n\r]+/).map((item)=>item.trim()).filter(Boolean);
    }
    function updateGameUi(totalSeconds) {
      const status = document.getElementById("phaseStatus");
      if (!status) return;
      const log = document.getElementById("gameLogBody");
      if (!session) {
        status.textContent = "请选择轮次并开始";
        document.getElementById("phaseStat").textContent = "--";
        document.getElementById("timeStat").textContent = "--";
        const latest = state.records[state.records.length - 1];
        document.getElementById("correctStat").textContent = latest ? latest.correctCount : "0";
        document.getElementById("accuracyStat").textContent = latest ? `${latest.accuracy}%` : "0%";
      } else {
        const phaseNames = { video: "情绪视频", memory: "记忆", interference: "休息/干扰", recall: "测试" };
        status.textContent = `${phaseNames[session.phase]}阶段：${session.condition}`;
        document.getElementById("phaseStat").textContent = phaseNames[session.phase];
        if (totalSeconds) document.getElementById("timeStat").textContent = `${totalSeconds}s`;
      }
      log.innerHTML = state.records.length ? state.records.slice().reverse().map((record)=>`<tr><td>${record.round}</td><td>${escapeHtml(record.condition)}</td><td>${record.correctCount}/${record.itemCount}</td><td><span class="tag">${record.accuracy}%</span></td></tr>`).join("") : `<tr><td colspan="4">暂无记录</td></tr>`;
    }
    async function enterFocusMode() {
      document.body.classList.add("is-focus-mode");
      try { if (!document.fullscreenElement && document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch (event) {}
    }
    async function exitFocusMode() {
      document.body.classList.remove("is-focus-mode");
      try { if (document.fullscreenElement && document.exitFullscreen) await document.exitFullscreen(); } catch (event) {}
    }
    function clamp(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, number));
    }
    function summarizeRecords() {
      const groups = {};
      state.records.forEach((record)=>{
        const key = `${record.factor || ""}-${record.difficultyLabel || record.difficulty || ""}-${record.condition}`;
        if (!groups[key]) groups[key] = { condition: key, count: 0, score: 0, accuracy: 0, rt: 0 };
        groups[key].count += 1;
        groups[key].score += Number(record.score ?? record.correctCount ?? 0);
        groups[key].accuracy += Number(record.accuracy || 0);
        groups[key].rt += Number(record.reactionTime || 0);
      });
      return Object.values(groups).map((item)=>({ condition: item.condition, count: item.count, avgCorrect: Number((item.score / item.count).toFixed(1)), avgAccuracy: Number((item.accuracy / item.count).toFixed(1)), avgRt: Math.round(item.rt / item.count) }));
    }
    function exportExcel() {
      const summary = summarizeRecords();
      const sheets = [
        ["基本信息", [["项目","内容"],["实验","探究干扰长时记忆的因素"],["学生姓名",state.studentName || ""],["学生年龄",state.studentAge || ""],["学生编号",state.studentId],["小组编号",state.groupId],["实验时间",state.savedAt || ""],["导出时间",new Date().toLocaleString()]]],
        ["实验过程", [["字段","内容"],["生活中的长时记忆干扰因素",state.fields.lifeFactors],["材料中列出的干扰因素",state.fields.materialFactors],["探究因素",state.fields.factor],["研究问题",state.fields.question],["自变量",state.fields.independentVariablePlan],["因变量",state.fields.dependentVariablePlan],["无关变量",state.fields.controlVariablePlan],["干扰阶段补全文字",state.fields.interferenceStagePlan],["研究假设",state.fields.hypothesis],["参与者",state.fields.participant],["难度",state.fields.difficulty],["情绪条件",state.fields.emotionCondition],["记忆时间s",state.fields.memorySeconds],["休息/视频时间s",state.fields.restSeconds],["干扰时间s",state.fields.interferenceSeconds],["头环观察",state.fields.headband],["结论",state.fields.conclusion],["假设支持",state.fields.support],["可信度",state.fields.credibility],["优点",state.fields.strengths],["改进",state.fields.improvements],["学习启发",state.fields.learningInsight]]],
        ["实验明细", [["学生姓名","学生年龄","学生编号","小组编号","参与者","轮次","实验类型","材料来源","材料类型","难度","条件","视频条件","记忆时间s","休息/视频时间s","干扰时间s","记忆材料","干扰材料","评分规则","满分","得分","正确率","回忆内容","头环观察","情绪强度","反应时ms","记录时间"], ...state.records.map((record)=>[record.studentName || "",record.studentAge || "",record.studentId,record.groupId,record.participant,record.round,record.factor,record.materialSource,record.materialType,record.difficultyLabel || record.difficulty,record.condition,record.videoCondition,record.memorySeconds,record.restSeconds,record.interferenceSeconds,record.memoryItems,record.interferenceItems,record.scoreRule,record.fullScore,record.score ?? record.correctCount,`${record.accuracy}%`,record.recall,record.headband,record.emotionRating,record.reactionTime,record.createdAt])]],
        ["条件汇总", [["条件","次数","平均得分","平均正确率","平均反应时ms"], ...summary.map((item)=>[item.condition,item.count,item.avgCorrect,`${item.avgAccuracy}%`,item.avgRt])]],
        getTeamResultSheet(summary),
        getHeadbandSummarySheet(),
        getSystemInfoSheet(state.records.length),
        getRawStorageSheet(),
        ...getSurveySheets()
      ];
      const html = `<html><head><meta charset="utf-8"></head><body>${sheets.map(([title, rows])=>`<h2>${escapeHtml(title)}</h2><table border="1">${rows.map((row)=>`<tr>${row.map((cell)=>`<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("")}</table><br>`).join("")}</body></html>`;
      const blob = new Blob(["﻿", html], { type: "application/vnd.ms-excel;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `长时记忆干扰因素_${state.groupId}_${state.studentId}.xls`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }
    document.getElementById("homeBtn").addEventListener("click",()=>{ location.href = "index.html"; });
    document.getElementById("exportBtn").addEventListener("click", exportExcel);
    document.getElementById("resetBtn").addEventListener("click",()=>{ if (!confirm("确定要清空本实验在当前浏览器中保存的数据吗？")) return; localStorage.removeItem(STORAGE_KEY); state = loadState(); session = null; clearTimers(); renderApp(); });
    renderApp();
  </script>
  <script src="assets/ai-assistant.js"></script>
</body>
